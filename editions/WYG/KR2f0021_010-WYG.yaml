body:
  text: 胡端敏奏議巻十明胡世寧撰回人入境官軍擊斬退去隨逓畨文討要覊畱夷使疏官同前職方清吏司案呈奉本部送兵科抄出整理甘肅地方糧草脩舉屯政都察院右僉都御史劉天和題云云奏奉聖㫖兵部㸔了來說欽此又於兵科節抄出提督陜西三邉軍務兵部尚書兼都察院右都御史王瓊甘肅鎮巡等官都御史唐澤等各題同前事俱奉聖㫖兵部知道欽此又該巡按陜西監察御史熊爵題稱副使趙載才猷出衆年力方剛久處孤懸之地養成精銳之兵學術正而議論純憲體熟而政務集訓練駕馭官軍畏威而懷徳撫處弛張邉徼聞風而知警眞濟世之奇才用時之偉器也遊擊將軍彭濬謀猷素著勇畧過人督戰有方不旋踵而身先士卒責諭有義不終日而克捷勍夷獲功雖曰不多兵氣自増百倍乞將趙載或陞按察使之銜或署以都御史之職仍令肅州住劄必能振揚掃蕩大建竒功等因奉聖㫖兵部知道欽此欽遵通抄送司查得先為遠夷屢乞通貢從宜定處事該提督尚書王瓊等題稱吐魯畨夷自正徳年來撫處失宜閉闗絶貢幸而公論不冺皆謂終不可絶宜遣人省諭令其輸誠服罪准令照舊通貢今幸吐魯番蘇勒坦莽蘇爾一旦悔聴䜛言獻還哈宻城池搶去人口什物等件并齎帯方物求討賞賜諸夷悉已向化所㨿先後各起貢使分為兩運照例差官伴送赴京貢囘夷使驗放出闗該本部依擬覆題節奉欽依是吐魯畨酋世濟凶惡先議閉闗絶貢近因守臣節次奏其再三乞貢屢有㫖著鎮巡等官察其果有悔悟實情取具印信眞正畨文回奏方許通貢今既該提督等官詳審無詐驗放入闗要令分為兩運差官伴送來京若事有變更勢有窒礙亦要從實聲說務求停妥不可執泥前言以貽後患欽此已經通行欽遵外令該前因通查案呈到部查覆間又該詹事府詹事兼翰林院學士霍題為夷情事内開永樂年間封哈宻為忠順王一以斷北方右臂二以破西戎交黨外以聫屬部落察其逆順而撫馭之内以藩屏甘肅而衞我邉郡古帝王制外裔安中夏之長䇿也自吐魯畨攻䧟哈宻奪我金印㨿我城池屢年經畧未見底定前次都御史陳九疇建議曰欲制西畨使獻還城池湏閉闗絶貢蓋謂西畨仰命中國惟通貢貿易也若絶不通貢則彼也欲茶不得發腫病死矣欲麝香不得蛇蟲為毒麥禾無收矣是故閉闗絶貢所以扼西畨之咽喉而制其死命也惟彼也貢路不通死命不救遂常舉兵擾我甘肅破我塞堡殺我人民邉臣苦於支敵之不給也復有開闗通貢之議奉有聖㫖若吐魯畨有悔罪眞正畨文獻還哈宻城池獻還人口即與通貢是我聖上因通貢之機廣遷善之路也中國待外裔之體也今西畨求貢尚書王瓊譯進畨文一十餘紙俱裔夷外藩之語無印信足徵之辭則吐魯畨未有悔罪之實可知也彼未誨罪遽許通貢恐戎心益驕後難駕馭而邉患愈滋可虞者一也哈宻城池雖稱獻還乃無畨文足㨿不知後日作何興復或者遂有棄置不問之議夫吐魯畨之無道也圖哈宻乆矣我遂棄置不問彼愈得志將刼我罕東誘我齊勤掠我𤓰沙外連北境内擾甘肅而邉患遂博矣可虞者二也雅克摩哩者吐魯番腹心也擁帳二千稱降於我然在雅克摩哩則曰來降也在吐魯畨則曰不知彼去向也以事理觀焉豈有擁帳二千遠來欵塞彼乃不知耶安知彼非詐降餌以誘我他日犯邉則曰我納彼叛人彼來報復也又曰我不歸彼叛人彼不歸我哈宻也自是哈宻永無復興之期矣彼擁衆坐大而我之邉患愈無休息矣可虞者三也雅克摩哩之降也廪餼口食仰給於我費已不小矣猶曰覊縻之䇿不得已也若吐魯畨擁衆叩闗曰取彼叛人也將驅雅克摩哩而與之耶彼則詭曰降者以投生也今出則死而不肯去將從而納之耶恐為内應而有肘腋之憂吐魯番擁兵於外雅克摩哩為變於内即甘肅危矣可虞者四也此臣之所以為西邉慮也或曰今陜西饑荒甘肅孤危尚慮不保雖棄哈宻可也臣則曰保哈宻所以保甘肅也保甘肅所以保陜西也若曰哈宻難守則棄哈宻然則甘肅難守亦棄甘肅可乎因棄甘肅併棄臨洮寧夏可乎西北二邉與敵為鄰退尺寸則失尋丈是故疆塲棄守之議不可不慎也矧聖明在上將蒞中國撫四夷追復帝王之盛以増光祖宗乃勸皇上輕棄祖宗疆場可乎或曰然則漢棄珠厓宣徳間棄交阯不可耶臣則曰南北二邉體勢則殊珠厓交阯吾欲棄之置之化外而已彼不吾毒也若西北二邉則㨿險以守我失險則彼得險矣彼國㨿險則中國大患遂無窮已宋人西失靈夏北失幽燕國遂不振然宋人且以漢棄珠厓藉口是其學術殺天下也可不戒乎交阯自秦漢迄唐入中國為衣冠文物之邦者千年矣非土官州郡化外諸國之比也楊士竒援漢棄珠厓例棄之乃陋儒當權上下宴安貨賂公行紀綱不振舉版圖十郡之地棄置不守蓋若考作室乃弗肯堂者也楊士竒者太宗皇帝罪人也又足法乎或曰哈宻自成化九年失之二十年收復𢎞治六年失之十一年收復正徳六年復失之而襲封忠順王者且降於吐魯畨矣今雖取還城池無人與守矣勞中國以事邉境恐非計也臣則曰保全哈宻則齊勤罕東聲勢聫絡西北諸境並受制馭若失哈宻則吐魯畨酋併吞諸戎勢力日大我之邉患日深是故保哈宻所以保中國也不得已也昔者太宗皇帝之立哈宻也因元人後嗣力能自立而遂立之借之虚名而我享實利者也今哈宻之嗣三絶矣天之所廢人誰能興之議者必求哈宻之後乃立焉亦見其固也茍於諸夷求其雄傑足以守我城池䕶我金印和戢諸戎修我貢職力能自立即可因立之矣固不必求元人之後可也或曰𢎞治六年吐魯畨酋要我封爵矣求主哈宻矣然則爾時何不因遂立之乃必求元人後嗣而啓數十年之紛紛耶臣則曰吐魯畨酋志吞哈宻併為一國則將遂覇西戎且連北敵爾時若假之封爵是虎而借之翼也若拆為兩國而控制之亦其可也今遣間諜告諸西戎曰中國所以閉闗絶貢非爾諸戎之罪也吐魯畨不道㓕我哈宻蹂我疆場將興問罪之師焉故先閉闗制其死命爾諸戎無罪不得通貢實吐魯畨之故也爾諸戎有併心共力破㓕吐魯畨者即封爾為忠順王授爾金印以主西戎又因雅克摩哩之來降也諭之曰爾舊則吐魯畨之腹心也今降則我中國之藩翊也爾力能立於哈宻乎即以封爾三年之後爾能和戢哈宻即授爾金印為忠順王長為中國衞則王哈宻雖非元人之裔亦不失我中國封爵之體矣權以通變變以從時是故邉將之任也閫外之責也朝廷勿與知焉而假之便宜之權可也及又言今日忍氣哈宻豈得已也甘肅銀一錢僅易粟二升軍士空腹救死不贍在甘肅且凛凛何有於哈宻昔我太宗皇帝之供邉悉以鹽利其制鹽利也鹽一引輸邊粟二斗五升是故富商大賈悉於三邉自出財力自招遊民自墾邉地自藝菽粟自築墩臺自立堡伍歲時屢豐菽粟屢盈至天順成化年間遂變其法凡商人引鹽悉輸銀於户部商賈耕稼積粟無用遂撒業而歸墩臺遂日頺壞堡伍遂日崩拆游民遂日離散邉地遂日荒蕪敵人入㓂一遭兵創生齒日遂凋落地方日遂困敝今千里沃壤莽然榛墟稻米一石直銀五兩皆鹽法更弊之故也然則安邉足用之長䇿莫善太宗皇帝之鹽法矣伏惟陛下勑問兵部吐魯畨叩闗求貢有何印信悔罪畨文哈宻城池作何興復雅克摩哩來降其誠其偽作何料理務出萬全之䇿勿墮狡戎之謀再勑户部甘肅邉糧累年缺乏若何而為目下振救之䇿若何而為經乆饒贍之䇿計畫上聞取裁聖斷臣愚且見中國尊安萬世永頼區區裔夷之向背付之叱咤而定矣不煩聖明轉側西顧之勤也等因奉聖㫖霍韜所奏足見留心邊務雅克摩哩納居内地姦謀叵測這本所言兵部逐一叅詳籌畫究極利害務要計出萬全具奏定奪勿得顧忌以貽後患邉儲屯種戸部㸔處了來說欽此欽遵抄出到司併呈到部臣等㸔得吐魯畨回夷變詐多端求索無厭自来侵犯我邉惟見利則進知難則退朝廷御之亦惟選將練兵廣屯積榖嚴夷夏之分以絶其内間公賞罰之施以勵其外攘遇彼來㓂則殺去奔勿追間有窮迫而慕義来歸則撫而有之以為我藩籬納欵而誠心來貢則禮而待之以施彼恩信雖自古帝王及我祖宗所以安中國而撫四夷之道不過如此未聞敝中國以事外夷撒藩籬而延㓂賊者也今查彼番自𢎞治年間連年用計殺虜哈宻嗣王哈尚善巴不聽撫處至欲領兵一萬攻我肅州我孝宗敬皇帝赫然震怒特准謀臣奏議執其貢使一百八十一名兩廣安置絶彼通貢彼遂失我器用藥物不能為生諸夷怨彼彼方悔過送還善巴後復許貢彼得漸置奸回於我國中上自京師下至甘肅無處不有其人無處不通其交結而受其反間積至正徳十一年大舉入㓂意圖原置奸回斬巴爾斯髙彦名等内應外合亦如先取哈宻故智唾手而取肅州幸得先任兵備副使陳九疇一時奮勇打死内應奸回殺退外攻各賊而又近差内附夷兵刼其老營外結衛喇特國人搗其巢穴彼畨大創乃因内間反致九疇死罪暨䝉皇上即位開釋復用九疇巡撫甘肅又值彼畨大舉入㓂又被九疇督兵敵退奏請閉闗絶貢彼畨復縱反間仍致九疇得罪而聲言求貢不許必來搶擄報復以恐嚇吾人然迄今四年並不敢一騎來侵近該提督等官奏准通貢將原欲安置兩廣畨使盡許放回今貢使未多入闗而彼畨又使頭目呼哩木納克䇿稜等以問信通和為詞勾引衛喇特國人數千乘夜直抵肅州近城若非遊擊將軍彭濬兵備副使趙載謀勇相資素有備禦而臨時遇儆又或私創九疇之禍梏守通和之說遲疑不敢發兵出戰而又非得素撫属畨助斬賊首則肅州城池必為所破而甘州以西五百里地方必皆難守矣此閉闗通貢孰利孰害不待智者而知也今各官奏内又執畨本所言陳九疇壞事為詞以見罪不在巳且既稱黄草垻堡有先來進貢夷人三十九名在内上城與堡外回賊荅話下城就將堡内防夷遊軍陳經等一十九名綑縳搶去六名又過四頃堡綁去按伏遊兵張桂月等四名夜不收二名别逓畨書言㑹衆畨王備下人馬五萬又有五千至此又出謾言起春到甘肅你們也把十三布政司的人馬輳著敵情變詐如此而各官奏内又稱各夷荅話已有懼悔之意又欲原其求通之情宥其不知之罪仍照原議起送赴京以圖罷兵息民前後若相牴牾事在彼中臣等勢難遥度况䝉聖恩業已許貢畨使臨門彼處官司戒前慮後必不敢㨿理揚威一時拒絶又况天朝政令當一臣等亦不敢輕議朝令夕改遽言絶貢及照提督尚書王瓊大才通變必有竒術轉危為安有非臣等常慮所及再照詹事霍韜所奏為國遠慮甚切而其查訪近事未真臣等逐一叅詳其稱吐魯畨未有悔罪之實而遽許通貢恐戎心益驕而邉患愈滋藥石之言也乃以畨文無印信足徵為疑不知畨文雖有印信又何足徵而足以制其死命乎葢惟有我識其變詐而弗落其計中以疑我忠臣弛我邉備則可矣雅克摩哩若原彼世臣擁帳二千來降輕納則後患委的難測臣等昔未到部親理其事詳究其實則亦與韜同此見也今究其實則雅克摩哩乃我屬番曲先衞人為彼擄去為之用事今遣我來近邉求和不得入㓂不敢受疑避罪束身來歸事為反正與其親弟滿拉丹珠爾軰主僕六人耳偕來老弱男婦數千乃自𤓰沙屬畨特黙格圗卜之衆是皆邉官業已受之而奏聞朝廷初不之禁矣今彼窮迫無歸而我撫處已定近者回人入㓂彼已斬送首級來報矣更欲驅遣無所往勢將轉恩為讐事變可虞而或乘其饑疲遂加撲滅則又非聖皇之仁也當此之時正當撫而有之以招彼擕貳而益我藩籬耳然臣等自來反復思慮惟欲固我邉疆保我中國耳至於興復哈宻之事則臣等綿力菲才念初不及於此也臣等昔時愚見惟聞哈宻之地外隔流沙距我肅州一千五百餘里比之太祖昔建太寧都司於境外四百餘里而太宗遷置於今保定太宗初置交阯布政司郡縣其地而宣宗棄之安南初不知其為棄祖宗疆土也哈宻主初封忠順王者乃元遺裔我太宗皇帝於永樂二年封之三年即故立其兄子未幾即絶而强立非其子孫者嗣之蓋嘗三立三為吐魯畨殺擄今其主自願歸畨而反欲引彼入㓂其民皆四散無遺矣故臣等初亦以為比之國初立元遺裔為和寧王為順寧王為安定王者事同一體而安定王又在哈宻之内近我甘肅今皆不知其存亡有無則興復哈宻之事臣等初慮實不及此也而更私憂以為若撫他畨以王哈宻則今雅克摩哩主僕六人決不能往使其他畨為之恐其强則叛我而入宼弱則畏彼而從之誠難保其為不侵不叛之臣也昔漢武開西域以㫁匈奴右臂者正今甘肅之地爾若謂哈宻興復而遂能絶北敵之通西戎以固我甘肅保我陜西地方則今宣府大同延綏三重鎮不能邀截北人之過河入套也哈宻之復其力豈能勝我三鎮臣等初見以為立之無益而歳受吐魯畨之挾我以為奸利則宜有覺而速改故興復哈宻之事臣等念不及此也今聞議者有謂勸陛下棄祖宗疆場之言臣等口禁目眩數日不能出一言顧惟提督尚書王瓊與韜皆素有高世之見非臣等淺昧所及故願興復哈宻一事特行王瓊在彼處之耳今㨿各官所奏事情除前回人入㓂實計若干我軍斬獲陣亡及被殺擄人畜各有若干有無重大失事隱匿不報情弊本部照常行彼巡按勘實另行外臣等愚見欲乞聖明賜勑一道特委提督尚書王瓊令其㑹彼甘肅鎮巡管屯田御史等官通召吐魯畨夷使而責喻之曰爾初兩次入冦皆被我陳都堂殺敗而又奏准閉關絶爾通貢且欲盡將爾貢使安置兩廣爾不得我中國藥物器用無以為生結怨諸夷爾累次逓畨文求貢而聲言不從則大舉入冦然四五年之間竟不敢來我邉臣亦嘗為爾奏求通貢朝廷疑爾昔日之惡累奏不准今來我邉憐爾窮困不顧利害保爾誠心悔罪再不入寇朝廷惟信我言准爾通貢今爾却令呼哩木納克䇿稜等勾引衛喇特數千寇我肅州今巳被我軍殺敗使朝廷因此不信我言將如之何若此出爾王子蘇勒坦莽蘇爾之意則新舊畨使皆當斬首梟令邉闗而遂舉兵進勦何貢之有然我天子是大聖人以天下為度視爾小夷欺擾猶蟣虱搔癢於皮膚也豈足為計但我邊臣仗義宣威豈甘受爾欺誑爾昔畨文謾言要在輳十三布政司人待爾此言我猶不忍爾奏也使其奏天子震怒我止發三鎮兵十萬直搗爾巢穴爾問爾國老成人爾畨人自漢以來有能敵我中國兵否我更奏討朝廷銀十萬兩好緞好馬各十萬疋令人曉諭近爾各種畨人能斬爾回回一首者賞銀十兩好緞好馬各一疋有能斬首千級來獻者即封為忠順王使居哈宻歲許通貢賞賜不絶爾回回之首能存幾何但聞爾言前此入㓂乃呼哩木納克䇿稜私擅所為王子止是使他來求貢初不知道又言衛喇特來尋特黙格我們當不住了以此未忍罪爾舊留貢使姑放出闗新來貢使亦放入闗但今毎起入闗止許十人多不過十五人其多餘人數勒令回國原帶貢物俱許驗交來者順帶來京賞物亦聽帶回㪚給經過地方止許一日一站不許延住二日有過三日者即不應付敢有似前驕縱不聽約束者輕則編置兩廣重則斬首地方仍令先回畨使齎諭王子蘇勒坦莽蘇爾知道今來入㓂他果不知則將呼哩木納克䇿稜等械送入闗以憑斬首示衆若係衛拉特誘哄得來則將衛喇特入㓂之人斬首百十來獻呼哩木納克䇿稜亦免其罪今次貢使既得放回後無再犯許貢不絶若不將呼哩木納克䇿稜等械送治罪又不斬送衛喇特入㓂人首級則明是王子知道縱惡今次進貢人安置兩廣連賞賜禮物通不發回再有侵犯必如前言征勦如此責諭庶幾威信並行而彼必知所歛戢矣更勑王瓊務要為國忠謀遠慮力求興復哈宻善後之䇿除前𤓰沙屬畨特黙格噶瑪拉圗卜等及原哈宻遺民輝和爾哈喇輝避禍來歸者不許逼回哈宻驅置虎口撤我藩籬損我天子好生之徳益彼四裔入㓂之黨外其餘凡有人之宗𣲖才力堪以服衆為主而近彼各夷之願從立國者及近彼地方各種諸戎有能共滅吐魯畨者即許為忠順王聽居哈宻悉從本官安處停當可信其永為不侵不叛之臣而後奏請欽斷給印封爵臣等不敢輕議亦不敢偏阻也臣等又竊料吐魯畨聲勢其民皆安土飽食不願入㓂其主蘇勒坦莽蘇爾先倚二大將和卓塔濟迪音雅克摩哩統兵於外而舍音和珊等數畨使為間於我中國耳今和卓塔濟迪音已殺舍音和珊等已誅而雅克摩哩又携貳來歸其勢葢亦漸弱故欲發兵五百近執雅克摩哩等於𤓰州尚遲疑不敢而致其來歸况今哈宻來至嘉峪闗一帶千五百餘里其地先有罕東齊勤等衞原我屬畨被彼驅脅供饋接應者今皆歸我欵塞彼來所經空地千里供饋無資又過流沙水無所得蓋其入㓂比前益難故今甘肅所憂不專在吐魯番而南有額布勒北有衛喇特皆北中驍勁衛喇特又比吐魯番離我頗近先時都御史許進之入哈宻城陳九疇之殺退吐魯畨皆結彼為援今反被吐魯畨勾引來㓂此而得慣則甚可憂也宜勑邉臣無以能招吐魯畨入貢為功而以諸敵在近恐其㓂我難禦為患故今當以通畨納貢為權宜以足食固邉為乆計然足食之計今時甚難而霍韜奏欲招商中鹽納糓聽商募民種榖實為有益陛下已命戸部議覆而臣等亦有計處與之相符先奏亦該戸部議覆本部案候另行外惟照衛喇特之來而被我邉臣敵退其泣怨吐魯畨招引之誤使我邉臣有識固可利而誘之以殺彼畨使其自相擕貳以不為我害此伐交之術今雖日乆猶可行也然衆皆憂甘肅之危日甚而臣等不揣竊有轉危為安之術惟在聖明張主於上一轉移之間而已蓋今彼中事情言者不一而聞者多疑羣臣有見或眞者不信而信者非真以是廟謨難定而在彼官民屬畨或未知我皇上恩徳之隆欲乞聖明獨斷選差御史一員部屬官一貟必其曉事不欺而誠心為國不隨勢變遷之人以往於彼邉境道里軍民休戚敵情强弱向背邉臣章奏虚實各項事情應該作何區處各處屯田應該何計開墾及凡軍儲何計可足邉圉何術能固逐一勘實漸次奏聞若彼先奏皆實原處無差者即便㑹同鎭巡等官安處停當務求堅乆不許朝令夕改若先奏可疑原處未當作急奏聞區處仍乞發自聖心見得當此隆冬念及肅州邉城極逺孤危而又被敵鏖戰之苦令齎綵緞布絹各若干疋銀一二十萬兩前去宣布我皇上恩徳垂念至意内將軍民曽經對敵守城者各賞布二疋指揮千百戸各賞絹一疋都指揮各賞緞一疋陣亡及殺賊獲功者各賞銀二十兩仍紀其功應陞襲官職照舊陞襲陣傷者各賞銀五兩遊擊將軍彭濬兵備副使趙載各賞綵緞一表裏前報功次勘實仍依提督尚書王瓊等所奏彭濬於實授都指揮僉事上量陞一級趙載陞叅政職事仍管肅州兵備以後二三年撫處成功仍依御史熊爵所奏超擢都御史在彼巡撫其原附乆住哈宻遺民哈喇輝輝和爾及先今來歸𤓰沙屬畨噶瑪拉特黙格圗卜等部下人衆皆毎家賞布一疋頭目三人各緞一疋諭以我天子恩徳萬里差官來撫爾衆救爾生命其新附願歸原土者聽歸原土其不願歸不敢歸者措給牛緞種子聽其趂時耕牧為築城池堅固約以世為我臣不侵不叛敵來近邉則堅壁清野使彼野無所掠食無所資不能一朝居此敵若㓂我則爾出兵以牽其後敵若攻爾則我出兵以觧爾圍爾我相為掎角永保爾生彼必感悦而世為我藩衞敵冦益少而邉圉益固比之遠復哈宻為力易而所得多矣至於雅克摩哩悔罪歸正棄戎即華情亦可嘉㐲乞聖恩量授一官特賜冠帶衣服一套其弟滿拉丹珠爾量與冠帶通事名色跟來三四人俱充勇士食糧使居甘州三二月以耀彼國人而招懷來者仍送來京居住以審彼國俗而料我邉事所益多矣緣係回人入境官軍擊斬退走隨逓畨文討要稽留夷使等事及節奉欽依兵部㸔了來說及這本所言兵部逐一叅詳籌畫究極利害務要計處萬全具奏定奪毋得顧忌以貽後患事理奉聖㫖覽卿所奏叙述哈宻吐魯畨夷情本末條畫詳悉其言禦戎在於選將練兵廣屯積榖尤為有見這畨夷變詐多端大言誑惑挾求通貢㨿其投逓畨文多非情實各官先後論奏亦復自相牴牾朝廷從寛不究已勑尚書王瓊一切撫待安挿進貢防禦興復哈宻等事都要處置停當不許輕信易言以貽後患今不必再冩勑爾部裏只備云行文書與他著遵照前㫖叅以今擬責諭之言省令畨酋悔過革心以圖保全若再稔惡不悛即便奏聞動調大兵征勦且選練撫勦正係提督大臣責任屯政糧草巳勑都御史劉天和整理若再差他官前去訪㸔未必皆得其真亦非責成之道還著他毎用心料理不許茍且誤事前勑事理照舊行雅克摩哩情偽難測向背未定著同各夷都暫在彼處地方安挿聴提督鎮巡官再為審處具奏定奪輝和爾哈喇輝等來歸有年豈有遣回之理彭濬趙載既殺賊有功各賞紵絲二表裏彭濬陞都指揮同知趙載陞陜西布政司左叅政仍管肅州兵備事其餘功次著巡按御史上緊勘明具奏陞賞陣亡陣傷人員著鎮巡官量為賞犒其餘的罷欽此病瀝餘忠疏臣屢進瞽言無益於用䝉恩弗罪義當知止然今病困之極恐一朝遂死終負聖徳不敢不言切惟自古天生才徳異常之君必使之遇天下難處異常之事夫惟此君用人行政必如祖宗創業所為而後可保祖宗之天下若止如守成之君惟用守常之人事皆為彼持禄固寵之計則天下殆矣今我皇上才徳超邁今古然實遇天下難處異常之時也初繼大統欲尊所親本為正理可一言而定也乃以事稍異常羣議横沮困心横慮數年始定然尚頼皇上至孝天性人不能移凡言合於尊親者雖疎逺之臣亦信必行由是定此大倫成此大孝者發於至誠也今天下民窮天變禍基所㐲其事難處有甚於尊親百倍者陛下必深念之矣然曽謀之近臣若何而可濟乎夫親親而仁民道本無二言舉斯心加諸彼而巳陛下惟推昔日必欲尊親成此大孝之心而為今日必欲救民保此大業之舉則靡忠言不聴靡真才不用靡善政不行而民生可救大業可保矣天之立君以為民也往惟一處饑饉而今各處皆饑往惟一歲荒歉而今連歲皆荒切見今冬少雪深恐來歲又旱將如之何我皇上至仁天縱深加憫惻不待人言巳發官銀數百萬兩各處賑濟并代民輸租其銀不知曽各到彼而所在地方有米可糴否也不然何日聞餓殍之多先不體上心而為之豫言豫處有任其責者乎人不敢言也臣固知我皇上體天愛民之心無不如古帝王無不如我祖宗而所以致此者實由臣等所用之人所行之政不及古也天下之事盡在六部而六部之中吏戶兵三部尤重日見廷推所及皆衰疲慎黙徒保名位之人有一輸忠為國任事者衆忌且謗大則罪小則斥矣今天變如此民窮如此一朝有事有誰敢當有敢當必推之於外而阻之於内使其掣肘難行半途而廢不能退不能遂而窮促死矣由是衆欺陛下曰此等之人不可用也近今天下事有可一人一月了之者必使衆人牽滯使其終年累月不能了有可一言一日决之者必使衆論牽纒使其連篇累牘不能决此所以天下之事日廢而天下之民日累以窮也天下者祖宗之天下也陛下之天下也天下之民陛下之赤子也猶昔追崇皇考聖母者陛下之父母也幸推此心自作張主臣等為大臣者亦願皆以古語存心曰見有禮於君者事之如孝子之養父母也見無禮於君者誅之如鷹鸇之逐鳥雀也毋反所為以誤國事由是任賢勿貳去邪勿疑而天下大治矣陛下試即臣世寧之任兵部而召問當道曰此人居此位稱否天下有事可托之否彼如曰可則應之曰如此衰病如何可使一朝身死孰可代之令其急求二三人以代不可臨時倉卒又用如臣者以塞也至於他部亦然至於戶部尤重蓋自祖宗開創以來百五十餘年天下疆土田賦止是而内外用度比舊加數十倍雖歲常豐收猶且不足而况歲荒無徵其何能贍故必得通變有才之人理國如家者而後可濟也今得吏部善用人户部善理財則民生自安盗賊不憂其起邉境自足夷狄不患其侵兵部得無大事矣不幸二部有欠而盗賊􅉕起邉冦交侵不得已而用兵猶頼吏部所用之人以領兵戸部所蓄之財以贍軍故臣兵部全仰給於彼二部不敢不言也或謂選將責在兵部者蓋惟守邉常職耳今軍政不立乆矣若遇中原盗起而專命武將之出貪功好殺盗猝難定而民命已殘惟得文臣能帥者監而統之則相機度勢撫捕兼施然後脅從可散而首惡就擒賊可早滅地方不致大殘矣陛下試問當道今尋得如是者幾人儲養在京緩急可用否再以臣世寧昔所建論而試問之曰此人所言之事果可行否所薦之人果可用否彼如曰不可則曰言事不可用是不知事也薦人不可用是不知人也否則挾私欺罔也用之豈不誤事當急求其人以易之耳何必待彼僨事而後誅之也是不惟保全臣亦保全天下事也夫賢者天下之利器也早得賢而用之一日則能早救天下事一日何可惜臣衰病一人而不惜天下事也陛下試一留神則臣等緊要之職孰為可用孰不可用可用者宜加信任不可用者宜早罷黜必無不當矣用人當而後善政可行民生可救大業可保也如臣世寧衰憊之極到任以來理事未及二旬卧病又逾半月兵部豈臣養病之地而可復用乎臣病弱膽小常恐天下事有誤不敢貪位茍容㐲惟陛下明如日月將臣言留中省覧特賜昭斷臣力疾昧死上言不勝愧悚奉聖㫖卿所奏朕知道了今邉方多事卿宜即出供職若病未痊可暫免朝叅只在部管事該部知道欽此盡瀝餘忠以求採擇疏先該臣世寧初䝉改職因疾未任竊效古人敷奏以言之義冐陳十事奏奉聖㫖卿素著謀猷且諳練世務覧奏皆經國籌籩至意事闗兵政的待卿到任之後逐一審處推衍明白次第開奏定奪其餘該部㸔了來說欽此欽遵臣今到任以來理事二旬卧病半月前事未能逐一開奏實為遲誤而事該他部㸔議者亦未見覆奏况今各處饑荒如此邉境空虚如此而况或言天灾可憂倘或一時盗賊􅉕起更或敵兵大入束手難禦臣雖萬死無益祖宗天下可憂此臣所以連朝抱疾中夜哀思而不敢不摘其緊要三事以言也事之𦂳要一曰增武備二曰用人才三曰足邉儲而足邉儲之計又有三焉臣謹遵奉明㫖逐一審處增損原詞推衍明白開奏於后切惟救亂猶救火也國家養兵備亂猶人家儲水備火也火之初發積水在近而人力噐具皆在目前則速救易止若水在遠一時難致而人力器具又不夙備則火必延燒而難於撲滅矣此居今之世養兵蓄將而謹備糧儲不可時刻以緩也臣今衰極病甚勢難再出以報陛下至於遲誤國事雖死難忘故今昧死上言伏惟聖眀採擇天下幸甚計開一增武備往歲募增京軍二萬有餘此皆驕惰未經戰陣緩急難倚者也今莫若於遼東大同宣府三鎮各添遊擊二員山西薊州各添一員毎員各統銳兵三千閑時則與原與遊兵輪畨二員在京近郊住劄另營操備如遇中原盗起或大敵㓂邉則併調一隅防戰不過半月可集此於緩急中外有倚此臣所謂儲水在近而人力器具皆備遇火易救不致延燒比之命將出京軍虚聲實用大不侔矣其遊擊則命各邉鎮巡推舉銳兵則於各邉選募月糧行糧并冬衣賞賜皆與正兵均給而命户部於各邉照數增添庶不有誤一用人才今天下士習因循率多依阿自保而能捨身為國折衝禦侮弭盗安民者極為難得今在朝文職止有李承勛伍文定二人能統軍旅然皆位望已崇小㓂不宜輕出國家養兵蓄將不可一日無人近該輔臣奏議久欲薦其人而迄無薦者蓋其人難知知亦未試而巳試得效者又多小疵詿誤不敢薦也然一朝有事將如之何臣訪得原任都御史馬昊陳九疇二人昊則先任僉事四川殺賊有功歴陞巡撫因叛夷招討遣人夤縁權奸奏逮至京而黜間住九疇先任兵備猝遇畨戎入㓂内誅反夷外退强敵而為畨使舎音和珊等反間搆間後任巡撫大破畨衆而偶以報功差誤及為憸人聶能遷等反間流謗逮至充軍臣謂此二人者可宜收復在京不拘大小職以備緩急之用又有原任副使施儒楊必進二人皆先任御史後陞兵備皆殺賊安民有功楊必進則有誤劾一人之失施儒則因禁民恠俗一事之謗以致考察閑住臣謂此二人可收復原職再試其才能功蹟而進用之臣非謂此四人足以盡天下之才也亦求千里馬未得而先買馬骨以來之意也四人之中陳九疇為最而頻遭罪黜人多疑之昔唐郭子儀之薦李光弼宋吕夷簡之薦范仲淹皆先國家之急而棄私讎今大臣皆公忠體國非有私憾於九疇也因彼讎敵之反間得行而一時難解耳或謂臣屢薦九疇不慮違衆之罪當得重禍者臣豈不憂蓋今文武將帥中未見此人雖有此人亦將懲彼效忠得罪而莫肯捐軀為國此臣之所以不得已有言而私禍不計也臣竊有譬焉主人十僕有一不偷衆皆忌之隣盗謗之聞於左右而因信之言於主人而遂黜之老僕曰噫此一人枉䧟不足深惜顧今主家有事皆以為戒而莫敢用力誠恐主僕因以漸衰此老僕之所以終夜哀號思欲代之而不可得也㐲惟聖明察臣此意一足邉儲今邉儲最苦不足而足之道有三一曰廣屯種夫屯種孰不欲廣然毎差官督勸不能增者急於起科得利也夫歲收不常而租有定額則開墾者利未得而害已隨故人不敢開種今若查比北直𨽻地方欽奉太宗皇帝聖㫖事理聴令各屯原額抛荒及空閑地土不拘土客官民軍舍儘力開墾永不起科則有利無害而人樂於興種矣蓋所貴乎廣種多收民間米榖價賤發銀可糴則邉儲易足矣至於南方謫彼充軍為民人犯宜責拘解當房眞正家小到彼盡撥各武職員下作為伴當責之收管使為墾田而照名代出本處軍伴操守則彼勢難迯而人可漸多種可漸廣矣今聞户部始議覆奏又查出水樂二年令各衛所屯田官員軍餘家人自願耕種不拘頃畝任其開墾子粒自收不許比較及正統四年令大同宣府遼東陜西沿邉空閑之處許官軍户下人丁儘力耕種免納子粒則臣前奏聴其開墾亦不起科明是舊例可行有益邉儲而該部又欲兩請或聴開墾永不起科或候三年成熟徵糧則臣前所謂歲收不常而租有定額人不敢開種矣㐲乞聖明俯念邉方田荒歲乆儲蓄日無特如臣奏施行地方幸甚二曰興鹽利今天下生齒煩於國初數十餘倍食鹽者衆矣故今私鹽盛行而官鹽未嘗不售其所謂私鹽不禁能阻官鹽者蓋襲舊時之說也故今宜於額外多開商中不限引數聴其買補若慮勢要占窩專利則毎歲開中止將引目發邉付巡撫都御史并管糧郎中聴其就彼召商責限完糧而後填給違限不完者則轉給他人其若都御史郎中召報容私致緩糧餉者聴巡按叅究則自無此弊矣至於灶煎私鹽宜於出塲總路設立闗市守把止許賣與商人有引之人而本處軍民願買者亦湏納官得引始聴如此則公私鹽利皆歸國用矣然又湏低昻其權使輸粟於邉者量地遠近米價貴賤倍減其數而又得先掣納銀本處者隨時旱澇鹽價貴賤倍増其數而又與遲掣則商人益勸於輸邉灶丁益利於煎鬻軍民得易於食鹽而巡邏之卒可減鹽徒意外之禍可弭其為上下之利益不一而足也三曰預收糴毎常邉糧不肯趂賤預買及臨用兵發銀貴糴且逼人强賣公私勞費不貲今宜妙選各邉管糧部官責其月報米價貴賤歲報田收厚薄如其豐收米賤之時那借官銀數十萬兩到彼多糴米糓貯倉或計今年所糴可彀後二三年之用宜即扣後二三年該給糧銀又於他邉米賤處所收糴成查應解邉糧地方時價米貴則量令折銀解邉備糴如此通融計處務使遠近官民皆便而邉糧易於措積蓋亦治家通融之法也但其糴糧全在官司立法簡便革弊嚴明不許減價掯勒難收以致靠損屯農方可常糴臣聞今歲遼東米糓甚賤但發一歲之銀可糴二歲之用而二年免發其次宣大米尚可糴亦宜差官發銀到彼預糴米榖以備客兵添兵之用惟若延綏寧夏毎銀一兩止可糴米五七斗甘肅毎銀一兩止可糴米二三斗然聞其地缺乏尢甚軍士不可枵腹而戰亦宜户部差官齎銀到彼多方設法於有米地方貴糴顧運轉般至彼以救其危急可矣奉聖㫖卿所奏委曲忠懇朕已知悉增武備誠為急務但邉兵無事難以掣調見今團營已各選有聴征官軍正備緩急之用只恐不曾著實操練便著委任坐營聴征將官另營操備務要號令嚴明武藝精熟遇有聲息就著領去應敵若原委將官才力不稱另選相應官員更替管領馬昊屢經各官薦舉行取來京聽用陳九疇罷施儒楊必進吏部查他黜革縁由應否起用具奏定奪足邉儲三事戸部議擬斟酌奏請施行欽此實陳病勢早乞代任䟽臣乆患病弱不堪重任向在病中䝉改今職力具本三辭弗允只得强疾到任僅得理事二旬疾病大發只得回家奏為病危乞恩急救殘生解印調理事奉聖㫖卿有疾暫准在家調理痊可即出供職印信照舊掌管吏部知道欽此臣病不痊恐一朝遂死終負聖徳奏為病瀝餘忠事奉聖㫖卿所奏朕知道了今邉方多事卿宜即出供職若病未痊可暫免朝叅只在部管事吏部知道欽此臣聞命感愧淚滴枯腸心懷芒刺激昻思奮而困憋難支蓋前疾病止是見人臨事一時怔忡難過而閉戸静處猶能披閱文巻改僉奏牘今則文案一字不能㸔詳公私一事不能酬度矣部中事務皆頼僚屬酬應近臣二奏皆在日前具藳待今齋祭之間而後敢上臣實病勢不能再出供職矣邉方多事兵部重任㐲乞聖㫖早選賢良代臣前職庶不有誤大事至於臣之病軀狼狽客死無益於事伏望聖慈憐憫早放還鄊使臣得一就南舟或得到家一見父母墳墓而死不勝感戴天恩之至臣以病廢出於無奈不得已累干天聴罪該萬死不勝戰慄謹具本奏聞㐲候勑㫖奉聖㫖卿引疾乞休屢有㫖慰㽞如何復有此奏本兵重任朕方倚託宜用心調理痊可照前㫖即出部管事再不必辭吏部知道再陳病勢懇乞天恩代任以免誤國䟽准吏部咨該臣奏為實陳病勢早乞代任事欽奉聖㫖卿引疾乞休屢有㫖慰㽞如何復有此奏本兵重任朕方倚託宜用心調理痊可照前㫖即出部管事再不必辭吏部知道欽此臣奉㫖感泣幾欲隕絶思臣樗櫪朽材而乃誤䝉天眷如此隆厚義當委命圖報豈意病弱難支如此然臣所以汲汲求代者正為本兵重任疾不能堪恐負聖明倚託一朝誤事死有餘辜耳若臣病勢料無痊可之期而死生遲速上惟君相所命不敢再乞矣但縁臣素愚戅為國多言不無有拂人情恐或乘此謗言臣疾未甚以致未䝉君父見察使臣白首不欺之心含寃地下亦為可憫今臣心神兩目畧無可用而齒髪六脈皆有可辯伏乞聖恩天地父母俯賜矜察不勝幸甚臣有此苦情不得已冒萬死罪奉聖㫖卿引疾乞休屢有㫖慰㽞今乃再陳病勢情詞懇切准致仕著馳驛去有司月給米三石嵗撥人夫四名應用該衙門知道欽此謝恩䟽臣以乆病不堪供職恐孤任使累奏乞休節奉温㫖慰㽞今以病弱之極恐無痊可之期再陳苦情奏奉聖㫖卿引疾乞休屢有㫖慰㽞今乃再陳病勢情辭懇切准致仕著馳驛去有司月給米三石歲撥人夫四名應用該衙門知道欽此欽遵臣聞命感激口不能言竊念臣本樗櫪庸才蒲桞衰質未秋先凋因事已謫不意年既耆艾復遇聖明徳由天縱才不世出欲興三代之治盡録一世之賢採虚名而及㣲臣起罪隸而為卿輔叨官八轉竊祿四年恩榮祖父偕贈侍郎䕃及嗣子得入胄監臣之受恩天地至矣盡矣而乃困於疾病㳙埃莫報臣昔陳疾自揣奉職無狀方憂罪責難免而乃更遇聖恩天地優容准臣致仕賜臣馳驛更勑有司月給食米歲撥人夫榮養終身臣之感激何可言喻臣今得歸巳分餘生之無幾惟思聖徳之難酬若幸疾病少間日惟仰天拜祝期聖壽之無疆願皇儲之早建而已臣初得請亦欲待病稍痊勉力進朝躬謝面辭復得一覩清光而去今不意日乆未痊足弱難於步履神怯易於眩暈不能進入辭謝將出國門無任哽咽謹具本令親男胡純齎捧奏聞臣不勝隕越待罪之至奉聖㫖卿有疾不能詣闕具本謝辭知道了欽此病亟陳情懇辭恩命䟽時起南京兵部叅賛機務下同臣病息淹淹神思昏眊不能修辭成奏止叙實情上祈君父臣以病廢罪黜之餘得遇聖明召用四載叨官八轉銜至一品恩榮祖父蔭及嗣子毎有狂瞽之言輒䝉虚已聴納平生腐陋之學幾得盡展臣之受恩自謂近古莫及矣犬馬圖報之心豈肯半途而廢乎第臣不幸元禀素弱疾病歲乆受任以來不自揣度圖報太急用心太過以致舊疾益甚徃歲冬盡今歲正初連月不能理事恐致誤國累奏乞休累䝉温㫖慰㽞然臣病終於不痊臣職難於乆曠不得巳銜哀苦請特荷聖慈許臣馳驛還鄉致仕賜臣月米人夫應用臣病不能詣闕具本辭謝乃於二月十一日含淚出京不意在途轉患脾泄不能飲食幾致殞命至四月初五日始得到家遇舊醫服藥十日始愈又十日更發舊疾痰火身畧就坐即欲傾仆眼或視物則皆動揺不能片時衣冠對客雖父母墳墓亦不能一徃省視連月不能出戸日以待斃是皆原籍官司及徃來士夫所共知也臣又不幸母塟孤遠被人侵塟暗害致臣旬日之間連喪二孫身疾遂痼在朝不能供職報主還家不得寧親育後臣恐後患無窮不得巳於八月二十二日啓遷母柩還鄉臣卧小舟迎見哀痛幾絶是後即患昏熱七晝夜不知人事自分必死幸今殘喘未絶急卧舟督工啟土將厝臣母不意九月二十四日勑書到門䝉恩復起臣南京兵部叅賛機務臣受命感泣驚惶無地即於本月二十七日權厝臣母於近鄉淺土臣亟回家服藥治疾兾圖上籍寵光病得少愈勉赴恩命不意元本既虚醫療反甚今臣旦夕倚枕雖親族問候不能勉對欵語豈能衣冠出坐堂府伴諸内外大臣賛理㽞都重務也臣若貪昧不言非惟上稽恩命亦恐有誤國事故今不避煩瀆冒死再瀝真情伏望聖慈明見萬里收回成命别付賢能容臣照舊休致得安枕席以正首丘臣不勝感戴天恩之至奉聖㫖卿忠誠素著歴練老成㽞都叅賛重任特兹起用豈可復以病辭宜體朕懐上𦂳前去到任慎勿再辭吏部知道欽此病乆無奈乞恩認罪降黜䟽臣以病亟陳情懇辭恩命奏奉聖㫖卿忠誠素著歴練老成㽞都叅賛重任特兹起用豈可復以病辭宜體朕懐上𦂳前去到任慎勿再辭吏部知道欽此欽遵臣聞命感泣驚惶莫措即欲起程病不能强因自仰天而呼曰天胡降此奇疾使臣不死不瘳負我明主不能效用也中夜哀思竊惟古之聖皇量才擢任非愛其人而寵利之也真知其人之足用而有益於時也古之賢臣度徳受官非利其禄而尸素之也自量其力之能勝而可以濟時也若或君授非才臣受非力則誤國難免矣臣本凡庸賦命至薄昔在先朝因豫言宸濠事囚禁充軍罪錮六年濠敗得還幸遇陛下龍飛即䝉顯用今將十年矣然以命薄多災又因言禮言治為時宰所棄中間曠廢往來歲月甚多止任巡撫四川二月兵部左侍郎八月南京吏部左侍郎六月南京工部尚書二月都察院左都御史僅逾一月刑部尚書十月兵部尚書二十日䝉恩官至極品分不能堪然雖在任之時猶多在告之日故臣雖有犬馬之心畧無涓埃之報過䝉恩㫖毎以忠誠見許又以再辭為戒臣之受知明主雖死莫報臣又聞孔子君命召不俟駕而行孟子雖謂其當仕有官職而意非在官則不然然孔子大聖所遇當時列國之君猶然也今臣以下愚之人得遇天下大一綂之君英明不世出之主豈可一日稽命是知臣之不能赴任雖死莫贖况今世學不講士習囂偽多有以托疾自高而獵名取位竟無實用者臣竊恥之迺今不幸眞疾乆淹形跡𩔖此臣今若不受罪非惟人不知儆而中心亦不自安臣初回家䝉恩賜月米歲夫優養貧病自䝉起用已即扣除尚存一品官階臣病不堪叨冒實由命薄使然伏願聖恩天地父母憐臣本心赦臣死罪特示顯黜或止削臣加官而容以尚書照舊致仕或通革官銜止令閒住或為民使臣得就家安養數年幸而病得稍瘥行可謁陵坐能對客之日臣願請授南京吏部刑部或都察院一簡静衙門使臣職易稱而事易行不為茍祿然臣身雖在逺如遇國有大事君相許言臣當盡言事有不虞係臣職守臣當死義所能圖報惟是而巳其他職務臣精力已憊冄無能為矣臣不敢一言欺陛下亦不敢一事誤陛下也今天下皆憂陛下未有皇儲臣昔過憂亦嘗有言今思漢武帝年十六即位年二十九始生戾太子年六十餘始生昭帝今人間老年得子者尤多乃是知生子遲速有命可以裕待而無庸急憂耳惟願陛下清心省事愛養精神謹身節慾保固真元使聖徳萬年常如今日之清明聖躬萬年常如今日之强固則以聖明恒御六龍而宰輔同心體國刍心務知人安民而真才必用善政必行如此而尚憂民生不遂聖治不隆天命不祐皇儲不廣者未之有也方今人材難得而自古人君皆以容受直言為美稱今之言官果有素非忠貞挾私排擊者固宜罪之其或言雖未當心本無他者宜賜優容若其心本納忠言切治理者宜用其言而顯其人以養天下忠直之氣則陛下聖徳永傳於萬世矣臣愚受恩莫報昧死惓惓謹具本順差承差楊鉄持齎奏聞伏候恩㫖奉聖㫖㽞都叅賛重任朕特命卿今既屢奏患病情詞懇切准照舊致仕這員缺便上𦂳㑹推相應官兩員來者勿致缺人廢事吏部知道欽此胡端敏奏議巻十
