body:
  text: 胡端敏奏議巻一明胡世寧撰陳言時政邊備䟽時官南京刑部主事伏讀𢎞治十一年十二月二十一日詔書内一欵天下軍民利病時政缺失有可興可革者許諸人直言無隠欽此欽遵臣聞古昔聖王皆求言納諫舍已從人求以制治未亂保邦未危故能四海無虞萬代稱仰今我皇上聖徳上同堯舜天下治安逺過漢唐然猶下詔求言如此其切者是即古聖王不自滿假之盛心也有君如此凡在臣工敢不敬應臣切見今天下承平日久法度廢弛士風頺靡奸弊百出地雖廣而民益窮兵雖多而財益困文臣雖多忠勤憂國者少見武將雖多智勇出衆者罕聞且自古偏安小國猶有人才能禦外侮兵亂凶年未見民力困於今時者故雖以全盛之天下而坐困於小醜之跳梁上厪聖慮下殫民財其大勢有如中年以後之人軀幹雖大肌肉雖豐然而元氣已虛血脉巳滯雖陛下為元首獨明於上而羣臣為股肱耳目者悉皆痿痹聾瞶不堪任使顧不如彼侏儒少壯之人故使人身如此倘更有風邪乘氣虗而入此時必費調理國勢如此倘更有盜賊乘民窮而起此時必難支持故善養生者及未病而藥之庶可保其遐齡善治天下者亦當及其未亂而制之庶可祈天永命近年以來災異頻仍天心儆戒端為此耳臣愚不知聖明宵旰曾念及此否也左右臣僚有言及此否也臣本愚陋幼生艱苦有親不能自養有身不能自立自充生員補廪膳中進士任推官叨陛下祿養親于今十年臣心感激無巳臣身欲報無地顧臣受詔之初任外職未知朝廷政務未敢輕率進言今䝉陞職南京又逾一年臣感恩愈深欲報愈切仰稽明詔求言尚及諸人况臣叨祿竊位感激如前非諸人比何敢負恩終於緘黙故今昧死㤀愚晝夜思索得今軍民利病時政邊備所當興革十事謹以上陳如䝉聖明俯察特賜採行天下幸甚愚臣幸甚臣干冒天威不勝戰慄一曰嚴考覈以正士風臣惟士風之邪正係天下之安危故晉尚清談而禍亂立致周興德行而治化隆長此其騐也今我國家承平日乆朝士安於豢養狃於因循亷節掃地趨媚成風以通達為高致以亷退為矯激以推奸避事為老成以黨惡和光為忠厚其羣居言議所及心志所向不曰陞官則曰成家其有語及國事當憂民瘼當恤者則衆怒羣猜百口排斥不曰生事則曰好名使必無所容身不能出言而後巳至於公差所過地方則論有司奉迎遲速以為賢否事故回還原籍則視官府囑託行否以為毁譽咈其意者或本亷幹惜民反謗之以害民順其私者或素奸貪誤事反譽之以能事以此賢否混淆是非倒置科道風聞而彈劾因以不眞銓曹誤聽而黜陟因以欠當故今在外官員上自撫廵下至州縣皆不暇為國忠謀為民造福而惟營送京職以媚其口看顧鄉宦以恱其心盖以為此軰貴近能為禍福如此則譽彰而得陞不如此則謗行而見黜若夫小民卑逺雖得其心言不上逹故寜負公家而不負私室寜害小民而不害巳身天下靡然同風不可收拾致令任事之人不見用而所用之人不任事以致朝廷法度廢弛天下軍民疲敝而上厪宵旰之憂者此也臣愚乞勑吏部精選各處廵撫并按察司正官都察院精選各處廵按御史俱用剛正有為不畏強禦之人凡遇京官出外還鄉之日其有徇私囑託公事倚勢豪横鄉里者黙以名聞以後京官不拘科道翰林部寺等衙門亦如外官三年一次吏部都察院考察務要勵忠勤奬亷退抑奔競汰罷軟其有忌疾賢能曲為謗毁者必行顯黜以勵其餘至於在外撫廵以下官員不恤民瘼不奉公法專以結交京宦違道干譽為事者許科道彈劾廷議訪實而奏黜之其或考黜之中間有孤忠衆嫉誤被謫官者又許公論薦揚仍照原資不次陞擢如此則黜陟既公士風趨正而眞才軰出能為國家任事矣惟聖明採納幸甚二曰崇節儉以制財用臣惟皇上以恭儉之德撫平成之運内無遊幸之好射獵之娱外無水旱之災征討之費安養休息今十五年是宜財貨充盈公私富足如周成康如漢文景可也夫何近日内帑空虗國計困乏邊儲多者無二年之積州縣貧者無十金之藏一議出兵便憂缺用甚者賤鬻散官巳行古衰亂茍且之法矣不知有事之時更將何處且在祖宗朝同此土地同此稅糧歲常蠲免而又外討戎夷内營城闕財常有餘今則上無前數者之費下未嘗得免一年之租而已財用困竭如此何也唐陸䞇有言用之盈虗在乎節與不節耳不節則雖盈必竭能節則雖虗必盈推贄所言則在昔祖宗朝創業事多而財用盈者能節故也今日守成事少而財用缺者不能節故也今財賦所出比舊無増而内府供用不知比舊加幾倍矣中外宂食不知比舊加㡬倍矣上下風俗之奢官員餽遺之厚其所費財物又不知比舊加幾倍矣是皆内侵公府外剥民資而得之民若之何而不窮財若之何而不匱也此事羣臣屢言朝廷屢禁而不能止者内有沮法之人外無執法之吏故也伏願皇上以祖宗之付託為重以邉務之困急為憂念此軍士無財以養之則散念此小民盡財而取之則逃民迯軍散常切于懐凡事痛加抑損力為撙節特勑户部禮部工部通查内府各項供用之物比國初舊額加添若干凡此無益於事者一皆裁革而又申諭左右勲戚之家各守禮法各崇節儉各為國惜財各為巳惜福至於官貟餽送之厚訪實治罪而又公吏部黜陟之權以轉移於上士民奢僣之弊立法嚴禁而又選法司剛正之士以執持於下則臣民内外節儉成風而國用自足民生自遂矣惟聖明採納幸甚三曰從權宜以足邉儲臣聞今西北二邉備敵軍多糧儲缺少每歲撥河南等處民糧齎運到彼接應此等糧米若責運本色到彼交納則路逺艱難民累迯竄兵法所謂逺輸則百姓貧者此也若許齎價錢就彼糴上則邉儲湧貴人益困窮兵法所謂貴賣則百姓財竭者此也臣念此事最為難處如䝉特勑該部計議通筭山西陜西近邉王府并將軍儀賓祿米及各府官僚并司府州縣官貟本色俸米通該若干合無比照公侯伯或京官折俸事例每石折銀五錢或七錢每歲就於秋糧折銀或各様課銀内定撥總解各布政司交收責令就彼分給缺官月日扣除邉用却將下年山西陜西糧稅盡派邉方或附近收貯敵退事閒則抽軍就食敵來事𦂳則就近搬運至於彼處歲辦課物亦乞留糴邉糧如係京用不可缺者則乞改派别布政司代納如此暫行三年則轉運不勞而邉儲自足矣惟聖明採納幸甚四曰立簡便以收鹽利臣聞各邉軍餉多頼鹽課近因河東鹽官自賣銀最為利便其淮浙鹽自來召商中納但今法久弊生商中不便事有多端臣請備述鹽引直價數多商中納糧數少勢如民間二月賣絲五月糴榖急圗應用貴物賤售一也中納之時勢要買窩奸豪作弊所納糧料𩔖非真正邉儲不得實用二也鹽易消化聽支日久催目未免多收竈丁數倍加納日累貧窮鹽課虧欠三也客商中鹽納官錢糧雖少經歴衙門私費使用則多暨後守支則壓於勢要臨賣則滯於私鹽甚有父死子代而未得支鹽財散人亡而不能還鄉者彼既失利後有召中恐不即來勢當减價失利愈多緩急難倚四也商利既㣲𩔖多夾買餘鹽及勢要中鹽鹽徒私販朝廷為彼三事設官秤掣委吏廵捕甚者欽勑大臣為之整理而三者卒不能禁下至秤手邏卒旁午紛紜徒増民擾五也私販之徒貪利畏捕沒海沿江招引逋逃窩納盜賊出持兵器歸肆搶奪官軍邏卒莫敢攖鋒此勢不散臣恐淮浙切近南都又臨運道復有黃巢張士誠者出於其間六也古遷豪右填實塞下今山陜富民多為中鹽徙居淮浙邉塞空虗七也惟此七弊所當區處臣查得淮浙水鄉竈丁每鹽一引折納價銀六錢或四錢又聞客商中鹽邉儲每一大引不過價銀三二錢是鹽課收銀比之收鹽待中得利加倍也又聞竈丁畏鹽難納多願納銀近年兩浙鹽課内將一半折銀民情稱便臣愚乞勑户部計議合無今後淮浙鹽課通令從便折銀其銀數乞照水鄉舊價而畧减比商中糧價而稍増酌為中制定立每鹽一引納銀㡬錢逓年立限徵收解邉糴糧或如臣前所言准作俸祿價銀却換彼處糧米派作邉儲仍查客商鹽引未支若干盡撥各塲或從願改撥長蘆鹽賤處所許令每鹽一引自買私鹽二引或三引准作官鹽發賣各塲置集凡竈丁有鹽客商有引者㑹集一所委官監買仍令把截臨塲總路不許零碎私賣期以一年或二年通買完足即絶商中以後竈丁煎鹽聽令自賣或轉賣與客商其出外販賣者止於州縣給引限以地方不禁私鬻貧竈無力煎辦者即撥富竈餘丁或僉有力願煎及有罪該徒之人而代之如此立法則國家得鹽利自多而不必多方整理竈丁得煎鬻自富而不必更免糧差鹽可通賣人無争奪勢豪專利之弊不禁而自息山陜射利之民可驅而漸歸邉境漸實邉儲可充廵邏秤掣之官不必設鹽徒意外之患不必虞待後日久事定鹽課歲額止令州縣徵解而理鹽衙門漸可裁减其為公私之便省上下之費盖不一而足惟聖明採納幸甚五曰汰冗食以選將校臣惟今天下軍職有罪者不革有功者日増俸祿日多民財有限將何以給臣愚竊聞英宗睿皇帝曽與大學士李賢憂議及此聖諭云此事誠可慮當徐為之惜乎當時大臣多為身計無肯為國忠謀奏行祖宗之法以將順睿皇帝之美者昔我太祖高皇帝優厚功臣雖定軍官子孫皆得世襲然必比試得中而後用之固不以生民膏血養無能之人也欽定大明律有云若軍官有犯私罪該笞者附過收贖杖罪解見任降等叙用該罷職不叙者降充總旗該徒流者照依地里逺近發各衛充軍若建立事功不次擢用固不以朝廷爵祿賞有罪之人也暨後法司奏征討官當論功定議我太宗文皇帝聖諭有曰朝廷大公至正之道有功則賞有過則刑刑賞者治天下之大法不以功掩過不以私廢公此軰征討之功既酬以爵賞矣今有犯而不罪是縱惡也縱惡何以治天下其論如律此我祖宗報功之厚立法之嚴是亦天地春生秋殺並行而不悖耳今論軍官私罪徒流以下徑擬還職雖雜犯斬絞亦止發立功且又立功定以年限無功亦得還職全非太祖定律之意更以太宗皇帝聖諭律之縱惡孰甚焉借使天地常春而秋殺不施則天下之物積而不散往者不過來者難續天地之化亦幾乎息矣今之軍官有増無減有賞無黜何以異是臣謂聖皇法祖憲天此事誠當為處况今新官襲職例不比試舊官比試亦為虗應故事故此軰自倚世襲之官不湏才能不畏罪黜恣為貪驕不習武藝不惜軍士論今天下軍職動輒萬計歲支俸給何啻百萬而其間無一人堪為將領能出戰陣者此以全盛之天下而坐困於小醜之跳梁真可為之流涕也失今不處後益難圗然此弊廷臣皆知無肯言者顧念後魏張仲瑀請抑武人身為所殺魏弗窮治國遂以衰今若言彼觸忌或下錦衣衛掠問則彼得肆怨甘心矣故寜緘黙負朝廷幸保其身無事耳臣愚昧死不敢自惜伏願皇上復太祖之成法佩太宗之格言繼英廟之盛志為後世之永圖特勑兵部㑹議凡今軍官私罪悉依大明律擬斷該降級者降級該罷職者充軍其降級充軍者非真有戰功不許擢用聖恩若念其祖功不忍棄其子孫亦待有罪之人身故方許其子孫替襲至於内外衛所見任軍職亦乞先下明詔令其本身并户丁俱預習武藝一年選委忠勤剛正識大體知武畧廷臣各一員分投前去㑹同撫廵等官面加考試自都指揮以下軍官不能躍馬彎弓或持槊舞劒閑一武藝者即令罷黜其有子試中能代者即令替職無子或不能者就令立功一祖子孫有武勇者借襲無者暫停或令減俸優給以後軍官子孫襲職或弟姪借職者不分新舊俱要比試武藝熟閑身力強壯而後得襲否則暫停或令減俸優給如此簡閱則天下軍職冗食者漸減而所任者皆堪為將領能出戰陣之人平居則課其訓練軍士有事則責其身先行伍而惟擇主將以御之嚴軍令以督之將見戰無不勝守無不堅而敵人不足平盗賊不足慮矣惟聖明採納幸甚六曰閱軍實以修武備臣惟今天下衛所原額軍士迯絶者多實在者少以迯絶者言則逺年丁盡或埋沒者歲歲清查既無根影近日病故或逃亡者年年勾解隨復迯回空累里甲造冊勞費貼解艱難或購買孤遺以作清出之户丁或替取貧婦以為軍人之妻小甚者或因清軍而命斷於箠楚或因解軍而産破於盤費此民間清軍解軍極苦而無益者此也至以見在者言則在衛軍士差占者多操備者少至論操軍又惟虗應故事教塲虚設而金鼔不聞或金鼓雖聞而武藝不習甚或得財賣放掛名行伍身不在營故今養軍雖多能戰無幾在邉遇敵則嬰城固守而坐視鄉民之被掠在内有警則奏聞後遣而先累民壯之被傷此民間空出力以養軍而又先代軍死甚可痛也至論役占之弊尤不忍言且如漕運京糧通論民間加耗脚米及衛所船料糧賞之費大畧費米三石始運一石至京而軍士之勞不計焉至運邉儲勞費又不止是今每月糧米一石一軍支給而又加以馬疋草料投跟勢要買間止納銀三二錢耳此以民間三四石米之費而止為勢要賣銀三二錢天下若之何而不窮也且在昔充軍之户或由垜集歸附未必皆是有罪何今貧絶而不免清勾在今充軍之人悉是奸豪巨惡未必皆是可矜何不數年而節䝉宥免因兹輕重不均人愈玩法况今東南力薄之人充軍西北既不得用西北近邉之人充軍東南亦常迯回彼此無益理宜通處臣愚乞勑兵部㑹議選委兩京能臣分查各衛軍籍見在若干故絶若干其在先丁盡户絶累經清報兵部者即免清勾以除民擾以後果有埋沒自首者即收本處被人首實者追解邉衛其見在者又分在衛住有家業若干逓年原籍勾補若干其勾補者即係不肯服役緩急難倚之人合無此等軍士除在京及在邊衛分仍前勾補不動外其在南京并各處腹裏衛分者悉改編原籍衛分以免其迯然後以今改編并在衛原有家業者通筭各衛實在若干其有缺伍則另選軍餘舍餘願報食糧及犯罪例該充軍者補充軍罪囚再弗赦宥其見年五十以上該問充軍者即許子孫家人替當軍士在迯二次三次者悉依大明律科斷其情重人犯例該邊衛充軍者望體祖宗立法之嚴責賣家産全房遷發使絶歸念其或一時難賣則令里甲鄉鄰各依鄉例認佃租課每歲除天荒及代納糧稅外其餘本處官司上納三年一次亦如軍裝𩔖解該衞分給本軍以為盤費庶㡬軍士在衞皆有土著各畏法律而迯者少矣至於衞所管事之官猶望并省勢要役占之弊嚴加禁革於是分委將校教習武藝武藝既精一可當十而後教以團營走陣之法使知坐作進退之節如此則軍皆可用而民出力養之不為虗矣惟聖明採納幸甚七曰廣收蓄以儲將材臣念國家自正統末年以來未嘗與敵一大戰故彼益驕矜日肆侵侮所以然者我無能將故耳朝廷累下明詔訪求諳曉韜畧弓馬熟嫻之人舉試擢用然此等全才世不多有故迄今並無一人應試成功者臣愚又念古之才勇未必專閑弓馬或更不識文字試之或不能中式用之則必可成功者况今天下治平止是四裔跳梁文武大臣中非無能發縱指示者顧無偏禆驍勇之人故不敢出奇取勝耳論今所急正在偏禆若臣前所言汰冗食以選將校則武職中固皆可將者矣然而天生智勇當不專在此軰之中故自古國家用兵常乏將材民間盗起多是豪傑臣愚以為莫若即此軰而收之則既獲將材又弭盜賊策之上也如䝉乞勑兵部計議通行天下軍衛有司積加訪察凡軍民中有膂力過人武藝精熟者悉選在官其良民不願者不必强逼選在官者軍則任以把總管隊民則授以總甲教師等項名目畧加優給使之隨軍操練遇賊擒拏積勞多者量授職事以旌賞犯罪重者即發邉方以立功至於兵部亦乞比照工部添設主事等官十員精選廷臣或進士中才畧明敏者為之平時則令草奏以習運籌有事則令出差以諳邉務才弱弗稱者改選别部才能稱職者專陞兵備及邉郡知府等官惟此二途之中收養既多其間必有真才出用而能為國家除大患立大功者矣惟聖明採納幸甚八曰立經制以禦外侮右臣前所言汰冗食以選將校閱軍實以修武備廣收蓄以儲將材三事果如施行則各衛軍將固皆能戰者矣臣惟自古京軍最怕逺征客兵尤忌長屯故隋末盗賊起於征遼唐季叛卒起於戍廣今發京軍逺征延綏經年不還割心腹以救四肢誠非計也况邉境有急請調京軍往來奏覆緩不及事臣愚以為莫若自今分定在京直𨽻衛所官軍止應宣府遼東山西衛所官軍專應大同陜西衛所官軍各從所近分應延綏寜夏甘肅量皆出征不逺屯戍不久平時無事則止令邉軍操守有事𦂳急除遼東宣府必湏奏請京畿官軍出援外其餘各邉總兵官一面奏聞一面徑調該應衛所官軍前去策應固不必命廷臣以撓其權出京軍以分其食而經制已定緩急有恃外侮不能侵越矣惟聖明採納幸甚九曰重將權以責成效右臣前所言兵食雖足經制雖定然而將權不重則威令不行士不用命亦難成功臣聞趙將李牧守邊得便宜置吏市租皆入幕府日饗士卒數年不戰趙王終用之不疑故能破殺匈奴十餘萬騎單于奔走不敢近邉宋失邉險戎狄最强宋太祖分命李漢超郭進等備之皆久任專制厚其財帛如趙李牧軍校有訟郭進者送進自治故當時諸將感激皆能以一郡之力抗禦強敵宋祖得無西北之憂得專力於東南削平諸國此古人任將之明效也臣愚伏讀我太祖高皇帝命將制詞有曰古云將在軍君不與者勝汝等其識之又謂大將軍徐達有曰閫外之事汝實任之又曰將者三軍之司命立威者勝任勢者强威立則士用命勢重則敵不敢犯又諭征南將軍胡廷瑞有曰何文輝為爾之副湖廣叅政戴德從汝調發二人皆吾親近之人勿以此故廢軍政凡號令征戰一以軍法從事此我聖祖命將之成法也今各邉總兵廵撫見一敵出一軍賞一有功戮一不用命皆不得自專必湏奏請事由中制彼得推干故難責成功常致誤事唐陸䞇所謂鋒鏑交於原野而决策於九重之巾㡬㑹變於斯湏而定計於千里之外者甚非計也朝廷豈以其人不足委任耶固宜改委其人推求忠勇歴戰之人以為總兵遴選壯毅有謀之士以任廵撫惟才是使雖小官授以節鉞而無嫌惟勑是遵雖崇爵聽其指麾而無礙固不宜拘泥資格而用巳衰之人亦不宜驟與崇階而賞無功之士選任既當尤望陛下體聖祖之成法效古人之命將假與威權使得專罰多與金帛使得厚賞至於臨期應變料敵出奇惟其所為而不為中制朝廷惟握將將之權有功則陞賞有罪則誅黜如此則將士用命事㡬不失而彼得成功矣惟聖明採納幸甚十曰用間諜以覘敵情臣惟兵將雖練然而不得地利不知敵情則動乖所之為彼乘襲有敗無勝是如瞽者之射雖挽強弓發利矢何益於中哉臣切料各邊軍士不下數十萬敵騎控弦不過數萬然彼常侮我有餘我嘗禦彼不足者盖由彼能用間而事事得乎兵法之所利我不能用間而事事犯乎兵法之所忌故彼常擄掠因糧於我也而我則困於逺輸彼常深入屯我重地也而我則散地難戰彼常形我而自無形也我則為彼所形而不能形彼故如彼欲專攻大同也而佯為移攻宣府之形彼惟分遣數騎也而誑為將發大衆之語使我被擄之人聞之見之而隂縱之歸以報我故我且疑且信而各邉屯戍愈分愈寡愈久愈疲彼則專攻我一處而力嘗有餘且又時出數騎或見或伏半進半退以為我形我將信而攻彼耶則或為所餌而遂遭䘮覆或疑而不攻耶則又為所掣而肆行搶掠此彼常得志於我皆能用間之利也往年長夏屯我大同彼犯兵家之忌矣使我有間知彼虚實諳彼道途則大同軍士堅壁與持時或出兵以制其抄掠或隂計以毒其水草而又㑹約宣府延綏合兵策應或出其左或攻其右或將𢷬其巢穴或先截其歸路或虚聲使彼動揺或潜軍出其不意彼將進無所獲退無所歸祈死乞降之不暇奚敢再為邉患哉此所謂不戰而屈人之兵者也上年之入我河套也前有延綏之拒後有黄河之阻左有大同右有寜夏掎角之勢亦可行前之策然我皆不能坐失機㑹者由不能用間之弊也故臣以為今之道邉備莫先用間然古人用間非止一端今則我軍出外輒為所獲彼之左右我亦未知則生間内間未可先用也顧惟彼有擄掠探聽入境之人為我所獲者我惟不逞小忿免其誅戮不惜厚賞恱其心志因而用之則彼中酋長有心慕中國者我得以知而招懐之有自相猜忌者我得以知而擕貳之有陰為間諜者我又得以知而誑惑之由是五間可以次第畢用而彼中事情我無不知我師所出動中機㑹蔑不濟矣惟聖明採納幸甚應詔陳言疏近該𢎞治十八年二月二十二日早欽奉聖㫖朕方圗新政理樂聞讜言除祖宗成憲定規不可紛更其餘事闗軍民利病切於治體但有可行的著各衙門大小官員悉心開具明白來說禮部知道欽此欽遵臣莊誦再三懽忭累日伏念自古英明之君多或始勤而終怠未有如我皇上臨􅊩多年始終一德平居不邇聲色不殖貨利未嘗行一不義戮一不辜凡古聖王之懿行無一不具而又當此治安積久之餘震發圖新政理之舉下詔求言如此其切也臣素懐忠朴感恩欲報之心久矣於此不言更待何日然臣竊觀自古天下未有君聖而不治亦未有民窮而不亂者今雖天下如此其全盛聖德如此其修明然而逺近之民困於征輸苦於力役煎熬於官吏之侵漁凌逼於勢豪之兼併流離餓殍日致消亡臣前任湖廣親見彼處流民雜處山林者不啻數萬近在南京切聞江北饑民枕藉道途者不可勝數自古民窮則思變此事聖心固所深憂而欲求其利病之所在矣然以陛下聖德憂勤如此而民之生理未復治之實效未臻者何哉臣見往時軍民利病臣下每有建白朝廷亦多採行既而部下之司司下之府若州縣其上下催督不過傳寫文移一次而未有發諸中心斷然欲行者也此猶事之小者如此若其大者則皆箝口而不敢言或雖有言而不見用此無他陛下所用之人多懐持祿固寵之心少有憂國愛民之志故也臣自𢎞治六年中進士以後聽選考滿十有二年之間四次至京每過道途則見村巷之寂寥生理之消索比前窮困數倍及至京城則見士夫之用度餽遺之往來比前豐富數倍私自嘆息以為天下之勢官日富而民日窮京城日富而四方日窮財之趨上猶水之注下在位者又從而决之民若之何其能生也大臣建議有言宜崇節儉矣然而奢富者日進有言宜抑奔競矣然而恬退者未錄貪墨者皆言當去而貪聲大著者或雖衆口彈劾衆目指視而猶存亷正皆言當舉而亷介特立者或以一事差失一人怨謗而即去甚者士大夫聚談之間惟及世情私鄙之事恬然不以為恥而或間有一人憂民為國執法行事者則衆口排斥百計謗毁必使無所容身此其勢必將盡驅天下之人閹然皆無忠義之氣而後巳此所以負陛下之聖德孤陛下之用心而無以救天下之窮民成天下之治理也故今軍民利病紛紛目前臣愚不敢枚舉而竊意其當務之急則宜公用人以回天下之士風汰冗費以裕天下之財用重守令以救天下之窮民然其本原之地又在陛下勤學問廣延納以照臨之於上而持守之於久耳至論天下之命繫於太子太子之善在於早諭教與選左右則所以輔導而教養之者不可忽也臣伏讀聖諭有曰除祖宗成憲定規不可紛更臣有以仰見陛下深知為治之道必在法祖大聖人所見真出尋常萬萬也故臣竊獻愚忠不敢别有建白惟舉祖宗成法所當遵行或雖巳行而猶未盡者六事祈以仰答明詔之萬一耳若夫將校之當選軍實之當閱與凡邊備邉儲等事則臣前歲巳有愚見十條上塵聖覧今不敢逐一再陳也如䝉聖明不棄蒭蕘併賜採納不勝幸甚計開一勤學問我祖宗列聖皆日御經筵講讀經史至於大學衍義一書我太祖高皇帝因問宋濓知其為帝王為學之要特命大書掲於兩廡之壁時睇觀之暨我仁宗昭皇帝亦喜此書曰此為治之條例監戒不可無因留一部朝夕自閱此我祖宗創業守成共垂我億萬世無疆之休者雖由天縱之聖其得於講學切要之功不可誣也皇上聰明睿聖天下之書固宜盡閱然聞帝王之學貴得其要臣愚欲乞聖明監於成憲特取此書時加省覧更選賢臣日備顧問則於前代政治得失今日民情事理與凡奸邪害政之人姦弊害民之事可以無不周知而於施為緩急之間自然皆適事機之㑹而當天人之心矣固不必徒費精神而泛讀天下之書也臣又竊見此書其間所言辨人材察民情嚴内治教戚屬之四者在今日尤為切要伏願聖明於此更加詳玩至於近臣外戚亦宜頒賜使皆講習則彼自知忠謹之得福各畏驕盈之得禍可以長保富貴於無窮而禍亂不生刑罰弗及仰全陛下親愛保恤之恩是亦天下萬世之幸也惟聖明採納幸甚一廣延納我祖宗列聖皆親賢納諫好問好察故於言路之責既付科道而政事得失又許諸人直言常朝之官既得燕見而諸人言事亦許直至御前此我祖宗列聖所以知人則哲官人必當而下無隱情上無弊政也以後御前奏事之例既廢而羣臣燕見之時亦少以致天下民情不能上逹而人材真偽亦未周知所以用人循資而未當行政多弊而難革漸違上下交通之㤗以致天時災旱之多民窮嗟怨治亂將分忠計之臣多切憂此今頼皇上天性聰明洞眀治體赫然奮發將大有為大臣既常賜見羣臣又許進言天下傳聞欣然以為堯舜復生矣然臣猶願陛下法祖成憲益𢎞治理復開御前奏事之例兼廣諸人言事之途言如可用即付施行言或未當亦示優貸至於大小百官更宜直日輪對館閣近臣又當不時咨訪則天下民情既可因是周知而人材真偽亦得因是面試以後用人必無不當而行政自無不宜矣何患民生之不遂而治效之不隆也哉然今羣臣疎逺日久一旦驟見天威嚴重敬畏之過不無舉措失儀語言失當者猶望聖恩如天矜宥其罪畧降辭色使得從容久自慣便必無此失矣惟聖明採納幸甚一公用人我祖宗朝皆立賢無方故能得真才實用而成治功也今則清要之官專取一途之士如内閣之推先如李賢薛瑄不由翰林今則專以翰林矣翰林之選先如胡儼劉球不由庶吉士今則專以庶吉士及進士第一甲矣舊如年富由教官而陞給事中王翺由寺正左遷復陞御史今則此等之人不用矣所取之途既狹無怪其得人之難也其他百官叙轉惟憑初選偶得之基不顧終身踐履之實進士初選美官則惟循資而可立登要地一除外職則雖有才而或終滯下僚資格之拘既定薦舉之條徒設京官雖有保陞知府之例而所保悉多循資之人外官雖有取選御史之途而所取或遺方正之士推奸避事者得以避怨而早陞忠勤任事者亦以任怨而早黜故今士人初入仕途即有夤緣求得美選之心既得美除即為持循保守祿位之計近年進士之輪選者聞有南京之缺而即避近侍之該陞者遇有京堂之缺而即争平時既皆趨利避害之心臨難豈有捐軀報國之志養成此等士風專用此等人材而欲與圖新政理臣恐聖心獨勞於上而無益矣古者刺史入為三公郎官出宰百里唐宋所取狀元進士皆先試歴民事而後召試館職或令再試他官而後擢居臺諌蓋以臺諫翰林上寄朝廷耳目之司下儲公卿宰輔之望不敢輕試以新進之士也我聖祖論人之姦良亦言試之以事而後見今豈可以新進未試之人而槩居耳目股肱之任也伏願皇上今後用人悉由祖宗成憲及斟酌唐宋遺制大而輔弼公卿特選老成才望敭歴中外能任天下大事能知天下人才之人而用之不必拘以出身翰林次而翰林科道尤宜博選内外郎官之中求其才德年貌之堪稱者照今布政陞副都御史主事改光祿寺丞及查先朝胡儼劉球年富王翺等官事例不拘品級科第改任此職至於進士舉人之初出身者悉授外職知縣等官嚴責撫廵公加訪察擇其有守有為之人每歲一報吏部待其三年或六年任滿行取到京擇其文學德行者擢居翰林剛直公正者選入科道才識眀敏者分任部寺屬官其有長於撫字深得民心者再令補任三年超擢府州正職至於監生吏員出身小官果有才行卓異者一體超遷其餘一應中常之人循資遷轉貪酷之徒即時罷黜其在前初授京官者不拘各項衙門悉令外補州郡試歴民事亦待三年或六年視其才能功蹟而黜陟之其間果有才堪大用不次該遷者又許大臣公薦於朝吏部奏請陞用不許似前夤緣奔競僥倖陞擢如此則士風以回真才以致而庶官得人政理可圗矣臣知此言一進近臣必皆切齒或以希求進用坐臣然臣實無才且多疾病冒居今職巳為過分豈敢再望陞擢此言實欲為陛下求得真才以佐維新之治耳惟聖明採納幸甚一汰冗費我祖宗朝同此土地同此稅糧歲常蠲免而又外討戎夷内營城闕財常有餘今則上無前數者之費下未嘗得免一年之租而巳財用困竭賤鬻散官行古衰亂茍且之法矣不知有事之時更將何處也昔唐陸䞇有言用之盈虚在乎節與不節耳不節則雖盈必竭能節則雖虚必盈惟䞇所言則在昔祖宗朝創業事多而財用盈者能節而無冗費故也今日守成事少而財用缺者不能節而冗費多故也今財賦所出比舊無增而内府供用不知比舊加幾倍矣中外冗食不知比舊加㡬倍矣上下風俗之奢官員餽遺之厚其所費財物又不知比舊加幾倍矣是皆内侵公府外剝民資而得之民若之何而不窮財若之何而不匱也此事羣臣屢言朝廷屢禁而不能止者内有沮法之人外無執法之吏故也伏願皇上以祖宗之付託為重以財用之困急為憂念此軍士無財以養之則散念此小民盡財而取之則迯民迯軍散常切於懐凡事痛加抑損力為撙節特勑户部禮部工部通查内府各項供用之物比國初舊額加添若干再勑吏部兵部通查内外冗食非國初舊額員數若干共費財若干凡此無益於事者一皆裁革而又申諭左右勲戚之家各守禮法各崇節儉各為國惜財各為巳惜福至於官員餽送之厚訪實治罪而又公吏部黜陟之權以轉移於上士民奢僣之弊立法嚴禁而又選法司剛正之士以執持於下則臣民内外節儉成風而國用足民生自遂矣然此事臣於前歲巳言而今復進者誠以在今當務之急莫切於此也惟聖明採納幸甚一重守令我祖宗朝慎選親民之官如洪武初年取中進士多選縣官徵至天下賢才悉授守令宣德年間府州正官多用大臣方面保舉後犯贓私舉主連坐故當時守令得人小民受澤即今民窮日甚餓殍流離朝廷恩惠莫能下及者皆平時守令不職所致近年明詔大臣推舉京官堪任知府之人又每次知縣知州缺多即於聽選舉人監生内通行揀選其法固巳為善然猶未盡得人故臣竊意以為與其推舉於未用之先欲求稱職又孰若選委於既試之後能得真才也與其偶試一論之高遂與崇職又孰若歴官數年之後畧轉資階也蓋凡天下司府州縣之官俱以正官為重而佐貳為輕今之在外㕘議僉事同知等官儘有堪為知府者府州同知通判推官縣丞等官儘有堪為知州知縣者是皆品級相近出身相同論理可以量才更用今則拘於陞選一定遂使數年屈於佐貳不得轉舒而見任知府知州知縣中常之人又歴九年方得改任故今守令常不得人而善政多不能行小民常不䝉惠宋神宗所謂祖宗百戰得天下今以一州生靈付之庸人者誠可痛也伏願皇上仰法祖宗愛民重守令之意而益𢎞薦舉之道於前推舉揀選之外更勑吏部精選各處廵撫并布按二司長官都察院精選各處廵按御史責令訪察各道司府州縣正佐官到任一年或二年之後其司府佐貳有堪任知府者府州佐貳有堪任知州者州縣佐貳有堪任知縣者各具名實奏行吏部酌量遷改其見任知府知州知縣才力不堪供職心志不專為民者各照品級相近改調各衙門佐貳首領及鹽運提舉等衙門官員吏部都察院則專考撫廵藩臬之採訪不公及無所臧否者而奏黜之更乞今後百官陞授畧倣李唐均調内外不歴刺史不得任侍郎列卿不歴縣令不得任臺郎給舍之制進士出身不得徑選科道部屬舉人出身不得徑選同知知州京官外補不得徑陞㕘政副使而惟推訪知府知州知縣之久任卓異者而逓遷之則守令知重而凡善政可行民生受福矣惟聖眀採納幸甚一慎輔導我祖宗朝輔導皇儲之官如宋濓楊士奇儀智等或延聘四方名儒不拘以出身科第或妙選各部老成不專以任職翰林故能盡得一世之賢用以輔成列聖之德伏讀我太宗文皇帝勑諭輔導之臣有曰推廣仁義道德之源開陳二帝三王之治與太祖高皇帝之大經大法凡創業守成之難生民稼穡之事朝夕講論以涵養本源恢𢎞智量此我祖宗擇人以盡輔導之職者其成法具在也伏願皇上監列聖之成規重萬年之國本講論雖以得人而更憂未得輔養雖已盡道而更憂未盡敷求天下必得正人大之如宋濓之博聞有道次之如儀智之直言不阿者使兼講讀之官以任輔導之責至凡左右供奉之職悉選老成忠慎之人使之旦夕承弼有善則書有過則諫至於講讀議論之間道德固稱堯舜而聖祖開創之難前代興衰之故亦當備述政事固先禮樂而邉境艱危之狀閭閻窮苦之情尤當備道眀良際遇固當舉以為法而自古姦邪誤國忠直遭誣之事亦當引以為監典謨訓誥固當日進誦讀而大學衍義一書甚切君心治體者尤當時奉省覧持身威重是也而詢謨納諫則當導以畧降詞色養德安静是也而詰戎治政亦宜勸以稍習勤勞尤望皇上萬幾之暇親臨試問其人如是輔教則用不如是輔教則黜一有邪佞雜乎其間則速去之勿使留為令德之累則一人元良萬世永頼矣况今輔導之臣後以舊學之恩將有卿輔之望尤宜慎簡於初惟聖明採納幸甚胡端敏奏議巻一
