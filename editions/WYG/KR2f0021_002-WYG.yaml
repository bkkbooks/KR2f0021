body:
  text: 胡端敏奏議巻二明胡世寧撰乞全恩信以處降賊疏時官江西兵備副使臣以病廢庸才誤䝉擢任勑委東鄉撫捕盜賊到任之初即因姚源叛賊王浩八等流刼廣信縣係臣所轄地方領兵到彼隨賊追剿至六月賊平方得回至東鄉行事彼時新縣城池尚未成立舊招賊黨俗號新民尚懷反側未知的數臣恐驚疑單身扶病到彼諭以朝廷恩威曉以法度利害誓言舊招不殺再叛不招而茍有違犯者一依法律處治决不姑息彼皆感泣告願招回良民共安田里然無奈地方光棍幸災生事外則誑言賊反内則妄傳兵至以驚惑良民少肯復業後至七月將盡因賊首艾茹七被提不出萬念玖復行讐刼各民恐被連累告縣追捕不意大賊首樂庚二陳邦四賈馬七次賊首樂庚三劉瑞五陳慶六陳慶七胡重一等集黨拒捕遂行讐殺臣偶䝉提督都御史俞諫取至餘干議事聞變借領民兵千餘連夜進縣嚴督向化新民將前背招倡亂首惡及其餘稔惡從亂賊徒次第擒斬其有逃出嘯聚者又䝉提督軍門調兵勦絶獲功奏報外其餘舊招新民千數自臣到縣之日皆蟻附軍前聽調殺賊内有王賽一者原係賊首其居近山頗險其黨原聚頗多是日全夥來見即被地方光棍火其房屋擄其財榖本犯守法不敢拒敵次日調彼進賢追賊為樂庚二等所敗其黨力戰被傷四人被殺十人本犯隨勸賈馬七將樂庚二等擒送到臣臣又訪得本犯手下賊徒鄒鎮十一聽招後又曾殺人其同夥賊首楊勝四稔惡丕改本犯皆自擒送官不敢隱匿又聞賊首艾如七等先被追捕投彼不納紏彼同亂不從以此各賊勢孤次第就擒今各賊平後本犯自知平素讎惡不為地方所容自將馬匹鎗刀首送入官告願充軍逺害臣已呈稟提督都御史俞諫暫發本犯府城覊候其原舊手下徒衆分作三處照舊安挿外惟照本犯自臣到後不曾背招今又自率黨與投首又擒賊犯送官正係節奉恩詔所當推誠撫恤之人今畏地方不容告願充軍逺害情亦可憫臣愚伏乞聖明俯念地方曲全恩信將本犯編發稍近衞所充軍仍飭所在官司不許無故戕害使其徒黨聞風羡慕以後聽招新民若有避罪逺害自願充軍者亦聽地方官員徑呈撫按衙門定衞發遣原有産業聴從變賣隨行一時難賣者責令有司召佃収租三年一次解彼供給庶幾讐寃可散而地方可安况查降賊収軍宋時嘗得其用且為地方開此一例使後有劇賊難除一時請兵未到而州縣之力不足以制者得縁此施行亦可以少舒地方之急臣又念今地方光棍讎刼聴招新民不得安挿及誣陷復業貧民不得安生官府畏其流言挾制彼此異見互相執持不能禁止雖今新民畏威銜德不敢抵敵貧民負痛含寃無處控訴然恐乆而不禁則彼積怨難消衆怒難忍或有卒然之變復起姚源之禍者矣如䝉聖恩特申前詔嚴勑上下官司務要同心一令自今新民小有違犯依律處治其若再犯刼殺必行勦㓕不許再招至於地方光棍有犯擅殺新民及誣䧟平民者亦要依律抵命不許姑息新民舊刼良民財物既不追究其以前光棍寄騙新民財物者亦不追討至於各擄妻子必須追還完聚不許隱匿庶彼各免驚疑各畏法律各斷讐怨而田里可復生命可全一轉盗亂之區復享昇平之福矣奉聖㫖兵部看了來說昧死陳言地方利害疏臣病且死妄言負罪當死然臣死不惜而猶敢言地方利害者食禄二十年且備員按察職所當言雖死不敢忘國也伏惟聖明謀及忠計之臣垂察焉夫自古盗賊之興即當撲滅於㣲若其既乆而多則不得不撫捕兼行者蓋以情則脅從當罔治以勢則延蔓難根誅也故如漢武帝以南征北伐之威不能盡殺盗賊及後輪臺詔下休兵恤民盗賊不見其迹又如漢龔遂當宣帝彊盛之時下令渤海諸持田器者為農民吏無得問固不聞其誘使釋兵而盡殺之也向者山東直𨽻河南江西各處盗賊動輒數萬非我皇上洞明治體屢降恩詔撫散脅從繼命將帥誅鋤首惡豈能平定如此之易哉其自古招撫之失有當戒者謂如唐宋金元之季官其渠帥授以土地假以兵權更或因其懈弛而遂行誘殺見其䟦扈而復事姑息以是威信兩失紀綱大壞坐致衰㣲耳若今委任得人撫處有道萬無是失也只今江西之賊華林碼碯剿散無餘東鄉舊招遺黨尚及千人姚源或云三倍其數然臣不能實知也其他尚有贛州舊招之徒新淦初起之衆動皆以千為數至於樂安建昌等縣亦有餘孽觀望反側未盡消除今以事理言則在東鄉者皆原被脅從舊日招定之人亦既憤其首惡之䧟已而助官擒斬矣其他别有違犯者亦皆陸續送官治罪不敢隱匿其在姚源者舊雖聽招不曾流叛近於王重七等之殺官焚縣大肆兇惡彼則始憂濫及而有觀望之罪後求自雪而有助討之誠此二處賊情應議撫剿之招案也以人情言則今地方大戸自重身家者懲其往日决不肯與之聨居又有一種豪强光棍始以助官殺賊為名中以通賊寄贓得利暨後以誣執平民嚇詐財物為業惟恐事定還鄉則新民告取財物良民告償人命鄉黨雖安彼獨受罪於是外則胥動浮言挾制官府内則讎殺復業良民及聴招新民而各誣以罪使之不得寧居必至變亂而盡行剿殺以㓕其迹此等之事官府動於浮言各立意見或以為罪或以為功雖有為地方深計者彼此牽持莫之能禁今民間所苦第一光棍第二盗賊而兵擾次之為之父母者所以急求安定以全其生而彼豪民光棍搬居城市方得藝業欲圖延捱歳月累死平民蕩空鄉土而罪名可掩兼倂可肆有如置身風渡之中衆皆失色速求抵岸獨為水手者方傲歌住楫乘時射利而過客不知風濤利害或信其言以為然其亦可痛也矣今姚源請兵勢當必討固無容議矣其他盗賊有言當撫者曰彼既脅從聴招已定朝廷恩信豈可輕失蓋惟待之以誠治之以法嚴禁光棍不許擅殺以前過惡永不追究再後有犯决不姑息則彼知一人之罪不累衆人今日之刑非為昔日自然心恱誠服帖然助順不過鋤治數十人撫治三五月而事定矣若其誘殺一處則處處驚疑而起當此民窮財盡之時兵連禍結為之奈何有言當剿者曰今日地方大户皆欲殺賊衆口同辭以招為誘浮言既不可解擅殺又不能禁彼固賊耳安能保其上下激之終不為變哉變則招撫之人獨罪難當矣固不若剿則成敗利鈍與衆共之地方之禍自彼地方使然也於我何咎此則撫剿二䇿未有定見之情弊也如臣愚見則謂舊招者不殺再叛者不招而新起者必撲滅於㣲即此三言而事定矣故先追賊開化賊勢甚彊二省議招臣獨不可今在東鄉賊方信服欲臣誘殺心亦未安為守前說耳然不敢自以為是也特不敢欺隱弗陳以備採擇焉耳朝廷憫念地方節次差官體勘賊情及羣臣功罪一時難定蓋由事目繁多文案堆積廵歴難遍於鄉邑採訪或謬於傳聞又况忠臣或逺或去而又耻於自揚智士日近日親而又巧於媒孽雖有至公至明必須假以歲月方得查實否則一時輕信誤聽未免有傷公正之體以孤忠義之心若前賊勢衆寡賊情向背則早宜勘報以定撫剿畫一之論庶幾官有定守民有定志而地方早得寧息耳然臣又慮江西地方之禍不止盗賊可憂者即今天旱之乆民窮之極赤地千里而水泉亦竭田禾無収而麥種難下來歲民饑賑救無備省城被火延燒萬室基地所便盡歸王府債負所責遍及閭閻莊田所逼民乆立寨三司官員多被鈐束問刑叅吏等事舉奉成案施行近者買辦漸行於外府搔擾遍及於窮鄉臣恐不善處則良民不得安生皆起為盗臣下恐有隱禍多懷二心禮樂政令漸不出自朝廷地方之事益有可慮者矣臣伏見寧王懿親天資英睿博學多才凡在朝廷臣子無不敬仰豈有毫髪過議者但由内外臣僚輔導非法自因劉瑾討衞兵以來威勢日盛而上下官司承奉太過也臣愚欲乞聖明廣集羣臣及江西鄉土有識士夫㑹議或於見在都御史俞諌任漢中專委一員或另推才望服人公忠體國不避權勢不惑浮議大臣一員前來地方兼任提督廵撫之責假以陳金彭澤之權使其統御將帥調度兵食激揚清濁易置官吏興革利弊皆得便宜於前各處新舊盗賊應撫應剿或先或後悉聽計畫萬全奏聞區處至於光棍害人奸貪怠政等事悉從禁革其於乆困窮民妙選循良曲加撫綏早期休養務使安全更乞温詔戒諭賢王益崇謙德逺避嫌疑遵依祖訓止治其國内官僚而江西三司以下政務聽令各官照常自行若有事情重大應合奏請者奏聞朝廷區處不須該府干預更宜嚴戢下人恪守禁例施舎已責惠及貧民莊田基址悉還原業内臣軍校等項擅出外府生事者悉令取還再有稔惡不悛及額外投充者聽令法司提問如例更乞嚴勅鎮撫以下官員俱要查照欽奉太宗皇帝聖㫖事例凡遇王府發放事務必須奏准方許奉行違者重治庶幾小民有再生之望地方無意外之虞宗室有磐石之固九重紓南顧之憂病廢小臣不勝伏枕踴躍欣頌太平之至申明職掌以安地方疏伏讀大明律一欵凡國家政令得失軍民利病一切興利除害之事並從五軍都督府六部官面奏區處及聽監察御史提刑按察司官各陳所見直言無隱若内外大小官員但有本衙門不便事件許令明白條陳實封進呈取自上裁若知而不言茍延歲月者在内從監察御史在外從按察司紏舉欽此欽遵臣叨任今職已及二年切見本地方軍民利病有該興革事宜合當奏聞區處乆具章欵因病乞休不敢煩瀆然恐知而不言茍延歳月有誤地方身雖罷歸罪則難逭計開一擬定東鄉里分查得先該總制都御史陳金奏立東鄉新縣擬割臨川縣五十五都至八十都金谿縣四十一都安仁縣十五都十八都十九都餘干縣二十一都二十四都二十五都進賢縣十九都二十都二十一都各相近地方及擬將該縣白竿廵檢司移立鄧家埠者蓋以前項都圖地方各離本縣路逺以致居民頑悍不服勾攝養成驕横致興大盗必須中間立縣就近管治方保無虞而東鄉立縣必須鄧家埠水次為通商兊運之所故欲移司於此皆為地方保安長策節經題奉欽依通行前來除臨川金谿二縣該割都圖俱已割附東鄉収管外其進賢餘干二縣各該割三箇都分民心雖願皆被官府占恡不發安仁縣三都人民雖已赴東鄉當差然猶被該縣邏捉不已以致籍冊難造有誤新縣之成人心驚疑恐激地方之變人各異見實為難處再查臨川縣割過都圖中間尚有七十六都六箇圖分七十七都五箇圖分及七十五都二圖六圖七圖八圖十圖俱在東鄉先割圖分界内相離臨川路逺不便及有五十八都一圖四圖五圖六圖八圖十圖并六十都四箇圖分雖離臨川不逺然隔水三渡常年遇雨水漲延漫五六七里淺處不能通舟深處難於徒涉必待水退方得通行或遇乆雨連綿甚至旬月難渡以此人民甚稱不便皆欲割附東鄉再查得安仁縣鄧家埠先前奏移廵司處所係是該縣二十都一圖二圖地方止有兩箇半里不在所割之内今照前地亦在該縣先割都圖界内非惟安仁越界管此不便若今東鄉無此則無水次通舟不能成縣節㨿該都耆民里老陳一棠宋相等連名告稱與先割十八等都人民住居相叅附近東鄉願屬東鄉縣管轄前項二縣六都二十八里地方必須割附東鄉先因盗賊未平人民未復又被城市包當里甲歇家圖利隱瞞查勘未實失於開奏其臨川縣七十五七十六七十七都人民先赴廵撫衙門告行查勘間各民已趨附東鄉當差不聽臨川縣管束其餘都圖人民節次赴臣陳告難與擅准然前過水不便事情累曾經過遇雨親驗是實再查江西布政司至廣信府并淛江陸路由進賢北至餘干一百四十里由餘干東至安仁九十里須行兩日有半而自進賢由東鄉至安仁通止一百四十五里可省一日之程其遇餘干水隔之時由進賢南至臨川九十里由臨川東至金谿一百里由金谿東北至貴溪一百八十里必須四日可到今自進賢由東鄉安仁以至貴溪通止二百餘里可省二日之程故今東鄉成縣行旅往來皆出東鄉而臨川餘干陸路夫馬俱省東鄉既為衝要夫馬繁難里分須多今計所割都圖俱係殘破里分勢須歸併僅得其半其臨川縣除前都圖盡割東鄉之外尚有四百三十餘里割之誠便惟照安仁縣係九江道所屬固稱繁難不肯分割今查該縣比之玉山縣里分尤少繁難更甚貴溪縣里分亦少衝要相同亦割都圖凑立萬年固難别議若比臨川樂平等縣里多寛閒則亦有詞合當為處查得該縣十里之外即係餘干縣該割東鄉二十一等都地名梅港等處地方先因梅港近河議割東鄉以作運糧水次今若東鄉已得鄧家埠不須有此再查進賢縣占恡未割三箇都圖止離東鄉縣治一十餘里地界犬牙交錯常年有賊相推有犯相蔽前既養成大患後亦難保無虞必須割附東鄉其餘干縣該割都圖内除二十五都十圖人民執願就近東鄉當差難以改動外其餘二十一都二十四都共一十八里或令免割凑補安仁彼此兩便如䝉准奏將前臨川縣七十六都六箇圖分七十七都五箇圖分六十都四箇圖分及七十五都二圖六圖七圖八圖十圖五十八都一圖四圖五圖六圖八圖十圖并安仁縣二十都一圖二圖兩半里地方俱割附東鄉縣管轄及將進賢縣原經奏割十九都二十都二十一都人民督令遵照成命必須分割不許貪官市豪狥私占恡其餘干縣該割二十一都二十四都一十八里地方或令免割聽於附近安仁縣地方量撥一十八里以補安仁縣割過東鄉之數其東鄉殘破都圖止照實在人户照例歸併各該稅糧物料隨里分派務在不失原額深為便益一擬寛新縣糧差查得東鄉縣分割各縣都圖及臨川縣北鄉五十三等都俱係被賊地方其東鄉聽撫之徒原係窮民被脅為盗連被狼兵光棍燒燬房屋見今俱無生理過活艱難節奉恩詔該免糧差三年至於近賊良民自正德四年起被賊被兵家口半被殺害房屋盡被燒燬田地一向抛荒雖經正德七年剿賊之後招回復業然而兩被賊反重遭劫害又被地方光棍不時誑言兵至或又乘機誣䧟以致各民累復累逃家業重整重廢比與姚源避賊居民一向不回不曾重遭劫害者不同舊歲秋冬賊首樂庚二等就擒地方始平今歲春夏兵部奏行撫剿定策到縣人心始安各民盡回復業旋築土墻上搭草苫居住南方土濕不堅随築随壞又遇饑饉疾疫死亡數多晝夜憂思無能救處幸遇朝廷寛恩賑濟各民始得存活漸耕荒土稍得収成其間尚多有夫失婦不能成家有田無力不曾下種者又有絶民故賊抛荒田土數多無人承種今聞所司一槩派糧實是無處徵収誠恐府縣官吏畏罪催逼貧弱死於監追强悍激成他變深為可憂思前蠲免糧差之例理該自今平定為始其間雖有七十一等都離賊稍逺不曾全遭兵火家業半存人戸然而因賊用兵常年調集及今白地戰塲新立城縣多用其力亦合量加寛免如䝉俯念地方特勅該部計議將東鄉縣五十五等都賊剿地方不分聽撫復業之民俱自今歳平定招集為始蠲免糧差三年使得漸次修葺房屋經營家業共享太平至於七十一等都及臨川縣五十三等都被賊半殘地方亦乞蠲免今歳糧稅以後追徵如故庶得小民感再生之恩地方無意外之虞臣亦深念國家經費浩繁常賦有定豈敢私於所治獨求寛減但念地方難定而易亂一經用兵勞費叵測惟茲蠲免平定可保小損火益利害昭然伏乞聖恩俯賜採納幸甚一擬處東鄉民兵查得見行事例各縣俱該選編機兵操守地方惟東鄉縣殘破里分人民初復十分艱苦豈能編充前役然本縣原係賊巢又與姚源相近機兵尤不可缺查得本縣各都及臨川縣五十三等都原有故賊絶民遺下田產先曾奏擬賣銀凑立縣治今地方艱難無人承買乆致抛荒稅糧無辦訪得各處多有貧民先因盗起投充鄉兵義兵快手打手等項名目在官聽調殺賊圖支工食銀米度日今既賊平無用此等之人難令閉口守法如䝉准奏乞查前項田地除有人承買者仍前賣銀凑造城池外其餘選募前項武勇稍加朴實之人每人給與二十五畆聽其召佃収租或家小自種止納底糧本處存留令其本身常充機兵一名聽調殺賊有犯追奪則此等之人必喜得田而樂於報効惟恐失田而慎於守法矣量此可得常當機兵數百千名却免殘破地方人戸編僉其有不足止於分割不曾殘破里分十分糧多大户量情編補實為地方之便一擬定廣昌守備查得建昌府所屬廣昌縣自成化二十三年以來八次被賊流劫殺擄官員三次先因廣昌不守以致流賊深入南豐南城二縣地方府城震動合境思逃上累親藩亦為驚恐所損不細查得該縣止有二十里地方殘破人民寡弱守備甚難先年奏添白水鎮廵檢司弓兵一百名及輪撥建昌千戸所官軍一百二十二員名每班六十一員名在彼防守勢寡不敵每次望賊先奔誤事不淺况查此軍在所每名月支本色糧米八斗在彼守備又支口糧四斗五升是毎軍一月通支糧米一石二斗五升一百二十名毎年該支糧米一千四百七十六石通所食糧官軍每年該用糧米九千七百二十餘石除本所該収屯糧一千八百六石之外其餘七千九百餘石皆出有司念今天下腹裏之軍皆不足用而天下之糧不足以養天下之軍人所共知况今建昌府殘破地方又令養此無用軍士若不量為計處民力益窮地方日敝將來之禍尤不可測查得本所原有屯田三百零一分以後清出軍民侵占迷失屯田一百六十五分每分皆二十五畆俱坐落廣昌縣地方其田鄉例每分上者毎年収租穀七十餘石次者収五十餘石下者収二十五石其田多係原籍在彼住坐富軍并府城有力舎餘共三百五十六名及原占豪民一百一十户承種每年坐収租利而出其半息或三分之一以納子粒六石其清出新田又止折徵價銀一兩二錢彼既坐享田利影射正差却又另撥在城旗軍在彼隄備重支口糧月糧因無家小在彼係累聞賊即逃縻國誤民莫此為甚如䝉准奏乞行本處委官一員將廣昌縣新舊屯田四百六十六分再行踏㸔高低品搭美惡均平却將建昌千户所正軍除上運之外其餘盡撥廣昌屯田正軍不足纔將餘丁舎餘補數聽令収租自種各隨所便其該納子粒及折徵價銀就與准作該關月糧免其納官該所委官一員綂領令其常川在彼操守其若軍餘内有不願者聽令彼處百姓佃種亦免折徵銀兩就令認當民壯一名比軍常操是每年不過減徵子粒一千八百零六石折徵價銀一百九十八兩然可得常操軍士四百六十六名不給口糧月糧可省官糧六千九百九十石其本所在城餘丁舎餘却令盡數查出派令每二丁或三丁朋一令其就家恊同南城縣機兵常川操守本府城池至於跟官守庫并成造軍器等項雜役量令減省悉用餘丁廵捕養馬等項無用差使盡令革退不許多占食糧正軍致傷國賦其白水鎮廵檢司弓兵亦止照舊三十名不必多僉以困民力臣已照見行事例於廣昌新城南豐三縣各順民情及相度地勢委官督造城池并照丁糧家道編僉廣昌縣機兵三百六十三名南豐縣四百六十名南城縣九百九十三名新城縣七百三十四名各令及時教練及將各城居民三丁朋一充作義士名色各置器械編立甲伍每月一操以震揚威武攝服逺人遇警專一守城不許他調其在鄉人民亦令各隨逺近團結義甲及相度地勢有高山處置立民寨有險路處築立關隘如遇流賊來到勢能拒敵則㨿險把截勢不能敵則登高躱避使賊進無所掠退難善歸自然阻其深入之勢其廣昌地方至為𦂳要平時止令該所委官與本縣廵捕官將前屯丁操兵共八百餘名協同操守有警則本府廵捕官通帶腹裏各縣機兵到彼分布相機截殺庶保地方再無後患然臣今病癈不能終任恐前數事甲可乙否前作後輟用心雖勞成效難必地方之患深為可憫乞勑該部斟酌賜行永為遵守地方幸甚胡端敏奏議巻二
