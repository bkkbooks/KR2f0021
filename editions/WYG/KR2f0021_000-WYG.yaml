body:
  text: 胡端敏奏議詔令奏議類二奏議之屬提要臣等謹案胡端敏奏議十巻明胡世寧撰世寧字永清仁和人𢎞治癸丑進士官至兵部尚書事迹具明史本傳世寧為推官時屢折岐藩之勢為主事時上書極論時政闕失與李承勛魏校余祜善稱南都四君子為江西副使時上疏劾寧王宸濠為所搆中危禍幾於不免宸濠敗後復起又屢糾中官趙欽剛聰等風節震一世惟議大禮與張璁桂蕚合而他事乂無一不與璁蕚忤蓋意見偶同非有所依附也是集所録奏議皆與史傳相發明中多辭職乞罷之疏蓋正徳末宸濠劉瑾内外交訌嘉靖初蕚璁専權相軋世寧抵牾其問動多掣肘遂時時有引退之心蓋孤立危疑不能自安其位不得已而出於斯固非以退鳴髙者比也乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0c16f6c81a88617f596a96470374816b6d6a1c722d475ef1dc4f3593de9a0e73
