body:
  text: 胡端敏奏議巻七明胡世寜撰病弱不堪重任懇辭恩命疏時官左都御史本年七月二十五日准吏部咨該本部等衙門會題本月初六日奉聖旨胡世寜改都察院左都御史著馳驛上𦂳來欽此欽遵臣一時聞命感激驚惶觸發舊疾一面調治一面束裝扶疾上道外念昔忠賢素懷經濟不遇明時而老死岩穴終滯下僚或更遭讒害多矣顧臣何人得逢聖主起之罪廢之餘置之卿佐之列體其私情則官未歴任而誥封三代行其鄙見則身未至闕而言播四方屢奏乞休而不忍棄捐頻遭論劾而未能罷黜往歳六月既憐其病苦而改置優閒今未逾年復念其愚忠而召居清要且又命之速來許之馳驛臣之叨遇聖恩自謂古今難得心非木石豈不知感而委身圖報乃復過為辭避也但臣不幸元禀素弱久患痰火竒疾今年六十矣顔面火衝外雖貌澤精神火爍内實隂虚醫書言火為元氣之賊變化莫測臣是以常日之間忽時眼暗忽時膝輭更或精神恍惚語言蹇澀迭相為病皆火所為人固不識也况聞總憲之官所以貞百度而肅百僚者尤在行巳之恭執禮之固使臣為之一朝病發坐立不安或當侍朝而傾仆或臨坐堂而臲卼僚屬觀瞻豈不大為風紀之玷以貽朝廷之辱况臣性資麤率局量褊淺不自揣巳而過於望人是以上則欲君必為堯舜下則欲臣必皆忠良其視人之奸貪蠧政事之因循害民者痛心疾首不能容忍使其入朝不能調停衆論相與協濟時艱而或更致激壞則臣報國之心反成誤國之罪萬死莫贖臣是以私憂深懼而不敢冒膺斯任不得不實告於君父也臣今病甚且因霪雨風波未能前進暫於江南尋訪舊醫調治略可待時雨霽即渡江淮兼程北上聽候進止外伏望聖慈憐臣病苦察臣才弱别選賢能代臣任使容臣休致還鄉使得散誕田里歌詠太平以終餘年不勝感戴天恩之至奉聖㫖卿素禀剛方節行久著歴官中外夷險不渝朕采公議召總風紀以肅百僚宜上𦂳前來到任管事再不必辭吏部知道欽此陳言治河通運以濟國儲而救民生疏臣聞河流遷徙不常自古為患歴考周漢至今未有能使久而不决之術國家救災䘏民亦未有聽其决而不治之理今之河流漲溢淹浸豐沛徐三州縣地方數年於兹矣去年以來復致運道阻塞夫此三州縣之地兩京南北衝要國家咽喉之地也其民常歳為國運道勞苦不息猶之咽喉之氣也今之被水迯亡過半是猶咽喉之氣有傷救之不可以不急也至論國家財賦仰給東南而運道少阻猶人膈噎之病為飲食之阻救之尤不可以不急也故今日之事開運道最急而治河次之然今運道之塞者河流致之也葢使運道不假於河則亦易防其塞矣臣請先述治河之説而後言運道夫自古言河流者曰分則勢小合則勢大言河身者曰寛則勢緩狹則勢急大而急則難治小而緩則易防理固然也其言治河者曰順其性則易遏其性則難又曰不與水争地此其大法也河自吐畨發源流入中國漸納百川之歸而行萬數千里其勢之猛烈可知也其過孟津而下至汴梁以東土疏易決故能為患然自宋以前多決而東北自宋以後漸決而東南其決於東南也入海路近所經為害猶小决於東北也入海路逺所經為害尤大然因決而分得以殺其勢者亦多矣河自經汴以來南分二道一出汴梁城西滎澤縣經中牟陳潁等州縣至夀州入淮一出汴梁城東祥符縣經陳留亳等州縣至懷逺縣入淮其東南一道自歸徳宿州經虹縣睢寜至宿遷縣出其東分新舊五道一自長垣曹鄆等縣至陽榖出一自曹州雙河口至魚臺縣塌塲口出一自儀封歸徳等州縣至徐州小浮橋出一由沛縣之南飛雲穚出一在徐沛之中境山之北溜溝出是此新舊分流五道皆入漕河而總南入淮今聞皆塞矣而止存沛縣一道則所謂合則勢大而河身又狹不能容納所以不得不泛濫橫溢豐沛二縣徐之半州漫為巨浸近又溢出沛縣之北而漫入昭陽湖以致運道舊河流緩沙壅而漸致汙塞也或恐沙壅積久其地漸髙水髙趨下其勢必决而東南有山限隔猶禍小也决而東北則往年張秋之潰運道因之以竭前宋澶州之决郡縣數十皆灌禍不可言也故今治河不得不因故道而分其勢其前出陽榖魚臺二道恐其決而東北斷不可開也其在汴西滎澤近開孫家渡至夀州一道决宜常濬以分其上流之勢不可使壅也乃若至汴東南原出懷逺宿遷二道及正東如徐州小浮橋溜溝二道各宜擇其利便者開濬一道以分其下流之勢或恐豐沛漫流久而北徙欲修城武以南廢堤一帶至於豐單等縣黃徳賀固楊明等集地方接至沛縣之北廟道口築堤一道以塞新決河口而防其北流此亦一計也此治河急患當急施功而開運道尤在所急也然今運道止塞沛縣以北三十餘里而不能遂開者雖人力不至亦由天時未利也方夏秋水溢其塞處半流沙壅使人撈沙水中為力甚難而沙隨水勢隨掘隨壅豈能成功或謂乘今冬初水退昭陽湖暫可通船之日預備工力截其上流乾其下土而併工挑築旬月可開矣或慮此挑沙開築終不能固來歳水淹或憂再塞不若趂冬水涸冰凍船阻不行之時照依南旺湖式様就於昭陽湖中開河一帶兩面築堤以通運道比今塞舊道不増十里之逺來歳通運與舊道二處隨便行舟此一策也或又慮河水入湖亦能帶沙致塞只如今昭陽南口金溝舊閘處所漸入沙壅此其驗也臣與尚書李承勛同行計議以為莫若於昭陽湖東岸滕沛魚臺鄒縣地方之中地名獨山新安社等處擇其土𦂳無石處所另開河一道南接留城北接沙河口二處舊河其間應開不過百十餘里更或隨勢利便各尋近道工力尤省其河新開深則各隨地勢濶則先止五六丈以通二舟之交行其就取土厚築西㟁以為湖之東隄且防河流之漫山水之洩而隔出昭陽湖在外以為河流漫散之區所謂不與水争地也來冬冰結船止之時更加濬濶以為運道於彼立一夫厰量撥山東州縣人夫接遞以暫寛豐沛之民而消息咽喉之氣此其上策也其開掘之處有礙民田民居則宜補給閒田扣除糧税而量措與開荒遷徙之力可也但其地之髙下土之堅疏勢之難易臣等不曾親歴試驗未敢執定為是乞勅總督河道都御史一面科集工力一面親驗可行趂今興役開掘此河或此河難開則止開豐沛縣舊河及前擬湖中近河二道兼使放舟以防一道之塞運道既開而後以次相度河勢順其性而分導其流則大決可免矣臣等又慮山東河南并直𨽻江北之民連年水旱災傷勞苦特甚豈可復興此役乞勅户部計議從權於兩淮兩浙招商額外多賣鹽引令其買補灶煎餘鹽照常販賣急可得銀數十萬兩以雇役近河貧民并備應用器物興此大役則亦宋范仲淹浙西救荒之術也昔唐中葉疆土分占日促田賦所入甚少而養軍多費専賴劉晏理財亦惟興此鹽利况我國家全盛食鹽生齒數倍於昔而鹽課舊額有限民間所食皆私鹽也今取而歸官河成之後以資邊餉實為大利且鹽既官賣民間私鹽漸少而巡邏之役可減鹽徒意外之慮可無又弭大患豈不當為然以為難者第恐勢要狥私之徒乘之以占利庸俗泥常之人因之以謗阻大臣持循保名不為國計者又不肯於是而擔當必賴聖明革此三弊而後可行也至於挑土之器工役之流亦宜量募江浙衢嚴二府之人百十用之其人取土一工勝如北人數十工之力是宜給之路費厚其傭值使樂應募來必漸多又使北人漸次效之亦以後治田勸農之利也臣愚又念豐沛南北一帶近河州縣之民近年十分困苦朝廷宜加十分愛惜伏望聖恩垂念以後進貢等項船隻計可停止者暫為停止可減省者量為減省其南京工部該派器物内府應用者或令原解州縣倒批徑解或令該部委官自解工部進納不必經由南京監局以致多造器皿裝盛因而多撥船隻裝載又因而多用人夫牽送其士夫往來船隻倚勢多索人夫者乞嚴加禁治其河道驛遞夫役照前管河郎中兼理稽考撫按官不時巡察糾治庶使衝要之民得以安養休息而國家南北咽喉之地不致阻絶矣近該少卿黃綰奏乞修復海運以備不虞其為國逺憂甚忠然聞其事勢甚難不得巳而思其次則聞國初漕運自淮逹河由陽武起㟁百十餘里陸運至衛河復下船至京又聞沁水至武陟縣紅荆口分流一道六十里通衛河近年始塞是河流因沁可以通衛也後當國家閒暇之時亦宜差官踏勘如紅荆口舊河可開則開舊河不可開則於陽武上下相度地勢相應處所離㟁十數里開掘一河北通衛河歳撥江南相應衛分糧船百十隻於彼轉運習慣以備徐沛而北會通河一時之塞此亦一計也臣愚叨任大臣茍有所知不敢緘黙奉聖㫖工部看了來説乞恩辭免加官以昭公道疏臣近䝉聖恩改都察院左都御史聞命驚惶扶疾上道自陳病久衰極性麤量褊不堪重任具本乞休奏奉聖㫖卿素稟剛方節行久著歴官中外夷險不渝朕采公議召總風紀以肅百僚宜上𦂳前來到任管事再不必辭吏部知道欽此欽遵臣思聖恩簡任分當委命不敢再辭力疾前來行至濟寜地方忽聞邸報復䝉聖恩陞臣刑部尚書臣思班列愈峻而政務益繁菲才病軀决所不堪再具本陳乞間十月十六日行過徳州地方接到吏部咨節該詹事府詹事兼翰林院學士霍韜奏稱臣宜都察院王時中宜刑部等因奉聖㫖胡世寜仍改都察院左都御史加太子少保掌管院事欽此同日又准本部咨節該兵部左侍郎兼翰林院學士張璁題臣叨任副總之職今署掌院事合請命官更代等因奉聖㫖吏部還差官齎文馳驛去催促胡世寜上𦂳來欽此臣聞命驚惕晝夜兼程力疾來到今巳朝見幸得復覩天顔無任欣感切惟都察院之軄臣雖自揆才力不堪然上承恩命不敢有違祇候吏部題奉明旨即往到任不敢再辭外惟照宫保之加自來朝廷以待輔臣六卿之年勞多而徳望重者故今各部尚書年資過臣者尚多未加此秩顧臣年資才力皆出諸臣之後今年四月始以侍郎陞南京工部尚書七月即改都察院左都御史九月復陞刑部尚書半載三遷巳為太驟今䝉仍改左都御史二品同階不為少貶顧臣何功如此隆秩天恩太重臣分奚堪深虞覆餗之㐫公私竝累抑恐積薪之議中外交喧再查霍韜奏内稱臣過當至論秩之崇卑可勿計者則實知臣之心而亦可為明主用人之告忠臣事君之法也伏望聖恩天地日月察臣誠欵憐臣分薄収回太子少保成命容臣以左都御史掌管院事臣若幸䝉天庇病得少愈忠得少盡誓當終身供此一軄以報天眷如其病困才弱不堪供軄則朝廷有黜幽之典當上認罪之章不敢貪位素餐以誤國事臣以私情累干天聽不勝戰慄奉聖㫖卿風節素著人望所歸朕仍命掌都察院事正欲糾率各道振揚風紀又念卿歴官年久特加宫保以示優崇宜勉承朕命用心供軄不允所辭吏部知道陳情再乞天恩懇辭加官疏臣以今年四月始由南京吏部左侍郎陞南京工部尚書七月䝉恩即改都察院左都御史九月復陞刑部尚書近復䝉恩仍改都察院左都御史加太子少保臣思聖恩太重臣分不堪具本上辭奏奉聖㫖卿風節素著人望所歸朕仍命掌都察院事正欲糾率各道振揚風紀又念卿歴官年久特加宫保以示優崇宜勉承朕命用心供軄不允所辭吏部知道欽此臣聞命慚惶感激無地思惟天語叮嚀聖恩隆厚如此臣當祇受曷敢再辭但臣私情實有未安者事君無隱義當披瀝君父之前以求日月之照也臣本農民幼生艱苦備甞民瘼因識吏弊思欲効用明時麤習章句獵取科目然臣自量才器不過欲得一郡守之軄或一巡撫之任而止以少展為民之志遺惠一方耳至於卿輔之官則思天下自有碩徳宏才如古名世者而用之臣愚志望萬不及此也不意入仕之初即患痰火竒疾雖歴前官不得久任縁此惠民之心未得盡展報國之念未能遂忘然又不意中歳以來荐歴艱憂益致危困今年六十矣精神膽力巳喪十分之九而乃誤䝉明主之知擢任掌憲之重臣愧非分且憂病弱具本力辭過䝉温㫖趣令到任臣不敢違力疾來京思欲都察院供職而宫保之加踰分太逺不敢冒受又不敢即辭正爾躊躇而朝見之際驟與楊一清謝遷等同班一時惶愧舊疾痰火即發方上御道而腿膝戰掉幾不能存立比至御前而咽喉哽塞幾不能致詞退而急趨直房服藥始解乃知臣之福量至淺而徳薄位尊古人之所戒也故敢決辭加官不意䝉恩未允臣又聞古之明主用人忠臣事君皆惟欲使諌行言聽膏澤得下於民而巳不在位之崇卑也故昔虞廷九官周室六卿皆各因其才専任一軄以終其身不聞累加崇秩又如宋太祖初許曹彬克取江南以為使相及還獻俘乃以太原未平使相極品而未之授古帝王之不輕官爵也如是顧臣何人試職之始即加宫保倘後數年得効㣲勞更將何軄以加臣是以深虞負乘之致冦亦恐鬼神之害盈而不敢冒躐崇階實由𠂻欵伏望聖恩天髙地厚容臣止以左都御史掌管院事使臣得安心守分以亮天工不使踰分隕越以孤天眷臣不勝感戴祈請之至奉聖㫖朕以卿資深望隆特兹加秩卿乃兩疏懇辭足見大臣推讓至意勉從所請宜即赴院供職吏部知道建言疏臣聞人臣之義知無不言臣竊見陛下天性聰明日勤聖學至於敬天法祖愛民求治之誠誠有格於皇天而非三代以下令主所能及者然臣竊聞帝王之學有要其推之於治亦有要臣愚私恐聖心泛勞於上敢述所聞以獻臣聞帝王之學中而巳矣堯之授舜舜之命禹皆曰允執厥中嗣是以來若成湯文武之為君臯陶伊尹周召之為臣既皆以此而接夫道統之傳至吾夫子繼往開來而傳至其孫子思遂筆於書曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之逹道也致中和天地位焉萬物育焉夫喜怒哀樂情也方其未發則外物未有所感而此心寂然不動無所偏倚故謂之中有感物而動喜怒哀樂發皆中節則事無不當物無不宜無所乖戾故謂之和和即中也夫喜怒哀樂發之一心之㣲而措諸天下之廣凡國家刑賞之政慶恤之典無不皆由於此故曰天下之大本天下之逹道故如人君喜有賞怒有罰或當喜當怒而隱忍不發或既喜既怒而留滯不散皆非中節也又或今日當賞而因前日之怒格之不賞或今當罰而以平日之喜縱之不罰又或此事當賞一分而因喜賞過二分或此人當罪一事而因怒併罪其餘亦非中節也故人主於平居無事之時常當涵養此心使寂然在中無所偏倚既而遇事有當喜當怒者則又臨時省察其中節與否而後發之至於哀樂亦然不徒今日如此而無一日之不如此不徒此事能然而無一事之不皆然此之謂致中和而天地以位萬物以育是使天下無一物不得其所而何徳不修何治不隆何災之不弭哉先儒以為此學問之極功聖神之能事者不過此中而巳伏願聖明留意然中無定體隨時而在隨事不同故執之者常如持衡之勢不使少有所偏如古聖賢論治體則周公告成王有曰伻嚮即有僚明作有功惇大成裕汝永有辭謂使百工知上意嚮各就有僚明白奮揚而赴工惇厚博大以裕俗則王之休聞亦永辭於後世矣夫當守成易溺宴安之時而不為明作有功之戒則士習偷惰而廢政殃民日見陵夷之狀矣然専明作有功而不為惇大成裕之圖則治流刻薄而人心不安又非悠久之道矣此二者不可偏廢亦執中之意也故周公欲使百工知成王意向如此以供職而使其君長有令聞於後世忠臣為國逺謀之意如此臣竊見國家承平日久士習因循偷惰太甚以致政弊民窮天灾日見聖心憂勞累年今一旦豁然天唘奮然雷動信用忠賢釐革政弊人心惕然警省政治煥然一新知我皇上勵精圖治之志而皆為奮明作有功之舉然而中人之性素無定見惟事隨風趨靡以速時名而或事為過舉以失朝廷建中立敎之本意則非惇大成裕之道也臣近見撫按叅官本中有以飲食紙劄應用㣲物而即坐贓奏提者至或大姦大貪置之不舉而惟繩此武職小官以塞責如此臣恐諸臣倣傚刻薄成風而傳諸天下後世不知我皇上天髙地厚之徳非周公願其君永有辭之意也除此小事臣巳駁令改正外至於大政事大賞罰之有關於天下大體者伏願聖明特勑大小臣工今後供職行事常懷明作有功之念而不可有失惇大成裕之體雖懷惇大之心而又不可遂隳明作之志復蹈因循之弊則陛下之聖學推之政事者真為允執其中而堯舜禹之聖不是過矣至論聽言則舜戒禹曰予違汝弼爾無面從是則舜之大聖亦欲其臣正諫也然雖樂正諫而又曰朕堲讒説殄行則妄言者亦疾也雖堲讒説而又曰欲竝生哉格則承之庸之則又疾之不為巳甚而許其改過復用也此舜之執中見於所言者如此至於後世孔子論事君曰進思盡忠退思補過將順其美匡救其惡則將順與匡救皆忠也孟子則曰逢君之惡其罪大則深惡逢迎之不忠也臣昔上論逢迎與將順不同君所行是而人臣順承其志以成就其美者將順也君所行非而人臣迎合其意以求媚其心者逢迎也二者事情不同忠邪所由以分也近歳以來講學不明人心士習不正妄以將順為逢迎而各欲掠取正諫之名故於君上至徳所當將順者而亦曲加阻遏以為匡救甚者其心靡懐執國之誠惟圖媚竈之利因而排擊忠良為除異巳至欲明主不得専行一事自用一賢而威福惟其所媚者之歸數年以來主威不立善政不行民生困苦亦巳甚矣其罪蓋不止如舜之所堲也近賴皇上天日開明赫然奮發讒説屏除士氣一變矣然恐其間或有事實當然而言或過激又或心本効忠而意見差謬者與彼讒邪同棄不無可惜又恐中人惕禍遂怯正言而後有大事大姦莫之敢論至昧我皇上本心納諫之誠以誤國事伏望聖明容臣與吏部細加查訪并凡因公降謫官貟究其心之公私原其罪之輕重量其才之長短陸續上請或還原職或量収叙至於情理難容不該収叙之人久謫遐荒者亦乞聖慈體大舜欲竝生哉之意量加寛恤使得生全至論用人則曰湯執中立賢無方此其大要也伊尹告太甲曰任官惟賢才左右惟其人其難其慎唯和唯一此其大法也夫難者難於任用慎者慎於聽察夫既立賢不拘其𩔖而欲難慎如此者所以防小人之似君子而誤用之也然人全徳實難或有一失如玉之明有一玷木之良有一朽不害其為器也惟夫姦險媢嫉之人無隙可指而能誤國大事者則不可用耳和者可否相濟一者始終如一所以任君子也往時人才自入仕途即事交結投置清要坐躐卿輔而乃私立門户謬為舊制以排斥真材不使得用以是民瘼不知政體日壊民生困苦實由於此今我皇上聽納忠言痛革前弊均調内外立賢無方期得真才以輔至治大臣體國者日事薦賢明良相遇真足以共成正大光明之業矣然恐其間萬有一誤者則在聖心其難其慎而巳至於可否相濟者匪徒君臣為然而僚寀之間見或不同相規相就亦當如是不以為嫌此臯陶陳謨於舜禹之前所以有百僚師師之説也更願陛下以此時戒羣臣使和而不同以共成我國家無疆之休而巳凡此經書大旨聖明天縱經筵日講豈有不及而臣猶以為獻者區區芹曝之私不能自巳也伏願聖明俯賜採納天下幸甚奉聖旨覽卿所奏足見大臣愛君陳善至意朕知道了查復官員且罷吏部知道申明職掌以清刑訟疏竊惟祖宗設立都察院専以糾劾百司辯明寃枉今糾劾之事専責各道監察御史而堂上官不預至於理寃聽訟一節則其事情多端不可執一所當詳議酌中以處易之中孚曰君子以議獄緩死則取風感水受之象辯寃當緩而以虚心實意求得其情也其在豐曰君子以折獄致刑則取其威照併行之象獄既折則當致刑不可姑息也臣愚生長草野三歴有司三任刑曹既又一任外臺一任内臺又不幸久繫禁獄久戍窮邊故於民間疾苦獄情變詐不一之狀頗亦備知今幸遭遇聖明擢掌其事敢不悉心敷陳以助我皇上至仁欽恤之萬一切惟今天下奏訴本狀有本無寃枉而倚奸畏死毎年奏辯一次輒行所司提人再問而致累死干證貧民三五人或六七人或十餘人而本犯終不免死者有實負寃枉而累次奏行所司畧不與辯止依原案増飾開上以致終於枉死者又有貧民無力訴辯而被有司淹死獄中非惟朝廷不知雖上司亦不及知者又有富民本等奏訴而有司避嫌明知寃枉不肯與辯又有奏行得調隔别衙門問理而疑其夤縁所得不肯與究曲直眞偽輒推所司查勘所司則又顧忌原問更入重情以報而必致之死者是皆所司之不仁以負皇上好生之徳以致天下災異之多實由臣等不能平法任人之罪也然原其情亦有不得巳焉者葢由士習不正刻忌成風毎有獨能持正伸枉者小官則上司嚴刑逼其招贓大官則士夫興謗致其被劾而終身廢黜大臣莫之敢救此其所以致此也近如浙江僉事彭占祺其平日作縣則十分循良為御史則獨能守正惟以違衆執一豪俠之罪而遂騰謗致劾朝覲去官此其一也臣初到任日與僉都御史熊浹斟酌時弊講求二者畫一折中之法欲乞聖明裁處俯賜通行所屬内外衙門一體遵守計開一舊凡奏訴本狀到院堂官不能盡看分與各道御史亦多不曾親看止憑該吏撮寫數語粘揭帖面次日持以稟堂或云該行某衙門或云該立案即時註簿施行夫吏有打㸃者則揭其應辯𦂳要之語無打㸃者則揭其不應辯無𦂳要之語而事之行否乃唯聽之寃何以得辯也臣等本擬本狀連人分送各道御史務要親自審看明白本道有案者則弔其原招原訴無案者則於刑部抄招或弔巻各欲比對叅詳如刑部亦未有招開到者則止摘抱本人口辭與本拆辯務要逐一叅看原問情罪有無允當今訴情節有無指證可辯或雖可辯而看係一面之辭未可據信或該立案不行者亦當明開其所以當立案之故各具一帖如刑部各司問刑招帖之狀前一日送堂臣等再加叅詳批照次日當堂稟議可否方纔註簿施行一凡本狀中叅看出情節似有寃枉當與辯者則行巡按或按察司原經巡按辯問者則行巡撫各與提初審初辯官即與辯出者原勘原問官仍不追究若審辯官明知寃枉因忌原問故不與辯或更誣重情者後或他官辯出或十分寃抑查提至本院辯出者原問經審官俱從重追問其若本無寃枉而狥私曲辯縱脱者亦當追究重罪一凡初經撫按司府等衙門問成重罪奏訴寃枉例該與行而叅看其間無有𦂳闗該辯情節者則行巡按原經巡按辯問者則行巡撫先將見在人巻查審似有寃枉方與提人證辯如無寃枉仍依原問監候會審奏詞就彼立案不許一槩提人以致累死平民其有累次奏辯累經再問開報今復奏訴者雖例該立案若叅看其間委有可辯情節亦與照前施行一凡重罪囚監至五年以上曽經再問無寃轉詳評允及奉欽依依擬處决而臨秋怕死毎年奏辯一次者若係上半年奏至照前與行撫按弔審見在人巻似有寃枉方與提人證辯如無寃枉仍依原開監候會審處決奏詞就彼立案仍要備由先報若係下半年奏至者本院即與立案不行一今各道御史多係新任刑名未練臣欲縁此觀其用心能通刑名與否其若如此不肯用心刑名不能疏通以後歴任更無大建白及興革激揚有益國家者考滿之日斷難書以稱職其試職理刑官在道實無刑名可理今欲各道本狀多者每日各分與一二件令其照前叅看開詳具帖送堂臣欲縁此日見其刑獄用心能通與否後考實授亦有所據一在外重罪囚多係强盜人命人命唯謀殺者最為難問有司凡遇此者唯於其事發之初虛心審察叅以詢訪方得真情若遽嚴刑鞫問鮮有不致誣服者矣至於强盜或因情迹疑似即便嚴訊或因誣指讐攀不能辯察多致寃枉或有小官一時誤拿不敢脱而遂致之死以圖免罪者又有同起數十皆係平民誤死而真盜不獲者又有真盜既獲而審供同盜之人或因先有誓約或圖後為營辦劫奪不肯供出好漢而唯供報新誘數人或更讐攀平民以抵數者至於失主或冒供不曾被劫之家以為其後辯脱之計者有司一時輕信誤事不小又或巡捕職役賣放真盜而逼其妄攀平民以詐錢者又有獲賊得錢而延緩不追真贓為其辯脱者凡此情弊多端不可枚舉故凡獲真盜數人必須隔别一一各審其同盜姓名年貌來歴及失主住居劫分財物件數有一不同即辯其誣不可遂紀其名以作未獲之數則誣枉者少矣臣愚乞勅各處巡按御史各行所屬軍衛有司問刑捕盜官今後人命强盜務各懲前弊多方用心審捕如若率意徇私有所脱枉必行重治其巡按分巡官所至地方見監重罪囚俱要逐一親審有寃者即與伸辯不許避嫌推調不理巡按歳滿回京各要將辯過寃枉名數事跡開報本院以憑查考一查得差官審録事例原勘原問官出入等罪悉免究問夫原勘原問官一時誤信人誣告曲證失入枉問不行追究以免其回互執誣聖朝急於救人之仁也若乃日久事定明知其枉而顧忌原問私避嫌謗故不與辯或誣重情以必致之死者則其人之忍心害理背公行私大可罪矣伏乞聖明立為定例除以前勿論外今後重囚果有寃枉而初審初辯官既與辯出者原勘原問官仍不追究若審辯官明知寃枉因忌原問故不與辯或更誣重情者後或他官辯出或十分寃抑奏提至本院辯出者原問經審官俱從重追問其若本無寃枉而狥私曲辯縱脱者亦當追究重罪一今差官出外審録重囚凡可疑者再問事無容議矣惟可矜者奏發邊衛充軍一節則其事情輕重利害不同有所當議者葢此等罪犯或因致死人命而其所致死之人有多被慘毒而死者有致將屍骨拆散蒸檢二三次或五六次者又或遞年奏辯累死屍親及干證平民三五人或十數人者今此人止發充軍及至解衛即逃又累死長解二人及買妻代解軍妻一人審録官但知此有罪一人之命為可矜而不知前後累死無罪多人之命尤可矜也伏乞聖明裁處今後此等罪犯間有如果情非得巳事實可矜者則明與辯出或徑發隣近衛所永逺充軍或編隣近州縣驛遞永充機兵民壯水馬夫等役以代出貧民一差使其若情雖可矜而法該抵命及曽累死平民者則務追真正當房妻小差人管押遞解邊衛永逺充軍仍定撥見任軍職之家以作軍伴為之種田使有収管不致脱逃又得代出邊軍一名作正操備則邊境漸次得人充實而農種漸次可廣矣若其情苦無可矜者必須抵死不宜輕縱一竊盜三犯係是怙終之人舜典所當賊刑者也至於偽造印信之人多是狡猾通曉文義之人敢于盜竊朝廷之符柄其為此者或以誆人財物或以盜官錢糧或以詐官假吏或以刑人殺人而勢亦無難祖宗所以制為重律使人畏而不敢犯也今累次審録輒混作可矜開奏𩔖得充軍是使人明知不死而有恃故犯也豈立法本意哉况此等奸惡之人多監一日則地方免害一日遲發衛一日則衛所省事一日臣愚乞勅審録官今後不得以此開入可矜之列混奏得辯之數毎年秋後會審開奏聖恩若未忍處決止令監候必待朝廷有大慶會大肆赦而後釋之則恩不濫而法不廢矣一問刑執法被誣奪職如僉事彭占祺者乞勅吏部再訪無異奏復其官以為獨立守正之勸更乞斟酌舊例凡朝覲考察去官自行奏辯者仍照前例重遣其若大臣出身與辯者當議奏復若大臣所辯不公不實者許科道彈劾吏部叅奏即罷其軄奉聖㫖覽卿所奏無非慎重刑獄疏理寃滯之意都依擬行該行内外問刑衙門的行去著一體遵守朝覲考退官員巳有累朝禁例難以輕収今後果有執法被誣奪軄的許大臣言官即時與他論辯吏部仍查訪可否具奏定奪省繁文復舊規以便勤政疏臣聞君逸臣勞古之訓也執簡御繁治之體也自古帝王未有不以親覽章奏為勤政勵精之實徳然而覽之無要則亦徒敝精神而聽斷不能無遺矣書曰政貴有恒辭尚體要律曰陳言事理竝要直言簡易不許虚飾煩文欽此臣切見𢎞治以前内外臣僚章奏皆用心刪去煩詞務從簡要如臣法司叅官本皆節去同起各犯無干情罪而止具奏應叅官該問𦂳闗情節不過數語其餘衙門大率𩔖此以是君上得以親覽無遺情弊易見可否易知比自正徳以來因武宗皇帝不親看本臣下因循怠玩乃各自圖安逸不將本語修削止憑吏胥全寫上下徃來文移或通具前後或駁問招由故或一事而重説三二次或一本而粘連十數紙目力不能照料反致𦂳闗情節字様多有脱略不能看出有誤聽斷此弊相沿至今是雖臣下竟日有不能周讀一遍者乃以上勞君父萬幾之繁且為聖心静養之累且分聖學惜隂之功臣子之心安忍如是臣愚乞勅在外鎮巡三司等官今後事當奏題者務要照依𢎞治以前舊規刪去繁文務從簡要開具上奏不許全録上下往來文移亦不許不行親㸔以致脱略𦂳闗情節字様如遇叅究其奏下部院該覆本者亦要看本官刪去繁文撮從簡要具稿呈堂務要詞無贅冗字無錯漏堂上官亦要親看明白方纔具本上覆庶幾少便省覽不致多勞聖心臣又竊聞孝宗皇帝時毎日奏章進入先令近侍知書忠實之人看詳事情緩急輕重分别等𩔖凡群臣建言及部院卿寺奏覆重大事情必進御覽其有事情重大而本長難看者亦令指㸃𦂳闗情節進覽其民本常事不須一一親㸔者另作一𩔖又不時於其中抽看一二以驗其精别當否以是聖目不致多勞而大事聽斷無遺此事舊聞長老傳言如此不知的否臣又念陛下聖如文武左右慎選必皆得人其為陛下恪守舊規執簡御煩以節養聖躬而為勤學惜隂之助者必有出於夷思之外矣何俟臣言苐臣區區野老負暄之誠不自覺其疎罔矣伏惟聖人不棄芻蕘採納幸甚奉聖㫖覽卿所奏具見忠愛内外衙門章奏俱朕親覽今後不許煩詞虚文但要平直開奏敷陳𦂳關情節庶便看閲都察院通行曉示各衙門知道胡端敏奏議巻七
