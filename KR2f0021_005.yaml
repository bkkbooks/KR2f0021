body:
  text: 胡端敏奏議卷五明胡世寧撰陳情乞調間散疏時官兵郡左侍郎臣久患痰火極弱不堪任使先歷內外臺及升吏部已嘗十本具辭頃丁家難服闋因疾具本乞休荷蒙恩旨容臣調理繼蒙取用不能起程又行具本陳情復荷聖恩溫旨勉留臣感激思報即欲強疾赴京奈緣困於炎暑苦於疾暈未能動履欲候秋涼起程間忽準咨欽蒙聖恩升臣兵部左侍郎咨臣欽遵到任臣聞命自天感激無地惟兵部司馬之官侍郎尚書之佐時或當署掌部印有事或當出總邊疆須得才猷出衆德望服人年力精強邊事熟練之人方可運籌帷幄折衝樽俎上佐聖明以選將而練兵嚴內而肅外賞必當功而冒濫不容以蠧國罰必當罪而姑息不行以誤事也如臣庸陋萬不及此豈堪斯任况臣年雖未屆六十而病容衰朽已過七十之形心雖圖報萬一而陋學迂疏適為輿論之鄙兼恐不時病發痰或驟壅而言不能出口有妨奏對氣或驟鬱而行不能正履有失朝參既為班行之玷以負聖明之知臣是以展轉籌思進退難處蓋今聞詔不起則臣方命之罪當誅使後任官不稱則臣誤國之責尤重故今部咨一到臣已扶疾起程前來外奈臣病軀沿路服藥到京恐遲而兵部事嚴員缺不容以久曠抑恐到京疾病纏綿才力短淺不能稱職有孤恩命罪當萬死故今不避煩瀆昧死陳情伏望聖恩特念本兵重寄憐臣衰病殘軀别選賢能代臣升職放臣還鄉休致終老餘年或乞調臣南京部分使得就間養病臣得以其本等職業之餘或遇時事當言不避艱險盡誠獻納以圖報於萬一臣以私情纍干天聽不勝戰栗乞定孝思早發宸斷以安世饗疏臣蒙升職取用至京本月初六日朝見出門見羣臣奉旨往看世廟前道所宜初七日謝恩羣臣會議前事臣以病弱不能逺行且未到任未敢隨衆看議今初十日到任以來始列常朝聞前會議本尚未批出深恐孝思未定聖心久勞衆議惕然臣有短見亦敢冒陳以助孝思之萬一臣惟世廟之立本以義起不當援古曲證直須論今事勢所宜耳若如何淵近奏欲開廟道直通祖廟街門出入驟聞體面似好而於事理情勢不便有六蓋聞神宫監礙路當拆太廟護牆樹木亦有當伐者是皆祖宗原為太廟建植已定推恭穆獻皇帝孝敬祖宗之心必有所不忍陛下體獻皇之心敬其所尊亦有所不安一也異日神主入廟必經太廟門下輦臣子不得全其獨敬二也以古者事亡如事存推之恐獻皇帝平日神逰出入必經太廟門不無有所敬忌而不得自便三也廟成之後聖母聖心遇時追慕或欲往敘家人禮一瞻廟貌必須駕出午門再出端門轉入祖廟街門經過太廟門甚有所不便四也以諸司職掌所載婚禮推之則陛下後日聖子神孫立后册妃奉先殿廟見之後理當次謁世廟亦須如前連出午門端門經過太廟門亦有所不便五也隂陽俗忌本非正論然人臣為家則拘而為國不言則亦非臣子愛君如父愛國如家之心也凡隂陽家建立宫室忌前路直衝亦忌斜界故如大明門前離正陽門直路方闊不逺而兩傍橫路甚長今不知廟道直南西並祖廟街地步幾多若拆舊房直進恐路狹長有犯直衝之勢欲避舊房曲入則又恐犯斜界之勢六也若如禮官原議從後往南轉東折旋而入則於前數者事情皆便矣臣初聞立廟在逺恐陛下不得親祭致其如在之誠繼聞立廟在內恐羣臣不得陪祭致其奔走之敬後聞立廟于此上下議同神人協應已為盡善盡美止惟廟道不通祖廟街門耳二廟本微不同所宜各道出入推獻皇帝孝敬謙抑之心必不欲其事事比隆太廟我皇上立廟初心本欲求安獻皇帝之靈而使其上合祖宗之心下合萬世之論子孫世世享祀無間亦非欲其事事比隆太廟也彼淵議如奕求勝不已國家大事豈容聽其舉棋不定哉中庸孔子稱武王周公之達孝而曰敬其所尊愛其所親事死如事生事亡如事存孝之至也陛下日新聖學體念此數句則孝思過半矣或謂此事重大聖心若猶有疑則宜內啓兩宫聖母之心上告九廟皇考之靈躬至廟門謀及卜筮必于羣議有合洪範稽疑所云是之謂大同而身其康強子孫其逢吉矣今若止依三二人之言而欲輕動祖廟相干抔土株木非惟祖考之心不安而天下後世臣民之心皆不安也伏願皇上俯察羣臣早定孝思早發宸斷以速世廟之成以奠萬年之祀則陛下盛德至孝協于臣民光于祖考建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑矣臣以病廢庸才誤蒙簡用感恩刻骨冒死前來今若遇事不言恐孤聖德謹昧死陳其區區非敢附衆取容亦非敢立異求名也惟聖明採納幸甚奉聖旨這事已有旨了該部知道欽此陳言邊務情弊疏臣以病廢之餘叨任本兵之佐其於宣大二鎮及陜西三邊事務不曾經歷略無一知不敢妄言若夫京左遼東一帶則因往嵗平賊江西預奏宸濠之事被忌功都御史俞諫佐逆御史潘鵬等百計搆陷誣臣死罪投繫錦衣衛刑部都察院左府連禁十有六月編發遼東瀋陽衛充軍首尾四年以是於彼地方軍務情弊耳聞目擊頗知一二嘗費心思為彼私畫而未敢出言不意今日皆臣本部職務也雖其間有數事不係本部掌行者然臣與各部卿佐比肩事君同心體國人臣之義知無不言不敢避嫌緘默也謹以所見應處事務條列于後其最後一事頗涉機密伏乞聖明自行斟酌行止不必該衙門抄議以傳泄其事驚動人心其餘二十四事乞敕該部再議施行計開一在京編發遼東充軍之人俱監在府半年有餘積至二十人方差一官一舍管解其所差官舍先揭債銀四五十兩使用幹差本利倍還而又欲多取肥家皆出此二十人之身軍犯臨發經歷司既打送行大棍二三十官舍領解出城沿路停歇逐日弔打使其痛苦哀號親鄰送者皆不忍見為賣房産揭債銀隨路追送軍解沿途守等每五七日才至通州一兩月才至山海關必欲足其取盈之數內有竊盜充軍者放令墟市掏摸財物以與之其間軍被打死軍妻被姦者不可枚數其軍到彼不久多死無益邊衛竊恐别府解軍亦有此弊乞賜禁革再有犯者必加重治一京差伴送貢回使人官員經過遼東一帶全無紀律約束每百十人或三二百人擁至一處堡站官先失預備使人到彼因無車馬供給任其留住三二日出入空城略無禁忌或忿將房舍損壞或故將門窗燒爨或自用粗木鞍橋將馬脊打破或管解官唆令將馬尾割與回京賣銀一過三汊河使人竊認小路即將官馬騎從小路徑行超過三五站故將馬匹騎死丢棄路傍官府略不經意甚損國威亦耗邉馬且被使人熟識道路益輕邊衛入寇無忌事非小失合無今後使人往來宜令伴送官分定班次每五十上下人為一起每起預將名數報知前路堡站預備供給腳力使人到彼即時應付打發前站已過報知後站方許次起使人起身到彼亦就打發不許暫留經過地方仍要撥軍嚴整隊伍守門護送使彼嚴憚不敢傍覷再有如前損壞馬匹房舍及超路徑回等事嚴禁重治庶壯國威免致輕侮一軍政莫急於馬舊聞有禁官馬不許兩人並騎亦不許婦女騎坐及馱載他物切見遼東官軍全不惜馬所關料豆私賣食費不以喂馬致馬瘦損該管頭目略不點視而又不分男婦出門半里即便乘馬或將馱載薪糧行李逺行重壓而又騎一人在上以致馬易倒死虧損公私今宜行彼將官嚴加禁約如有坐視不禁或指此為名因而科害軍士者許撫按守巡官參問究治一彼處原無驛遞止是各堡輪撥邊軍馬匹在堡走遞號稱擺堡馬無奈鎮守分守等官各有親識伴僕人等及各衙門公差人役日逐往來不絶多討馬匹騎坐及馱載行李下程馬易倒死負纍邊軍買補更又嚇要管堡官多斂窮軍財物供給酒饌必欲豐盛致令邉軍苦不可言合行彼處撫按守巡官各堡站每月給與印鈐格眼簿二扇將輪差馬匹編號書簿仍定與公差人飯食品數令其馬匹挨次均撥即書格眼內其公差人用過食饌品數亦令填注格眼循環弔查敢有多勒馬匹供給者即行懲治其非公差人並不許私給濫與一彼處鎮守總兵太監朝廷原給與令旗令牌以備臨陳督戰之用旗牌所至即同詔敕官吏迎伏無敢違慢有等無知官舍謀跟鎮守聽執旗牌其人名目即自號旗牌鎮守官或令出外營辦私事亦稱旗牌所至凌嚇官吏詐勒財物弊不可言如欲差彼齎銀邊堡糴糧報納必與一軍帖以點軍為名旗牌一至守堡官股栗驚懼即將軍士應支月糧扣留在倉準作糴買上納之數却將原銀送還原發衙門更斂窮軍財物饋送旗牌以免降禍其害人如此合無行彼禁約今後鎮守官非真臨陳督戰不許擅出旗牌以褻天威其公差人出外非真執欽降令旗令牌者不許冒稱旗牌敢有違者官聽撫按官參究公差人以矯詐論罪不許容情姑息一聞先年遼東將官皆令馬軍下馬囊沙繫腿以習健步是以遇敵馬傷即行步鬭進能尅敵退可全生以後馬軍不分逺近沿路騎馬再不肯下走百步雖穿帶盔甲亦不慣耐常令馬馱以此馬易疲瘦遇敵馬傷不能行走多被擒殺今宜行彼將官如舊操習騎馬逺行必欲上下每騎十里下十里以節馬力以習健步庶幾如昔遇敵馬傷即能步鬭進可尅敵退能全生不為小補一遼東城內原設分守副總兵一員西備長安等伍堡牆外朵顔等衛逺人時日難離而又東備靉陽等六堡邊外建州等衛逺人聞報赴援往回七八百里山路險逺緩不及事徒多走死馬匹合無行彼鎮巡等官從長計議於東邉一帶城堡相度酌中相應處所添設守備一員在彼常守或止添逰擊一員往來巡察防備庶免遼陽守將顧此失彼臣又思遼東為京師左掖宣大為京師右掖於彼三鎮各添養士馬萬餘以慣習戰陳一可備邉威敵二則京師或中原有事緩急得以調用不為無益一聞遼東往年良將如郭振髙雲者皆廉勇惜軍邉人信服守邉數年略無毫失唯彼抗直不能承奉當道以得薦揚不得顯用今皆死矣不可再得今聞彼處將官除却永楊鎮之外張銘王道略可其餘或非將也舊任逰擊林睿沈毅有謀行軍有紀參將孫棠頗有巧思善處邉事皆曽勝敵立功而又頗能守法知恥不甚科虐論理不宜間廢孫棠曽與臣同繫禁獄彼不知臣甚肆輕侮臣非與之私厚亦不念其舊惡也一自古將材難得而起自行伍慣歷戰陳者尤為難得今彼處邉軍衝鋒破敵者既拘例不得報功而斬獲首級者又被勢豪奪去不得報升官級至於指揮千百户間有謀勇可用者又或家貧不得營幹管軍管事以顯其材以是將官起自行伍真能禦敵者不可再得今宜嚴敕彼處鎮巡官公心體訪指揮千百戶中間果有謀勇出衆家貧不得差遣者務要公心選任管隊把總掌印備禦等職至於勢豪奪功買功之弊尤宜痛革而行伍士卒果能衝鋒破敵或斬獲首級者務要實報功次使其得升官職與前選任指揮千百戶俱令積功漸升品級以備將官之選則在邉將領可得真才而緩急有備矣妄意此法或可通行各邉一先年京差贊畫參隨到彼勢焰薰灼邉人凜凜總鎮官既奪邉軍血戰所得之首級以與之報功衛所官又尅邉軍忍死所待之糧銀以為之宴賞且又聽之乘其馬役其人鞭笞呵叱如待囚隸彼為國家出死力者俯首喪氣不敢言其中心哀怨何可言也故昔宸濠之討調軍遼東人皆踴躍思欲南降向非天命有定北軍至彼大事去矣皇祖聖訓所戒賞功不當久則禍生者蓋幾踐之甚可畏也今後此輩不宜再遣有欲去者贊畫官則送本部面考方略參隨官則送彼處巡按面試弓馬如果謀勇可取者則分彼邉堡當先破敵退縮者如古莊賈即行軍法以折其驕悍之氣以責其報效之實果有謀勇出衆真立戰功者就升彼衛職事使其在彼積功漸多升職漸崇以備將官之選方為有益妄意此法亦可通行各邉一先年各衛堡備禦及千百戶把總等官鎮守官差遣各有定價令其借債買求往彼蒞事不久算其科斂足勾還債本利即便取回另差一官及本官使用另差一處皆有定價凡客商借與銀兩即隨本官至彼守取是以坐損軍士幾不能生今合行彼撫按官痛革前弊鎮守官同心體國於前各項職任必以才選再不許出錢謀幹其有借債及借與者照依吏部聽選官借債事例重行懲治庶可少救貧軍之苦妄意此法亦可通行各邉一遼東軍職犯罪該調南方衛所者到彼官少既得安間尊貴又得易選軍政實是置之樂土而彼皆戀親戚墳墓不肯逺離况彼生長邉方慣習邉事比之南人到彼者不同合無今後此等官犯止令巡撫便宜量罰邉糧或合降級就彼差操免其調衛既得俯順人心又可填實邉衛聖恩若念其祖功不忍盡降則止降其本身以後子孫仍襲祖職亦不為礙妄意此法亦可通行各邉一先年禁伐近邉樹木以制敵馬之衝突不為無見惟遼東各邉敵人止是潛進搶虜多被藏伏樹林內苦於瞭望不見以致失事與他處事情不同合無行彼查勘果如臣言聽其斬伐不在禁例一廣寧至海州一帶路途每年夏秋水淹報傳應接為所阻隔甚為害事宜行彼撫按守巡官計議東西各從三汊河兩岸起手外開五丈之河可以泄水可以限敵可以通舟而即用此土內築五丈之塘中髙禁車如北直𨽻之制則馬步之行無間而邉場之守益固矣其濬築之法宜於二月集夫三月興工計丈分役其濬必深其築必崇每年止開數里遇雨即止來嵗繼之期以數年方成則人不勞而事易舉其土籃鋤掘宜學南方置造庶得用力少而成功多也一遼東各邉之人止是搶奪人畜比之西北各邉頗為易禦然今地震等項災異甚多恐有他虞微聞口西人多有在彼妖言惑衆者先雖敗露擒獲猶恐餘風未殄宜敕彼處鎮巡官密切用心訪察禁治務絶後患既不可疏虞誤事亦不可驚張激變及濫及無辜一彼處軍糧常缺每年奏討户部常賦有限不能多給合無倣古常平劉晏之法選差通達有才部屬官一員前去管糧令其每月預報米價貴賤每嵗預報田收厚薄如其豐收米賤之時户部那借官銀數十萬到彼多糴米穀貯倉量用一年糧銀可糴三二年之食以後三二年却將彼處應給糧銀那用别處所省甚多蓋亦治家通融之法也但其糴糧全要差官立法簡便革弊嚴明慎不許減價掯勒難收以致靠損屯軍妄意此法或可通行各邉一遼東地土廣衍沃饒最宜稼穡但彼人少不能開種或恐開種即便起科為纍耳今宜查比北直隸欽奉太宗皇帝聖旨事理聽令彼處官軍儘力開墾永不起科但得彼地廣種多收米穀價賤緩急發銀到彼賤買即得其濟矣妄意此法或可通行各邉一古遷豪右填實塞下非忍勞民不得已也今南方發彼充軍人犯多係窮凶極狡一方民害或死罪奏減之人朝廷憫其一身之死減發充軍不知此輩到彼即逃衛所反受其纍而又纍死軍解及買娶軍妻無辜三二人尤可憫也今後此等罪犯宜令原籍官司務要審解其真正妻小而家屬隨行供送者不必禁絶其該永逺充軍者即令當房解發到彼俱給與有力軍職之家作為軍伴責令收管以絶其逃就令為彼開種田土以替出原役軍伴别項差操要在得彼人積漸多田積益廣邉備漸充不為無益妄意此法或可通行各邉一遼陽等處倉厫弊不可言蓋由管屯都司衛所官員各欲私收屯糧幾分勒令倉官虛出倉串前後倉官多被纍死遺下子孫流落在彼貧苦不能度日只得附倉近住亦皆包收屯糧插和虛假後官憐憫只得聽容以是出納增減為弊不一倉廩日虛邉軍受害管糧分守官或髙坐付之不知或明知不忍查究今合行彼從實查出前犯者量行寬貸以全其生後犯者必行重治而置之法庶以後倉官免於纍死而屯軍納糧不致多收戰士食糧皆得實惠矣一聞先年都御史王翺在彼總制十有餘年措積糧餉不可勝用今後巡撫有缺宜選才能濟變心誠體國不避嫌謗資淺官員止升僉都御史或照先年王詢事例止以寺丞等官領敕巡撫一般行事使得便宜措積糧餉練習軍士識拔將官慎固疆圉待其年勞頗深加升副都再深加升右都一如王翺故事在彼久任不為無益妄意此法或可通行各邉一遼東地方原設分守參議一員分巡僉事一員分地管理詞訟及查革姦弊核實功罪等事舊皆山東布按二司輪差年深官員到彼守巡近時官員遷改不常年深者到彼即升而後代者經時未至地方常致缺官理事合無今後遼東守巡官員就部銓注仍帶山東職銜在彼常管夫久任則賢否易知而重難事務無所推避於地方有益不淺一彼處生員資性類多聰敏而驕惰不肯力學蓋因無提學専管考試不常進黜不公或先考退者夤緣復進以是人無勸懲今北直𨽻地方廣濶學校數多一提學常年巡考亦恐難周合無添差提學御史一員總前二員一員専管京西以南直至大名府一帶一員専管京東直至遼東一帶庶幾教有常職材必多就邉人出身文科者兼習邉備武事不為無益一彼處原設衛學禮部奏準一衛二衛一學者正附生員各二十名是比縣學三衛一學者正附生員各三十名是比州學四衛以上一學者正附生員各四十名是比府學彼處生員原不食廪止將正學挨次充貢後因禮部失火舊卷不存近被直𨽻提學御史洪範朦朧奏革正附名色挨貢不明又被廣寧在城四衛及在外右屯一衛共五衛一學生員甚多向學頗衆每年考送科舉常五六十名正該比依府學正附生員各四十名先年撫按節次奏添禮部因無原卷失查舊例止增十名比依州學是與他處三衛一學者多寡不倫且孤邉人向學之志乞敕禮部斟酌仍照原設衛學奏準事例衛學生員仍復正附名色使其附學優等者考補正學正學年深者考充嵗貢而廣寧等五衛一學仍照舊例正附生員各四十名比依府學一年一貢庶彼邉人知勸向學而人材益衆矣一遼東原附山東生員亦往山東應試者以海道之通而地方相鄰也今海道不通五六十年聲勢邈不相聞矣每科生員猶赴山東應試路出山海關西至京師往南復東才至濟南往回路程六七千里又皆陸行比之南方舉人赴京會試者勞費尤甚以是富者能往貧者遂絶中舉之望實可為憫乞敕禮部計議合無順天府鄉試每科量添中式五名就令遼東生員赴京應試實為便益一今遼東災異之多臣竊過慮往年劇賊劉六劉七齊彥名李隆楊虎等倡亂流劫橫行南北直𨽻山東河南地方其敵殺官軍攻屠城邑殺人不可數紀而全家被殺者蓋亦多矣事平之日不知法司何見全其妻子今劉六二子劉仲倉劉草包兒者年皆二十有六矣原發開元城內失記遼海或三萬衛充軍不知在否其人幼皆狡賊異常其劉草包兒所以得名則因初生失母用草包裹丟棄野外數日不死乃復收育其迹頗異昔元末韓山童妖言被獲其子韓林兒得脫復與其黨劉福通等倡亂割據遂不可遏古人除惡務本良以是也况先民間謠言劉六劉七齊彥名皆不死逃命其尸獲非真雖事未可信然今二雛在邉窮困無賴或其惡氣所鍾乘其年少英鋭復起叛心而或妖言者挾之賊寇者得之因以擾亂地方不可不計伏乞聖明宸斷選差能幹官校一二人齎駕帖徑往開元責彼守將密捕解京斬首以絶禍根而齊彥名劉七等子孫有充軍他處者一體查實施行則亦古人防微弭亂之䇿也如若聖度寬容不屑計此則臣過慮妄言亦乞置之不問不必各衙門抄議以傳泄其事驚動人心奉聖旨該衙門知道保養聖躬疏臣少經父母多疾頻嵗調理兼臣元稟極弱素多疾病年二十有七因臣父疾逺聞不真憂疑損性又值醫誤遂成痰火奇症至今三十年間無日不病無時自保以是於病情醫藥經驗頗多不敢輕忽蓋人稟氣厚薄甚是不同醫之用藥亦當因人而異故如宋髙宗稟賦充實每疾必以蠲毒丸推蕩之而愈其子孝宗偶疾髙宗賜服前藥講官史浩亟以人參丸易之者蓋恐其氣弱不堪迅治此雖一般帝王均受天命其稟氣不同亦有如此至凡節欲保養氣弱者尤宜百倍加慎臣又聞醫疾者於貧賤之人則無所敬忌可得而詳問其病原以是用藥易中於富貴之人則多所敬畏不敢詳問其病原而惟憑切脈切脈乃試病之一方不足以盡知病也以是用藥易誤今只以感冒一事言之輕重不一凡草野之人或因衣薄或因飢餒或乘勞後氣弱為風寒所侵久而身熱氣喘不能飲食動履者傷寒也初發一二日宜表汗三四日宜和解或有夾食當兼消導者氣厚之人汗解即愈氣薄之人汗解後猶須調理多日方得完復若解散不能延至七日後則治法多端必費調理此為重病富貴保養之人多無是也其他輕疾或因當風坐卧或因輕暖脫衣一時冒寒又或當夏冒暑皆為感冒其病即發有身熱惡寒有不身熱而止畏風寒其身熱重而稟氣厚者汗解即愈身熱輕而稟氣薄者止宜用藥升散其不發熱而止畏風寒者或止加溫暖或略致勞動亦能自解是皆不須發汗又有感冒後鼻塞咳嗽或身微熱或身不熱皆名傷風身熱厚者亦可汗解其餘皆不須汗止是聽其痰嗽數日邪從嗽出而自散矣此皆不廢飲食起居不論貴賤勞逸之人皆有之又有一等安逸之人或因飲食停滯或因心勞火動或因七情所鬱身亦發熱或惡寒有似感冒而實非感冒者當以雜病治之不宜發汗蓋發汗易傷元氣稟厚者不覺稟薄者宜戒春夏猶可隆冬氣閉之時則尤宜慎重也臣初至朝見敬畏之過不敢仰視天顔然聞聖體生長南方與北方稟氣粗厚者不同近聞偶致違和臣亦冒風痰嗽先注門籍在家初聞頗憂繼聞羣臣具本問安節奉聖旨朕偶感風寒已就平復臣心私慰今初一日出朝始得隨衆至左順門問候乃聞聖躬始能進膳則前此進膳尚減不勝憂惕深恐醫藥表散或過不無略損元氣以致完復稍遲今願皇上慎重服藥止是節飲食慎起居將養數日則自完復矣尤願此後精選內臣中性資忠實明慎曾多疾病經試醫藥者三二人使之多看醫書究明醫理専以保護聖躬稍遇違和即許大臣日至便殿候問起居藥食與醫商量調治則聖躬常保安全而萬夀無疆矣臣聞古之大臣常欲其君身之強固君德之清明故設師保之官師以導之教訓保以保其身體為義則其職固然也臣荷國厚恩叨任卿佐唯以愛君如父之心不能自已冒進此言非敢為是以褻天威亦非假是以希天寵也如蒙聖明俯鑒臣愚特將此奏留中省覽不必批出幸甚忠益疏臣以病廢庸才誤蒙聖恩録用強疾來京途聞陛下日御經筵勵精講學臣為宗社生民喜幸無限舟中無事日取舊讀經書擇其切于治道者試為講義三章到京之初即欲封進然思陛下天縱之聖乙夜所觀儒林妙選之臣經筵所講豈其少此而臣為此冒瀆豈不取笑天下得罪公朝以是躊躇未敢今臣又思昔言野人有食芹而美思獻王室者豈為王室無芹而欲為獻蓋區區忠愛之誠不能自已也臣之愚誠實亦類此故敢以獻伏願皇上萬幾之暇特賜省覽終篇如其切於治道更乞留中垂意若係妄言非忠批外擬罪臣愚甘當重黜謹開另封進呈御覽講義三章大學一章書經一章易經一章計開講義三章大學一章秦誓曰若有一個臣斷斷兮無他技其心休休焉其如有容焉人之有技若已有之人之彥聖其心好之不啻若自其口出實能容之以能保我子孫黎民尚亦有利哉人之有技媢嫉以惡之人之彥聖而違之俾不通實不能容以不能保我子孫黎民亦曰殆哉唯仁人放流之迸諸四夷不與同中國此謂唯仁人為能愛人能惡人這是大學傳之十章曾子釋治國平天下臨了這一件大事都不説别的只説要與民同好惡而不専其利者蓋人君好惡不與民同則失了人心便壞了祖宗天下流到子孫禍猶未已所以治國平天下緊要在此一著此引秦誓之言乃是指出兩箇當好當惡的人秦誓周書篇名乃秦穆公悔過作此以誓戒羣臣也斷斷誠一之貌休休易直之貌技謂有能彥是美士聖是通明彥聖謂有德秦誓言若有一箇大臣只是老實一心別無他技能本事其心平易正直其度量寬而有容見人之有才能如自已有的一般歡喜見人之彥聖有德不獨口裏説他好其中心著實愛他處甚於口之所言這箇大臣能容得天下之才德如此人君識得此人而信用之則能保其子孫黎民尚亦有利尚是庶幾不敢執定之詞蓋子孫得他保則能世世為君黎民百姓得他保則得箇箇安樂所以有利然非這箇大臣一身能如此也由他好賢樂善薦得天下許多有才德的人都來輔佐朝廷行好政事立好法度子孫世守不變所以能如此也又有一等大臣自家非無智能技巧但是他立心虛詐不一不能休休有容所以見人之有技能者則媢嫉以惡之媢是忌嫉亦惡也見人之彥聖有德者則阻絶人不許薦他使不得通達於上這箇大臣不能容天下之才德如此人君不知而誤用之則不能保其子孫黎民亦曰危殆蓋子孫之殆則不能保其位矣黎民之殆則不能保其生矣此亦非這一箇人便能致此也蓋由此人妬賢嫉能阻遏得善人不許進用其所以引用布列庶位者都是他一樣的姦邪小人互相蒙蔽君上顛倒曲直正人被排逺去無敢在朝指言其過者以是任他私意行事蠧政害民雖傳到子孫手裏還是他引進的人一向得用一翻過了又引一翻都是這樣人盤結蒙蔽住了雖有一兩箇正人得進朝來被他衆口誹謗同説不好人君亦自難辨雖有英明之君一時辨得亦被他人衆把持住了亦難張主以此子孫黎民之禍有不可勝言者矣前代人君坐此纍其子孫凌夷敗亂者不可勝紀大學引此見得前一樣能保子孫黎民是所當好的天下之所同好也後一樣不能保子孫黎民是所當惡的天下之所同惡也然又慮此媢嫉之人姦深計巧多能結交彌縫以自媚於人主左右不忠似忠不廉似廉人君或蔽於私意識他不破或牽於姑息去他不得故又謂唯仁人放流之仁人即仁君也蓋獨是仁君至公無私故於此媢嫉之人不為私意所蔽能早識他不為姑息所牽能決去他雖其罪惡未著未忍殺他然亦放逐流竄之將他逺置四方蠻夷之地不與同居中國蓋恐其近則投間抵隙夤緣復進以妨賢而病國也此正古語所謂唯仁人為能愛人能惡人者如此蓋能惡人者謂能逺去此媢嫉之人不為子孫黎民之害公天下之惡而惡之也能愛人者謂能去此惡人則能保全善人使得安心輔佐以為子孫黎民之利公天下之愛而愛之也故曰民之所好好之民之所惡惡之此之謂民之父母臣按先儒朱子有言小人為惡千條萬端其可惡者不但媢嫉一事而已仁人不深惡乎彼而獨深惡乎此者以其有害于善人使民不得被其澤而其流禍之長及于後世而未巳也今之言者乃徒劾人貪暴等事而捨媢嫉不言其故何歟臣又觀秦穆公乃周末一箇強國諸侯其人有何足法但此篇説話説得君子小人之情狀利害極是明白痛快故孔子刪書存此於百篇之末以垂訓後世曾子傳大學又引此於十章之末以為萬世治國平天下者之昭鑒也臣切見我皇上臨御以來內無聲色貨利之欲外無戚近私昵之蔽而惟一意修德講學勵精圖治孝養均於兩宫憂念存於百姓誠不世出之仁君也今惟鑒此古訓試察在朝大臣有能薦賢而又喜人薦者即秦誓所言前一等人也宜當信用有不肯薦賢而又怪人薦者即秦誓所言後一等人也宜當迸逐惟此一事最關治亂惟聖明留意天下幸甚書經一章惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒這是周書洪範篇周武王初得天下訪問箕子以治道箕子推衍大禹洪範九疇以告之也洪大也範法也謂治天下之大法也昔者大禹治水功成天與神龜出於洛水其龜背上所列文數有九大禹聖人默契天道因而則之以為九類示萬世人主治天下之大法故曰天乃錫禹洪範九疇箕子推衍至此上言六三德一曰正直二曰剛克三曰柔克者蓋言人君因時制治有是三者作用不同皆所以納天下臣民於皇極者也然是三德非人君自操威福之柄則不能用故此言唯辟作福唯辟作威唯辟玉食唯獨也辟君也福謂凡與人以爵祿使之得福也威謂凡治人以刑罰使之可畏也玉食猶今言珍羞盛饌也蓋獨是人君受天明命為天下主則可以賞人之善用人之賢而與之爵祿使之得福是謂唯辟作福亦獨是人君則可以討人之罪黜人之姦而治以刑罰使之知畏是謂唯辟作威至於玉食亦獨是人君居天下之上則可以享天下之奉而食用珍羞尚膳是謂唯辟玉食臣謂大臣也大臣則不可有擅作威福僣用玉食者故曰臣無有作福作威玉食使大臣而有擅作威福僭用玉食者則英明之君終必覺察而討其罪故在大夫必害于而家在諸侯必凶于而國大夫稱家諸侯稱國者蓋古之大夫如今武職然多是世祿家傳僭亂則滅其家故曰害于而家諸侯如今公侯伯之類多是分封有國僭亂則滅其國故曰凶于而國人謂羣臣側不正也頗不平也僻不公也若大臣有作福作威玉食而君之不覺則凡在羣臣因見大臣作得威福可以趨附他求得官祿免得禍患遂皆靡然從風隂懷一種不正不平不公之心立為一種不正不平不公之論以顛倒是非混亂曲直而蔽主聰明排斥忠良以隂附權臣之勢為禍不淺下而小民亦皆倣效成風過分僭用而不可繩以禮法此言人臣僭上之患如此臣觀自古人君不能總攬威權不覺威福漸移臣下而致失祖宗之天下者多矣然考虞書舜典篇載舜命九官兩咨四嶽其餘或咨衆論之公或因大臣之讓而命之周書立政篇周公告成王言文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違則知自古賢王進賢行賞必先咨于衆論用刑敕法必責成于有司又若不専以一巳之見與此不同者蓋人君一身深處九重不能盡識天下之才亦不能盡厯天下之事故必先得忠賢數人布列卿輔要職以後命德討罪必咨衆論必聽有司從公擬上然後人君察其公私可否稱制臨決是雖先咨衆論而必斷自君上雖斷自君上而皆合乎公論此昔人君自作威福者如此舜文所行與箕子所言同一揆也乃若秦漢唐宋之季中材之君不能知人委用姦相一人被其蒙蔽排斥忠賢無敢直説引用姦邪托為鷹犬使之攻擊異已以致羣臣畏威附勢無敢異見凡其所欲即與議奏其挾下奏以欺上則曰衆論所同而不知由其一人私主也其挾上旨以欺下則曰上意所主而不知由其平日從諛也凡善則歸已曰上初不然我勸如是也過則歸君曰上所固欲我不能回也大臣一言天下皆信由是怨皆歸上而恩皆歸下威福豫奪皆出其身而主威日削國勢日去矣此後世臣之有作福作威者然也我太祖髙皇帝獨秉全智髙出千古監前代姦相之弊革去秦漢以來丞相之官逺法成周六卿分職之制分設府部寺院等衙門以分理天下庶務彼此頡頏不敢相壓事皆朝廷總之所以穩當明著祖訓首章以為子孫萬世之法至我太宗文皇帝簡任內閣儒臣日與咨訪政治然彼時內閣多是朝廷親選翰林編修等官才猷歷練能識人才治體公忠體國者為之不曽驟加髙品至於選入翰林者又皆唯材是取不拘內外新舊職事逮我仁宗昭皇帝宣宗章皇帝朝間亦選委六部尚書如夏原吉等商量條旨彼時絶無偏重之勢兼且以前大臣多是祖宗親自下僚識拔不論資格者蓋由日嘗面試知得明白所以如此一一得人及後英宗睿皇帝再登寶位凡選用卿佐重臣必召吏部尚書王翺與大學士李賢面議可否彼時或用二臣所薦或由聖意自定皆稱得人廷無間議憲宗純皇帝以來始不召大臣面議止令吏部會推才望相應者二三員疏名請旨點用一員此又上合虞舜命官必咨四嶽詢謀僉同之意也臣猶記𢎞治七年間內閣員缺吏部會推相應六員上請孝宗皇帝點用位次最下者二員曰李東陽曰謝遷都只是詹事等官不曾驟用崇職不知自何年起內閣自加隆重凡職位在先第一人羣臣尊仰稱為首相其第二人以下多其薦引隨事附和不敢異同近又另立掌誥敕一員多自尚書侍郎翰林出身者不由衆推首相坐名題本取用後有內閣員缺即令推補又不知是何年間曽否奏準限定翰林院官必是進士第一甲及庶吉士原係內閣取中教養之人為其門生者方得選用吏部不得擬其升黜亦不許擅升外職使之歷練民事稍涉干計辛苦又占定禮部尚書侍郎職事優間者俱是翰林院官做吏部緊要衙門必用翰林一人其餘內外官員雖有文學才猷出衆者不許再如祖宗朝選入翰林大臣非翰林出身者不許推入內閣是皆私訛相傳謬稱舊制以欺後進以箝衆口下視六卿等官勢分懸絶若其屬吏不敢違抗使後相承入閣者必其門生子弟自相傳受後者未遇感前人之接引前者既老責後人之報施而凡身後贈諡蔭子等事不論忠邪一皆預為已地而盡力為之至於纂修書史亦必私其黨類而善惡倒置褒貶任情以是不如祖宗朝選取外官同修此則自古所無之大弊也近聞吏兵二部選用緊要官職及會推大臣必先問首相所欲而後敢擬名奏上法官出外勘事者亦必承其意旨而不問虛實任情勘報由是威福豫奪盡歸于此一官矣使得其人皆如先朝楊士竒楊榮楊溥及今石珤之忠清楊一清之才識可也不幸而有姦險媢嫉者濫居其上則彼其排斥忠賢引用凶邪國事日有可憂矣陛下試省往年禮部尚書員缺吏部會推賈詠為首陛下親用席書均之侍郎資格不異也席書升禮部舉朝士夫皆以為非而攻擊不已賈詠一時雖未點升數月以後首相坐名取掌誥敕遂入內閣位居書上安然坐受舉朝略無異議今此二臣日侍左右其忠猷才力聖明豈有不知而何用於陛下者如此不服用於首相者如彼帖然人心所向如此今陛下採諸輿論斷自宸衷慨然召用楊一清勉留石珤舉朝欣躍方謂陛下知人善任輔弼得人天下之福而言者多方計沮欲以久留一清于邉且不欲羣臣早推應代一清之人意有所向也羣臣奉旨叧推見任兩員寧受稽違之責而不敢少拂當道之意即日推進者勢有所畏也陛下視今威福出于誰乎易因覆霜遂戒堅冰蓋以隂比權臣防其勢之漸長也此事忠臣有識者深以為憂故今在內者危迫而不能自安在外者畏縮而不敢求進也不然以陛下聖明何古帝王之治不可復而天人之心有不順乎今天心警戒災異頻仍男子不假婦而自生不育者喻君無臣欲養萬民而不能也雨絲者喻上恩澤之降被變而成私也地震者隂不能安靜而僭為陽動臣強之象也陛下遇災警懼命其撰敕戒諭羣臣修省彼不肯撰者恐羣臣或因是而指言其失也多方隂沮楊一清之進者恐才出其上因而代已也此其心迹甚明惟聖明早加省悟宗社幸甚生民幸甚易經一章不出户庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也不出户庭無咎這是周易節卦初九爻辭周公所繫本説初九這爻以陽剛得正居節之初猶賢臣君子在下未有職位且有九二大人塞遏其前未可以行能節而止者也故其象占為不出戶庭則無咎戶庭戶外之庭乃私室無人往來慎密之處也孔子於此又見得古今君臣多因言語不密以致禍亂故作繫辭又因此爻而釋之曰凡禍之所生則言語以為階階為梯級由此踏上而漸至者也何以見得言語是生亂之階蓋人君與其忠臣密謀國事君若一時不密而泄其言則所與謀之忠臣必被人怨謗用計殺了所以失其臣臣若一時不密而自泄其言則招人怨謗終必見害乃所以自失其身凡此君臣密説的言語或欲行大政事或欲除大姦惡皆不利于權姦小人不可使知者所謂機密重事也自古權姦之人平日善於交結必有心腹左右之人為之探聽使君臣之間一有不密而漏泄其事則臣既見殺君亦被怨國家禍患由此而成是以君子之人務要謹慎周密凡事藏諸其心而不出諸其口使户庭之間亦無人知也此君子兼指君臣上下而言臣觀自古君臣議事不密而致忠臣被殺國家受禍者不能悉紀只如漢成帝時大將軍王鳳専權成帝止欲自用一人左右爭執以鳳未知不可因此主威日削災異屢見成帝乃問師傅之臣如張禹敢諫之臣如谷永輩皆私附王鳳將災異指在别事身上不肯實説以此成帝一向信任王鳯不疑後有京兆尹王章言及成帝召問感悟遂與章議舉賢代鳳彼時只因言語不密以致王鳳知得反行用計左使劾章下獄而死又諷御史劾其所薦之人亦致去官以此舉朝怕鳳再無敢言王氏者傳至其姪遂移漢祚孔子此言真萬世人君謀國之切戒也惟聖明留意幸甚胡端敏奏議卷五
