body:
  text: 明胡世寧撰畧陳治要以獻愚忠疏時官右僉都御史巡撫四川臣以病廢庸愚遭時蹇阨始憂宸濠繼憂江彬為國患害致䧟身家晝夜哀思㒺知攸濟今者幸遇皇天眷佑聖徳隆興下詔求言勵精圖治天下臣民如獲更生萬世奇逢萬方稱仰凡抱忠懷皆欲獻納况臣首被鴻恩何忍括囊自利但欲盡言天下之事則職分有拘亦恐煩瀆故敢畧摘其要少塵睿覽臣聞自古帝王之徳莫盛於堯而其致治之盛享國之永亦莫如堯史言堯自唐侯特起為帝時年十六其後享國百有一年今我皇上起自興藩入繼大統即位之迹春秋之富皆與堯同而聰明仁孝天性之美亦與堯同臣願陛下修堯之徳致堯之治以後享國之永當過於堯上以固我皇明億萬歲之基下為天下臣民萬世太平之福此其至要臣所至願也臣聞人君大徳有三曰仁曰明曰武昔宋臣司馬光每以是告其君而其言曰仁非嫗煦姑息之謂也興教化修政治養百姓利萬物此人君之仁也明非煩苛伺察之謂也知道誼識安危别賢愚辯是非此人君之明也武非強亢暴戾之謂也唯道所在斷之不疑奸不能惑佞不能移此人君之武也孔子對魯君問政亦曰知仁勇三者天下之達德也知即明也勇即武也史稱堯仁如天仁之至也其知如神明之至也書稱帝德廣運而曰乃武武之至也其曰聖神者即仁知之極而文即其英華之發非有二也堯德惟是三者各極其盛故能致萬邦協和之治以享百十七年之壽臣願陛下自今清明在躬之始物欲未蔽之時即光之所謂仁所謂明所謂武者而日存諸念慮之間時省諸用人行政之際其有不合者即速改之而務求其合日新月盛將見陛下之仁亦如天知亦如神勇亦如堯之武矣又何患致治之盛享國之永不如堯也哉臣又聞修德必頼講學講學必在讀書臣慮陛下萬幾之繁未敢勞以盡讀天下之書也昔宋儒真德秀作大學衍義一書我太祖高皇帝知其為帝王為學之要大書兩廡之壁時睇觀之臣願陛下先取此書朝夕省覽則於政治得失民情事理與凡奸邪害政之術奸弊害民之事無不周知矣其他經史則命儒臣摘其切於身心治道者而以次進讀可也然而講讀輔導之官尤在得人臣見近日科道奏起臣僚中有先任郎中新任副使魏校有先任修撰後改同知何瑭此二人者皆氣質温醇學行純正又有先任編修今陞僉事邵銳行端而潔性直而温臣愚欲乞聖明將此三人量依原級改置經筵與翰林院儒臣之賢者同侍講讀日備顧問必能開發聰明輔養聖德至於賞罰人主之大柄陛下即位之初賞善罰惡固巳大快人心矣然臣猶願内外逺近視為一體賞必當功而幽隱不遺罰必當罪而脅從㒺治如内擒江彬肘腋之患比外擒宸濠之功事亦不易也均當論叙昔附宸濠以啟禍亂比今附江彬以取富勢之人罪尤深重也均當追究文臣忠正者既䝉褒錄矣武臣有指揮牟斌者累因執法以受罪内臣有承奉周儀者不從謀逆以被殺臣愚妄意如此𩔖者皆宜一體查錄以示公平正大之體至於誅戮權奸亦宜論其平日稍分差等庶使後之内臣武臣守法効忠者益知所勸而得勢擅權者亦不肆為大惡以戕善𩔖而為社稷之憂此則臣愚過計之甚未敢以為必然也臣又聞孟子有言堯舜之仁不徧愛人急親賢也今陛下有堯舜之資當得臯夔稷契之賢而親用之然世卒難其人得如姚崇宋璟者斯可矣崇善應變以成天下之務璟善守法以持天下之正昔唐𤣥宗起唐中廢其德萬萬不及陛下然能相此二臣坐致太平四十餘年近日言官奏起舊臣中有如林俊楊一清劉忠林廷玉者皆其人也俊雖執古而時俗或不之喜然其守正之節則真宋璟也一清雖諧俗而士論或不之歸然其濟變之才則真姚崇也臣願陛下早致此四人而用之輔弼或部臺要地與今左右忠良同心夾輔則其所設施所匡弼必大有益於新政而致太平久逺之效矣其他舊臣雖臣踈逺不能盡識要皆老成忠正陛下巳允公論之揚而勑吏部遇缺取用天下稱快矣雖其間萬有一誤舉者吏部更加審擇弗使再為附勢殃民而巳夫用人如用藥使百良藥之巾而間以毒藥一味則衆良之助不能奏功而一毒之投遂致殞命可畏之甚書曰任賢勿貳去邪勿疑為是故也惟聖明留意天下幸甚奉詔推舉幽隱忠賢以備起用䟽伏讀詔書内一欵𢎞治十八年五月十八日以後正德十六年四月二十二日以前在京在外大小官員人等有因忠直諫諍及守正被害去任降調陞改充軍為民等項各該衙門備查明白開具事情奏請定奪降調陞改致仕養病閒住充軍為民者起復原職酌量陞用欽此欽遵臣有以仰見皇上之心即自古聖王顯忠遂良急賢圗治之盛心也是以即位旬日之間凡昔忠正被害之人吏部查奏悉䝉甄錄天下聞風㒺不慶幸以為聖明一出而悉用忠賢忠賢既枉而復遇聖明千載竒逢萬世太平之治將自今始矣然其間有一二或因去任從容而人不識或因被人誣衊而迹未明臣恐一時查奏未及敢以上聞臣切見正德初年逆瑾擅權之日死生呼吸一時廷臣莫敢正言雖言未必剴切有如給事中劉茝監察御史徐鈺二人之奏比衆獨為剴切明快茝奏傳聞天下稱頌鈺奏隱淪人或未知既而二臣以黨籍去位瑾誅復用又止各陞知府茝任金華值地方無事而惟以勸民善俗為務鈺任廬州遇大盗充斥而實多經畫保障之功然而忠賢作郡公正自持心惟撫字之勞禮或送迎之簡以致上司不恱而所志難行鈺則屢奏乞休而得請致仕茝則不幸而遇逆臣潘鵬廵按誣以貪名劾令去職此其陞改失任之事情也若論其平昔則臣之與鈺實與知心其人外和内剛不異流俗至於推賢樂善之誠物我無間忠國愛民之志生死不移真古忠臣也茝雖未與識靣然聞金華士民皆道其善政惜其誣枉而言其實愛百姓如妻子處同僚如弟兄待羣吏如奴僕真古君子也或謂鈺無仕進之志茝有勸罰之名不宜薦用者臣謂不然夫士君子當羣奸亂政之日則當求退避遇聖人御天之日則當出效用出處之義自古然也鈺雖志尚恬退亦豈容其肥遯於聖明之世哉至於勸罰云者良有司或因公用之難免而又不忍貧民之聚出乃或勸富民或罰有罪以代貧民之科率古今循良不免有是也其或假公以入巳則坐貪以問罪公論國法皆所不容矣其有等避嫌縮手以保亷名而興革營造一不之為其遇上司有所科派則依文論户而均敷貧民畧不為處此則自全聲利之徒非民父母非國忠良也茝之勸罰要皆為公若謂其有入已之私則士民初無間言茝之平昔决非是人也夫潘鵬之附逆巳久而嫉忠尤甚其劾劉茝至與張龍並列今公論大明茝之為人豈張龍比哉其不足信也明矣又况臺諫忠直之人朝廷舊有陞用之格若或授以才非所宜之官䧟以法所難明之事使之隱忍得罪以去而公論不為辨白則後之為忠者亦知所戒矣臣愚妄謂如茝鈺二臣之孤忠大節雖其才力不堪作郡猶當改任他職而况其在官各有利民之政其去職止坐事上之簡哉臣愚誠不願聖明之朝而遺此二賢之在野亦不忍二臣之忠而不與聖明之簡用也故敢昧死上言伏乞皇上特勑吏部再加訪察如果臣言不妄即起二臣置之優閒論議之地使其㕘佐大臣賛畫朝政必能有禆清明之化如臣挾私妄言甘當㒺上之誅萬死無憾舉用賢才以安地方䟽臣聞為政之道以得人為本事君之義以薦賢為忠臣雖不才敢昧斯理况臣所屬四川地方廣逺西連吐蕃自古為患南接諸夷不時寇掠至於腹内地方先被流賊殘破瘡痍未復近年又為採辦大木及取佛使臣在彼科率騷擾民窮財盡十分難處况臣才弱不堪非得上下同事一時軍民職官盡皆賢能其何能濟臣竊見先任浙江左布政使方良永為人仗義而不隨流俗舍巳為民而不避權勢先任雲南按察使劉麟為郡守而播循良之譽掌憲臺而嚴風紀之司見任江西按察使伍文定才力過人忠勲茂著原任山東按察司副使余祜學有本原而正直忠厚志存經濟而勸勵周詳見任山東按察司副使蔡天袩材兼文武志秉忠清見任陜西按察司副使吕和存心正直而憲體嚴明處事公誠而政蹟眧著此數臣者臣之才力逺所不及又有原任山東按察司副使胡文璧見任福建按察司副使潘珍先任湖廣按察司副使陳槐先任四川按察司副使張思齊見任湖廣按察司副使張鳴鳯原任浙江按察司僉事韓邦奇見任貴州按察司僉事王瑞之原差江西清軍監察御史范輅見任浙江杭州府知府留志淑台州府知府顧璘丁憂服滿知府廖紀戴德孺南京養病給事中徐文溥主事姜清終養給事中樂頀此數臣者臣雖不能悉狀其噐識之所似然聞其皆有體國為民之志皆有修政立事之才與他齷齪自守惟保名位者不同至於武臣則有在京叅將桂勇亷而有勇信而好義遼東分守叅將高雲亷勇忠直一時罕比閒住叅將段錦老成恬退同軰推服小官則有杭州府通判喬遷亷能有為不受勢囑如䝉聖明特勑該部再加訪察如果臣言不妄乞將前數臣中推舉一員代臣廵撫容臣休致或併後數臣遇缺陞補四川地方相應職事使得各施所藴助臣撫治必能有益地方以寛朝廷西顧之憂而㣲臣亦得以少逭尸素之責矣急處重邉以安全蜀䟽臣聞吐蕃為患自古已然故自唐及宋多重蜀帥為是故也惟我國朝威德廣被番戎率服故國初於羣番之中取古松州而城之置兵設衛曰松潘軍民指揮使司以控制羣番而離其交合以伐其内寇之謀以為我全蜀之蔽誠得古禦戎之上策也然國初松城内外地皆熟番為我服役故有八郎等四安撫之設有北定等十七長官之司其南路至疊溪千户所又有鬰郎等二長官司之屬再南至茂州衛又有静州等三長官司之𨽻其東路至小河千户所再東至龍州則近至白馬路長官司而皆受我約東為我藩籬者也暨後承平法弛任用非人而撫禦失宜熟番多叛而寇我内地戕我軍民松城四外盡皆讐敵而東南二路僅有羊腸一線之通左右皆番朝夕窺伺矣故景泰以來添設總兵官都御史專治松潘然而四川㑹城又設廵撫彼此牽制難於行事以致舊維州之失竟不能復董卜韓胡之強終不能制也然彼時東南二路猶皆可通及後事勢稍平去都御史而分設兵備副使三員一治松潘一治疊溪威茂又一治茂州以東􅄵底徐塘等堡路抵龍州謂之小東路而住劄綿州叅將二員分治東南二路逰擊二員往來於中每歲二八月中松潘緫兵與茂州叅將㑹議一次松潘兵備與茂州兵備㑹議一次每㑹皆逰擊率兵與偕而軍威猶振番夷猶畏服也以後因事革去逰擊𢎞治年間承平日乆都御史潘蕃等廵撫惟以保守為事以欺隱為能軍殺一番則坐以擅殺激變之罪番殺一軍則坐以玩寇失機之罪由是官軍垂首䘮氣而惟扣糧閉口以賂番或棄其兵械而執農噐以為番役矣由是番人得志日肆驕横每年班軍累死餓死殺死者十常七八而道途任其邀刼闗堡任其殘破一皆付之不知邉堡有報則隂中以法問其來使而實言有警則遏以大杖而使之㡬死後有問則大聲對衆而答言無事矣不幸而事聞朝廷則隱匿之罪仍付之下吏曰彼不曽呈報也此前人之善為保守而坐致部臺稱為老成也此南路之所由以塞而惟東路僅通也近該廵撫都御史馬昊因人心之憤採衆論之同而奏請大征又不幸而冒險輕進遂致一敗之眚以廢數年之勞至今邉人言之皆為嘆息然自是番夷比前稍畏道路比前稍通不為無效也臣與昊素不相識正德八九年間臣在江西昊在四川皆任兵備副使皆為地方平賊昊遇彭澤之知而薦為廵撫五六年間遂至大官臣被俞諫之忌而嗾其心腹王泰等撥置宸濠奏臣死罪五六年間䧟為罪𨽻萬死得生今臣幸遇聖明復加錄用昊乃因罪罷黜然訪諸四川軍民之論則多為昊惜臣亦自揆才力不及於昊不敢蔽也昊事往矣臣愚竊念四川之有松潘猶人家之有外藩也松潘之有東南二路猶人家之有前後二門也不幸前門有火盗之阨而後門可通救援若惟一門有阨則闔户死矣今松潘南路之不通已二十餘年所恃餽運之通者惟東路一線耳使一有警截其東路則應援糧運皆不能達數萬生靈計日以斃而四川之外䕶徹矣祖宗之重地失矣不可不為之計也然馬昊以欲通南路而敗今臣復以為言者區區之忠不敢自為身計而上負朝廷下誤地方也然以昊之才不能通此路而臣欲通之者昊惟有才常得意而輕試其所長臣惟不才常受阨而欲善用其所短也臣自被命以來強疾赴任七月在途每遇蜀人宦逰於彼者輒訪蜀事比至漢中遇邉人避難於彼者備詢邉情入疆以來又多詢訪事蓋得其一二矣大抵番雖强惡而種𩔖各分每寨多者不過千人少者不過數十其勢不相統一其情雖貪利好殺而猶尚信可馭也惟其山高地勢險甚而吾人少入其中不能知其地利又惟大舉征剿則彼聞風驚懼急則相保雖讐亦睦雖順亦逆而相牽旅拒誘我深入必為所䧟矣就使勝而多殺彼或逃死而出投外番相合為一或成唐末吐番之勢則又非國家之利也若專撫之而威不立則泛賞之給彼以為畏而買求恬不知感而益肆侵侮每歲官軍餓死累死者反多於戰敗被殺之人往事可監也臣聞其事要在乎威信兼立撫治兼施而欲威信之立撫治之善又在乎用人才添兵將更賞罰足財用四者而已四者既得而撫治得宜臣雖病弱不足以任其事使得更任廵撫有才力者總督於上諒在一二年之間南路可通而番夷自戢矣今訪得南路松潘該管西寜等十七關堡道路一百二十餘里久已廢塞近年兵備副使胡澧等因番夷信服之勢漸巳修通後因兵部奏改本官別用不敢任事而又被劾行勘且避副緫兵張傑之害退居小河人心遂懈仍復廢弛疊溪該管新橋等四堡道路五十五里止因近年都御史馬昊征剿松潘畨蠻聚衆要來攻堡諸軍畏怯撤入疊溪城内遂爾廢棄不久以此而觀南路之復勢亦非難也要在乎兵備總叅之得人耳臣所謂用人才者其意在是今松潘兵備之有胡澧蓋千百而十一者也其人亷勇忠信視國如家愛軍如子莅任五年以來内軍外夷一皆信服其撫剿亦多成績節巳奏聞惟其為人直巳自信處物多乖是以同事不合而當道屢劾今其所劾事情臣已勘明另奏蓋止坐革前撥軍破柴燒磚而失於嚴督致被畨人殺死一軍擄去一軍耳其餘兵備則皆清修俊雅之士用於内地任以他官則皆良才或有駿望而用之於邊則非所宜其若堪為兵備者惟欲膽勇闊畧而有權變操縱耳人才各有所宜非有所優劣於其間也新任松潘副使江文敏臣雖不能深知然聞其人亦有才力至於見任松潘副總兵張傑初任亦可後因交結權姦錢神得勢職陞都督任加鎮守乃敢公然剥害軍士太深欺虐同官太甚内軍外夷悉皆怨畔先該廵按御史蘇恩所劾一皆勘實近該盤糧給事中熊浹查出本官嚇取在庫糧銀七千餘兩本官又恨指揮程南等首實其事上下相讐番夷伺隙地方人心幾至大變比臣未到幸頼給事中熊浹善處行令胡澧復囘松潘撫治人心始安地方稍寧此事急當為處切照張傑強狠貪虐交結權要毒害邉民人心痛怨雖照盗糧重例明正典刑亦不為過然臣聞其勇畧可取則又念其罪廢可惜况其罪犯革前亦聞聖明御天以來稍知歛戢分守小河左叅將王偉臣初到亦聞其可分守威茂右叅芮錫無事可見臣實不知其人如䝉聖恩軫念邉方重地四川一省安危係命于此特勑吏兵二部計議將胡澧錄其年勞陞任本司按察使比照先年趙敔陶魯近日吳廷舉事例令其仍管松潘兵備江文敏若到則乞改任威茂其見任威茂兵備副使呉希由則乞念其守邉年勞已深厯官操履無玷而改陞他職或代回本司管事以均勞逸或將江文敏仍任松潘威茂則另選才力相應如見差江西刷巻御史朱節或臣先舉養病主事姜清或另推附近相應人員陞任或暫借原任副使張思齊一二年以任其事胡澧則令移安綿小東一路更乞量比先年松潘專設廵撫事例特勑本官兼督松潘威茂二路待其一二年之間撫處得宜道路盡通蠻夷歛戢則令其代臣廵撫而放臣終養至於見任安綿兵備僉事賀寛勤慎篤實尤為可取取回本司管道管事皆無不可至於武臣則張傑巳與松人為讐不可復留在彼又恐逺推一時難到或將叅將王偉就近移管松潘芮錫移管小河各仍舊職張傑或量降職止作叅將或守備名色或令戴罪殺賊移管威茂皆聽臣節制後或張傑不能改過芮錫等不能稱任容臣另行奏處或二路叅將仍舊止提張傑依法重治另推亷勇副總兵或叅將一員前來分守松潘則地方庶乎得人矣臣以地方事重得人為急故敢冒死直言奏凟非敢擅為紛更以撓選法也所謂添兵將者非欲如近歳征潘添調十三萬之軍也但欲如往年仍設逰擊二員今巳有曹昱一員矣止望再添一員四川武職惟何卿可用但今不幸與曹昱皆有疾病如蒙聖恩特勑兵部或將何卿陞任逰擊或另推陞一員前來與曹昱各選領精兵二千或正軍不彀則抽選餘丁凑補各待天全高珙事寜之日令其常在㑹城就糧屯操照依往年舊規不時輪往松潘廵察以振揚威武使番人慣視帖服後有兵入亦不驚擾每歲三路兵將相㑹或臣往廵邊皆令䕶從以後不拘松潘他邉有儆或腹裏草寇生發量其事勢輕重輕則止調一員重則臣率二員朝報夕發早行撲滅其與倉卒調兵一時難集以致敵人得志逺遁盗賊延乆滋蔓者不侔矣或慮添兵則添糧而病民者非也今邉運路澁每石脚價費三四石之多使其添兵勢強而二路兼通則糧運所省脚價之費勾食新添二千之軍更倍矣所謂更賞罰者以賞言首級論功非我國初舊制也兩軍相敵當先格鬭者手眼瞬息不得差池何暇割首使其取首則再不能戰而為敵所乘為後軍所争奪死矣故首非我大勝彼大敗奔逺不能割然割之者多非殺賊之人而又或殺已降或殺良民或偶得單行之賊被擄逃出之人而割之多非真功也臣在遼東充軍見一都指揮連射三人下馬而為奪首級者所擊重傷回死彼大吏猶然也况小卒乎貧軍奮死殺賊止望得賞衣食稍足耳豈望陞官也惟論首級陞官故殺賊者不能取首而得首者又為勢要所奪又或因争首級自相蹂踐而為敵所敗此邉人之大恨兵戰之大患也臣昔在江西見他軍以取首為功者多被賊誘殺其脅從老弱數十争踐割首而劇賊乘之覆軍獲將皆因此故彼時臣領民兵權破舊格止令先鋒破敵一人賞銀十兩以次二人各五兩其餘每殺一人賞銀二兩即時分給不論首級諸兵大喜每戰全勝而量令割首三五百解騐以與提督紀功了人事其餘横屍滿野推致江流不令盡割以恣勢要之貪冐費國家之官賞也以罰言邊例交鋒傷擄四五人即問充軍殺擄十名口以上不報者止降一級輕重甚是不倫又或兩軍對敵勝負相當殺傷相抵我軍被殺指名可驗殺彼之人不能取首不得論功亦問前罪故今邉將惟以退縮保守為事而鄉民任其殺擄上下相瞞惟事欺隱而其甚者被擄之人捨死逃回邉堡以其先時失報恐被查究而遂殺之尤可痛也如䝉聖恩特勑兵部更定賞罰之格惟嚴隐匿之罪其兩軍交鋒而殺傷相抵不曽割取首級撫按明知回奏者不問其罪其有失備力所不及雖被殺擄二十人以下亦不問充軍其若力可敵而不敵雖失四五人亦問充軍至於兵力相當退縮敗陣及擁衆自衛縱賊深入而又不能擊其惰歸以取勝者但被殺擄數十人之上俱問失機其戰勝論功止憑廵撫兵備查審衆証某人設策某人當先破陣某人殺死㡬人皆聽廵撫官量情即時給賞銀兩不必論功陞官其有三次設謀或當先破陣或一起連殺五人之上勇力出衆者方保陞官其若廵撫總兵失事扶同隱匿不報或冒功賞其所私者却問重罪如此則庶㡬賞罰當而人心思奮朝廷亦不致多費官爵矣或此例不可行於各邉亦乞止行四川地方幸甚所謂足財用者有三一曰軍餉二曰賞番之需三曰賞功之費四川布政司累年管糧官未得其人將各邉糧通派各州縣各州縣又通派各人户以致一州縣之糧有該解七八處一人户之糧有該納五七倉者又以道逺番截而人户勢難親輸勢不得不交與里納包與攬頭而或買虗串於官攅及後里納攬頭官攅侵欺事發監死無追勢不得不累人户重賠此四川通省之民歲困於邉運而在邉糧餉恒患不足軍士日無常飽臣今備訪民情道路巳有計處要令各户之糧止納一倉各州縣之糧止納一處而民運省便軍餉易足惟待布政司有管糧官即與定畫施行外至於賞番之物初緣廵撫諱言有此付之不知而盡尅軍糧後雖官給而亦不勾三分之一其餘仍扣軍糧近據威茂兵備副使吳希由查報疊溪年例賞番該銀四千九百餘兩官惟給銀九百五十餘兩茂州該銀五千四百餘兩官惟給銀一千二百餘兩餘皆軍辦即此可例其餘也至於有功軍士舊皆奏聞行勘造冊回繳以俟陞賞或經年不得勘明或遂隱沒而懸賞待士人皆不信今欲撫治番夷賞番賞功之物皆不可少伏乞聖恩寛臣文法容臣便宜使臣不避嫌疑多方設法而措置財物貯邉應用至於屯鹽商稅等事亦乞聽臣革弊任人而務得實用昔宋臣張浚治蜀有趙開善理財余玠治蜀以王惟忠治財賦臣雖識陋官卑不敢僭擬先哲然而誤䝉大朝擢用任當其事安得開與惟忠而任得其濟也所謂善撫治者大率以信為主决不可失而恩之與威則並施迭用使我兵備總叅既皆得人矣由是使召各番寨首令其各報所統番人名數與之定約每歲賞例番首若干衆番若干或歲或時皆有常數要在比前總筭稍優以慰其心其熟番為我守堡送糧者尤當加厚或給口糧或倍常賞慎勿負其勞失其心而使怨畔至於平日索要官軍接渇過午送路等酒過觜買路過班等錢一皆禁革不許畨人私索於軍亦不許軍人私送於畨因而告之曰我歲賞爾爾當為我各守地方而與我軍和處以拒絶生畨之來擾今後我軍無故而殺爾番則重問其罪而仍照例倍賞爾番若上道搶擄或入堡詐勒我軍殺之勿論其若刼我財物殺我軍人則依我國法必欲斬首示衆由是後有犯者則令通事告其寨首曰爾寨何人背信作惡爾宜查送出官我則常賞如故得其人則就顯戮於境以儆其餘其若不肯送出則絶其常賞其若怨畔侵擾則明告其鄰寨曰某寨背信作惡我欲征之爾各寨能斬獲一人者賞銀若干能為我共滅其寨者土地財物皆爾所有我仍重賞或奏保爾官號彼能代征亦惟按兵把路以防禦之慎勿與共征以防其詐誘其若不征則我令逰擊二軍益以各衞所軍坐困之有隙則速剿之仍要撫諭其鄰寨勿使驚疑决不可深入决不可普征决不可貪功失信其征也今日得利明日即止一戰得勝再戰勿行使彼知一人之罪不累衆人一寨之惡不累衆寨而帖然信服矣彼既信服而又振以兵威啖以賞利使之助我修堡通我舊路直易易耳南路盡通而將其平日坐觜架梁要害之處或鑿開或立墩於上使我軍瞭望而更視其堡小路近者或併之使力全易拒其有舊堡在絶境之外勢孤難援原無土地人民守之無益於事者則撤棄之由是使松潘南至茂州茂州東至埧底埧底東至徐塘以達龍州龍州西北至小河小河西至松潘常使逰軍往來應援相通絡繹不絶彼出此歸此出彼歸使不知其多少去留而威益振由是糧運易通而財益足官軍得糧不費遇畨敢敵而氣益壯循是守之百歲無虞全蜀得庇矣撫治之策臣愚以為計不出此然必前四者之備而後可行四者之中用人為要然臣又聞古之任人必先敷奏以言而後明試以功言雖可用其功尚難必成言不可用其人决當廢黜臣以罪廢庸愚誤䝉聖恩擢用委以全蜀重地今不自知其愚冒昧言此蓋亦敷奏以言也如其可用乞賜採納如不可用甘當罷黜决不敢貪冒竊祿以誤地方也定冊籍以均賦役疏臣惟撫民之道要在均其賦役均役之道尤在覈其戶口然使籍冊之造多弊則户口之報不真大户門多而巧於欺隱小户丁絶而不與開除以致田糧有宜付而不付有宜收而不收里甲有偏大而偏小有偏貧而偏富以後十年照冊編差未免偏累貧民而逼其逃竄弱者轉而溝壑致傷天地之和強者聚為盗賊致激地方之變富民買閑貪吏作弊者亦皆因以不得安生矣今當大造黄冊之年而臣謬膺廵撫之寄節該户部奏頒冊式及因給事中孫懋底蘊等建議奏行條件又該廵按四川監察御史黎龍蘇恩各出所見節行所屬俱合事宜一一遵守外臣今到任以來備訪各處民俗查照節行事理斟酌通融約成五欵擬行各屬使其易曉期在必行其間有曰清田糧均里甲處寄庄三事者是皆前奏巳行臣惟因俗潤色事當便宜不敢煩凟外至於實丁口清逃絶二事内欲照門以報人丁重役以懲欺隱又欲將丁門等則添註於今冊絶户虛名開除於後造是則前來奏行臣愚區區上欲推明朝廷立法之意而順其土俗酌其民情行法稍為操縱而使法立之易行革弊稍為勸懲而使弊生之必革志在著實奉行事湏從宜増損不得不然者謹用條陳上塵睿覧臣又思今造報得實豈惟十年編差之利以後造冊因之不改將為無窮之利今次造報不實豈惟十年編差之害以後造冊因之不改遂為無窮之害使臣於此而不用其心不得行所志是為不職是孤任使朝廷當加罪黜罷歸田里使司府州縣官員於此而不用其心不能體所志亦乞容臣遵照户部奏行給事中孫懋建議事理五品以下徑自提問四品以上叅奏重治庶各知儆不致違悞計開一實丁口節該户部奏行冊式人丁十一歲以上皆欲報入正圗是豈容其欺隱一丁也今訪得四川土俗人丁欺隱之弊與湖廣大畧相似與他處大相不侔其大户或十數姓相冒合籍而分門百十家其所報人丁不過十數小户或二三門或單門先因無錢使用人丁巳盡報冊後或死亡或敗絶而里書以其無新丁替補不與開除以後照冊論丁編差小户多累逃竄以致民不聊生盗賊易起職此之故今欲盡丁開報民情實有不堪而反朋比欺隱必用嚴刑追逼有失朝廷子惠之仁且非有司保障為國之意也今擬令有司拘各里書并各户長到官各令實報本户門數其有父子同居各㸑者止報一門其若父老不主家事而兄弟分居又各有子者各報一門每門不拘巳報漏報各要成丁一丁上冊仍要實報其家如有父子三人以上田種十石以上或雖止一二丁田種不多而别有生理衣食豐裕或有僕馬出入者定為上丁其有三丁以上田種五石上下父子躬耕足食及雖止一二丁田種不多頗有生理足勾衣食者為中丁其有一二丁田種不多力耕衣食不缺辛苦度日或雖止單丁勤於生理亦勾衣食者為下丁其若貧門單丁或病弱不堪生理或傭工借貸於人者為下下丁蓋各户分門又有貧富不同故雖大户亦有下門雖小户亦有上門也報冊實在成丁項下明註上門㡬丁某人某人中門幾丁某人某人下門幾丁某人某人下下門幾丁某人某人以後編差大約上門出三中門出二下門出一下下門且弗編差優養十年以俟後冊再定其舊管人丁委的死絶者即與開除不必責其報補庶㡬不累貧民迯竄耳其若隱瞞一門不報者以後被人告發或因事查出所隱本門人丁幷本户長一門俱責常當本州縣民壯機兵或附近驛逓水夫一名以替舊僉貧户之消乏者其本門糧米仍每年盡派邉倉以困辱之其有隱瞞三門以上不報者本管里長書手亦罰如是庶幾法近人情之所宜而令易行罰乘土俗之所畏而弊可革矣如䝉聖恩俯從地方幸甚一清迯絶查得各處鄉都迯絶人户每次造冊不敢開除其先年賣出田産逺年死絶人丁俱留在冊仍作實在以致上司不知照依户口派出差科多累本州縣里甲包賠遺下田土或乆抛荒或被有力之家占種埋沒負累本鄉里甲賠糧有此遺害不便今次造冊合令各州縣審冊官責令各里老書手各將本里逺年迯絶人户事産丁口逐一清報如迯户則稱一户某人某籍原住地名某處舊管人丁㡬丁某人於某年月内見迯某處官民田地幾畆巳賣與某里某人幾畆該付糧稅若干見存㡬畆今撥與某人佃種該辦糧稅若干絶户則稱一户某人某籍原住地名某處舊管人丁幾丁於某年間故絶官民田地幾畝巳賣與某里某人幾畆該付稅糧若干見存幾畆今撥與某人佃種該辦糧稅若干逐一清查明白已賣田糧即行開付其未賣者通計本里迯絶田地若勾百畆上下則召佃一人立户當差編作正管五十畆以下編作畸零其人不拘本鄉或附籍客民如客民則於冊内開稱一户某人某籍原係某府州縣人今佃種本里迯絶户某人某人田産附籍當差本鄉則稱一户某人某籍原係本州縣某里某人户丁今佃種本里逃絶户某人某人田産另户當差而各將所佃逃絶户口事産轉收入户其絶户田好争佃者量令每畆出糓一二石在倉備賑田低無人争佃者止令認辦糧差不出稻糓至於迯戶復業不拘年月乆近其田照冊退還不許占恡絶戶後冊緣此開除庶幾糧差有所歸著籍冊不致虗報而里甲無包賠之苦民困亦少蘇息矣如䝉聖恩俯從地方幸甚舉用恬退幽抑官員䟽臣惟自古聖皇以求賢為急自古忠臣以薦賢為務洪惟我皇上天錫聰明洞明治體嗣登大寳首下明詔起用忠良振㧞幽滯即自古聖皇急親賢之甚盛心也臣雖不才素懐忠義茍有所知敢不陳薦以欽承明詔上備採擇哉臣切見原任浙江叅政侯啟忠才節素聞卓然今世之望原任河南叅政秦文文行素優確矣古人之心侯啟忠年未四十而巳求閒秦文年逾五十而即休致蓋皆求避於權姦亂政之時今豈容其肥遯於聖明之世此二臣者宜當起用以勵恬退又有原任徐州沛縣知縣胡守約賦質強毅遇事敢為因不遂經過太監求索而被其奏拏至京枉問杖罪夤緣張銳批革為民况其先任蠡縣拒賊被殺四日復蘇其迹尤異又有原任順德府内丘縣知縣王瑁一亷自守甚得民心因不遂鄉居近侍囑託而被其夤緣錢寜誣䧟贓罪革職既差官校捜其公廨又行原籍賣其家産通止有銀一十七兩將其父子三人三處監追四年幾至餓死其情甚苦此二臣者宜當錄用以伸寃抑侯啟忠秦文臣與之同榜出身胡守約王瑁臣與之同禁日乆以是知之真切今雖音問久絶然計其年力未衰如䝉聖恩特勑吏部查訪是實早行甄錄如臣言涉欺罔甘當重罪舉劾方靣官員疏臣原任四川廵撫今當離任四川方靣官員訪察既知例應舉劾除副使胡澧之亷勇忠信右叅政曽大有右叅議徐海僉事王納誨之有守有為先已因事題知不敢再凟外今訪得四川布政司左布政使沈恩才力過人而濟之以勤亷直守已而行之以慎卓為一時之彥堪任一方之責允宜擢用按察司副使歐陽重僉事劉成德皆有明敏超逸之才劉成德則和易任情而嫌疑不避是以頗招物議未恊時望宜辯其實而戒以貞量遷提學或兵備職事以試其才此書所謂燮友柔克者也歐陽重則險僻為性而偏私是逞忌同僚而誣頼以贓賄忍昧天理之公附番酋而曲斷與民田不顧地方之害提人未到而揑作巳到問罪敢於欺㒺委廵不出而佯為將出遇疾巧於避難此臣數其事而責之宜加貶抑使其知改剗瑕錄瑜終任噐使此書所謂彊弗友剛克者也如䝉聖明特勑吏部再加訪實早示勸懲地方幸甚薦舉賢能官員疏臣原任四川廵撫今當離任所屬有司官員例應舉劾除保寜府昭化縣知縣趙慶柔懦無為梓潼縣主簿張昻貪庸有疾臣已因其告病勒令休致及有重慶府知府馬文有明逹練事之才而欠勤勵有平易近民之政而少激昻順慶府同知楊一誠保寜府同知王翊皆正直有君子之風切實通利民之務潼川州中江縣知縣余祺重慶府安居縣知縣劉讓璵皆志操崇正威州保縣知縣鄧浩瀘州納谿縣知縣姚震皆才猷敏達而皆到任未乆成都府同知安世賢保寜府通判焦思明重慶府通判郭憲夔州府推官唐經綿州知州尹衮卭州知州李廷詔廣安州知州汪城眉州判官查仲儒成都府華陽縣知縣余瓉石泉縣知縣蕭昺簡州儒學學正田嘉禾保寜府廣元縣知縣陳表江油縣儒學訓導李良金叙州府珙縣知縣步梁卭州大邑縣典史李注皆或有守而施為未著或有才而更厯尚淺又或地逺而考覈未詳臣皆姑行奬勵以待其政成名立未敢輕舉外今訪得順慶府知府沈良佐循良之政孚恊于吏民亷慎之操表率乎僚屬通判李時暢歴任有為持身無玷推官勞傅相理刑詳慎委任勤能夔州府同知歐陽席志因遷謫而愈勵才以歴練而益充雅州知州范府才無不宜守無所玷潼川州同知裴偉才識優長操持勤慎本州缺守合郡保留嘉定州夾江縣知縣程光志向正而操持慎才識敏而政務脩卭州蒲江縣知縣孫佐潼川州遂寜縣知縣劉樽皆操持無玷於甲科政務有恊于民志此數人者衆皆稱賢臣訪是實如䝉聖明特勑吏部再訪無異量加旌擢舉用將材及舉劾武職官員疏臣原任四川廵撫節准兵部咨該臣舉用將材及有所屬武職官員賢否訪察既知例應舉劾除貪虐大肆如副總兵張傑巳經論劾外今訪得四川都司新任掌印都指揮僉事何卿屢著忠勇之績卓有將帥之才守備壩底等處指揮僉事張倫松番衞掌印指揮僉事程南疊溪掌印指揮僉事鄷爵皆有偏禆之才堪任一方之責成都後衞指揮使丘岌重慶衞指揮同知李爵廣安千户所養病正千户周爵新陞行都司掌印都指揮僉事柳睿成都前衞帯俸都指揮僉事潘武叙南衞指揮使丁勇皆堪試以軍旅儲任將領者也堪任軍政則有罷閑署都指揮僉事韓恩以才能被斥而年力未衰緣事都指揮僉事李昇以亷正被誣而官職未復新任守備指揮僉事魏武才識甚優建昌衞掌印指揮同知李俊雅州千户所掌印指揮僉事田金俱才猷可取重慶衞管屯指揮使蕭鼒催徵獨善蓋皆可用者也至於見任逰擊將軍曹昱分守威茂右叅將芮錫臣初到任未知惟聞曹昱得夷猓之心芮錫無科虐之怨猶以為可用今訪得曹昱才不稱任而名過其實是以征番縱掠而敗績師律有違稱疾帯軍而囘家地方不顧後雖擒獲叛逆土官高繼恩等實係因人獲功芮錫庸懦自守而威信不立以致茂疊之間一路漸塞而不能通疊溪以北四堡新棄而不能復近雖斬獲叛惡土舎節孝等亦係因人成事况聞曹昱之年已老芮錫之體大肥而鞍馬之勞巳皆不堪蓋皆當更任者也如䝉聖明特勑兵部再加訪實漸行黜陟地方幸甚胡端敏奏議卷三
