body:
  text: 胡端敏奏議巻四明胡世寧撰陳情乞恩照例請給先世誥命疏時陞吏部右侍郎臣原任都察院右僉都御史巡撫四川地方係干邊鎮誠恐新任巡撫未到缺官管理不無誤事咨臣還照正徳八年二月初二日題准事理務待交替官至日方許離任等因臣以今職在彼仍管巡撫至本年十二月初三日方得新任巡撫都御史許庭光來到交代起至嘉靖元年正月二十七日行至河南地方聞臣父瑢在家病故一時哀痛疾甚不能赴京先已奔回原籍守制外本年三月十五日欽奉詔書内一欵兩京文職官員未及三年者俱與應得誥勑欽此欽遵臣一介草茅叨䝉聖恩厯官三品例得推贈祖父母父母但臣先留四川暫管巡撫後因聞喪在途未曾到部一時未敢陳請念臣生本農家幻極辛苦賴臣祖父嵩祖母張氏破産延師教臣父讀書未遂復以教臣臣母馮氏事父育臣教臣劬勞特甚臣祖年登八十彼時遇例當得冠帯以家貧不能為請逾年遂卒至今為恨臣初任推官累臣父母隨任覆舟大江幾至不救後雖任滿得封臣秩然臣母不乆棄養臣父祿養雖久先因臣在江西平賊之謀偏主幸成為主兵同事者所忌乘臣預奏宸濠之釁搆䧟奏提臣巳赴京投獄而家族仍被追捕臣父彼年七十有五奔逃受苦百端臣伯母秦氏年八十有四冒雨奔山驚恐成疾而死臣長子繼年方一十有七先憂臣在江西被䧟哀痛成疾而死時若死者有知臣母蓋亦不能安處於九泉也今臣幸遇聖明過加錄用恩出望外而乃不幸臣父不祿臣疾未瘳不能赴京致臣先世未得槩受恩典臣負不孝之罪哀痛誠切於心如䝉聖恩一視同仁特照在京現任官員事例賜臣祖父母父母應得誥命使臣父早得銜恩入土以告先死於地下慰其前累之憂逭臣不孝之罪臣一門三代感恩刻骨子孫世世莫能為報也其若臣身臣妻則受恩無補今則守䘮未滿不敢濫叨恩典臣以私情冒干天聽罪當萬死無任戰慄病痼陳言畢獻餘忠疏臣向以久病成痼陳請乞休荷䝉溫㫖容臣調理痊可前來聽用臣感恩刻骨亟圗調理奈緣衰朽之極病痼巳深醫療仄甚自分痊可無期此生無緣得覲天顔負恩終身莫之能報雖死不能瞑目每念古人既死猶以屍諫况臣未死何忍㤀言兹者輒因時事有聞敢瀝餘忠上備採納臣昔於陛下踐祚之初竊效宋臣司馬光上言人君大德有三曰仁曰明曰武臣竊見陛下臨御以來子惠黎元洞燭事體仁矣明矣而武則未彰是以臣工多玩政化未隆邇因大禮之議羣臣執議不合陛下優容再三而彼激烈愈甚聖心不得巳赫發斯怒薄示威罰朝野聞之肅然震慄聖武彰矣三德備矣然臣竊有憂之敢申前說未盡蓋是三德之中以仁為主而明與武所以成之也故譬諸天地仁則其生成之德明則其日月之照皆不可一日而無也若武則雷霆時可一震而巳若震之數或震之過則天下何所容身而天威亦反褻矣故說者謂是三德仁或可過而明則不可過也明過則察明猶可過而武决不可過也武過則殘臣願陛下自今中外羣臣有罪下之司寇責問罪狀明白輕重誅黜皆依律科斷奸不能惑佞不能移所謂武也若乃廷辱之以箠楚則恐其間或有心實忠良而體素怯弱者一時不堪箠楚偶斃雷霆之下遂傷日月之明而大為天地生成之累矣臣知此事非出陛下本心實由羣臣偏見激烈之過然而轉播天下書之史册鞭扑行於殿廷刑辱上於士夫非所以昭聖德之美也臣願陛下自今謹之於後而已席書以達禮受知陛下親擢禮部尚書真得古聖王知人善任之體事無容議書亦不當避嫌固辭矣然恐後有文臣武將才望非書之比而乃援書為例夤緣結托不由衆推以得倖進者聖明於是仍許選部言官執奏而追奪之可也其餘新進英達今雖議禮一言有合而以後難保其事事之皆是舊任老成今雖執禮一事過當而以後難逆其事事之皆非聖明於是惟以天地日月三無私之心照臨於上其言是者從之非者置之其立心行事公者用之私者黜之無分彼此新舊而先有適莫於中天下之幸也皇上聰明仁孝親定大禮追崇皇考為恭穆獻皇帝而躬致廟享尊崇聖母為章聖皇太后而日侍問安陛下之事皇考聖母巳無子臣父之失皇考聖母受陛下之朝享亦無卑臨尊之嫌禮義周至確然聖謨下紹以來人心允愜天意潜孚已致風調雨順時和年豐如昔孔子所言明王孝治之應災害不生而禍亂不作者其兆驗矣然而議者欲正兩考之失追改皇伯之稱紛争不已中外共疑臣非敢謂其言之不然也然竊有見陛下入繼大統雖由皇考遺體倫序當立然而定策之初朝議大恊實由昭聖康惠慈壽皇太后擁翊之功既而即位以來人心永戴實承孝宗敬皇帝聖治之䕃臣知聖心純孝其於議者之言必有不欲盡行而皇伯之稱必有不忍遽改者矣臣願陛下明以此意止議者之再言而消其嫉怨亦以此意釋羣臣之固惑而宥其愚忠要使兩宫二廟均享陛下之孝而歡洽無間九州四海咸頌陛下之德而愛戴無疆亦使新舊諸臣和恊於下以佐理維新之治可也臣愚不能議禮惟聞善法古者師其意而不泥其事如昔舜受天下於堯廟雖宗堯而其父未嘗不尊為天子也亦未嘗不以天下養也雖尊其父為天子父而廟之宗堯㒺敢貳也此兩考之義蓋並行而不悖也堯崩百姓如䘮考妣四海遏密八音是舜之宗堯匪徒為繼統之大義而亦順天下臣民之心不忍忘也我孝宗皇帝之崩也天下臣民罔不號慟如䘮考妣不幸一傳正德而為權奸所誤天下凛凛然十有六年之間惟恐孝宗之業有墜其後弗傳也一旦得陛下以其猶子而繼大綂仁孝同符孝宗而聰明英武尤似古先哲王天下翕然歸戴如見孝宗也故雖間遇天災流行百姓寜餓死而不忍思亂時議紛更羣臣寧冒死而不忍㤀言其心可騐也今若如議者之言而遽改初稱愚民不知禮義者將翕然懐悲遂謂孝宗無後非惟聖心不忍聞而天下皆不忍聞也竊聞禮時為大順次之故昔聖王制禮必因時宜而其事之興革必順人心縱今議者所言禮也而於人情則未順羣臣所執雖若為禮其實欲通天下之情也惜其不能以忠信善道感孚陛下而乃忿議者之創論不合沮陛下之用人無方至於激烈之過而聚哭於廷巳則非禮不能無罪矣昔盤庚遷殷本以利國而羣臣不恱胥動浮言盤庚再三誥諭以口舌代斧斤此殷以卒遷而商道復興盤庚為商令主也今聞陛下宣諭羣臣不忍盡加之罪誠古聖王之用心也更若擇其忠誠有識平正不偏者而一體信任以共圗保民之政而亟行之以祈天永命於萬年陛下萬世之孝也臣愚昩死不勝惓惓重陵寢斥邪佞以安宗社疏臣頃因時事有聞具本上奏今又聞中外傳言有等閒廢小臣逞其邪佞妄圗起用因見陛下孝思純篤追慕皇考無巳乘機上言陵寢宜遷改葬京師臣愚聞之不勝憂惕蓋此事利害闗係匪輕誠恐聖心至孝為所感動一朝改移羣臣戒前執議之過無敢再諫臣愚受國厚恩義圗死報不忍緘黙然彼執言必以助成聖孝為名臣豈敢偏見阻執也臣昔聞追崇廟祀之禮未定深虞聖孝之心未遂上下之志不通致災殃民為宗社邦本之憂巳述鄙見為陳言治道急務以效愚忠事具本欲進間繼聞明詔大禮已定而止今欲言此愚誠恐有未孚敢將前本附上伏願聖明併賜採納蓋臣前奏深辯追崇之為禮者欲成陛下之大孝也今奏極言遷塟之宜慎者亦欲成陛下之大孝也成陛下之大孝所以效臣之愚忠也臣惟皇上一身宗廟社稷之主也四海兆民之命也而所頼以儲祥䕃福於陛下之身者恭穆獻皇帝之陵也俗言家之有墓猶木之有根根固則木常茂而枝葉生生不已根動則木之榮瘁未可知此士民之家所以重於遷墓也匪徒士民雖古帝王亦然昔者舜都蒲坂而崩於南廵遂塟九疑禹都安邑而亦崩於南廵遂塟㑹稽其相去國都各數千餘里後世莫之敢遷故其子孫傳至春秋時千數百載猶君國子民不絶此其騐也唐太宗祖墓在長安者為隋留守官所發動其後子孫連遭武氏安祿山之禍慘不可言此其所當戒也我太祖高皇帝初塟其皇考妣於今皇陵衣冠蓋不備也及後富有天下追尊帝后我太祖統天大孝豈不欲備禮改塟京師以便祭掃然亦曰慮泄山川靈氣使體不安姑積土厚封備山陵之制而巳見於皇陵碑大畧可考也此我仁祖之陵既䕃太祖興創大業而以後未嘗輕動所以固蓄山川靈氣而又䕃我太祖享國日乆子孫萬世為帝王也今獻皇帝之陵比於皇陵已䕃皇上入繼大統今亦不宜輕動使之固蓄山川靈氣而䕃我皇上聖壽萬年子孫萬世為帝王可也昔人謂死者魂氣升天體魄歸地今獻皇帝立廟京師子孫歳時祭享其神氣之在天者陟降昭格蓋無不在而陵寢之在安陸者永為萬世體魄之藏豈宜輕動也况查安陸至京水陸路程各數千餘里使遷梓宫陸行在途未免震動舟行則逺涉江淮河漢風波數千里勢非旬月刻期可到此時聖母聖心懸念何如舉朝臣子驚惕何如而可輕動也即今士民之家重其父母而欲為子孫長乆計者只求小小吉地亦嘗經數年不得至於天造地設山川大聚完美可為帝王宅兆者舉天下蓋不多也故我太祖初定國都聚天下術士而議者數百太宗卜藏天壽山蓋自始封燕國至於紹極征討往來閱歴山川數十年而後得豈易能也有如奉迎梓宫至京一時難得吉地而經年未得安厝或主司恐以遲慢為罪而遷就附㑹以未全吉之地為吉而誤國大事將如之何臣謂陛下孝思誠切或遵奉聖母太后懿德至情必欲遷塟亦須期以數年之間妙選近京山川大聚十分全美之地如天壽山比者而後妙選年月日時十分之吉啟遷皇考梓宫安塟方可無慮也今若如彼邪佞之言輕率一二年為之萬萬不可也夫隂陽地理之說從古有之今士大夫之家重其祖考體魄之安為其子孫長久之計者㒺不精加選擇而或謬為大言謂此小術不足信者是其愛國不如愛家愛君不如愛身故為欺㒺非忠實也昔宋儒朱熹窮理致極精㣲乃塟其考妣異處蓋亦拘於隂陽地理而勢有所難合其䟽論壽皇塟地至為詳備蓋其知至意誠所發一時淺學之士或未之及也易曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義今姑以塋塟一事言之夫愛其祖考而慎於安厝者仁也處之合乎事理之宜者義也然而天有隂陽地有柔剛則隂陽地理能為禍福之說夫安得不信乎臣前䟽妄言今日急務以孝親為大以保民為本而保民圗治之道又在擇言官而納諫諍回士風而變治體以盡復祖宗之舊向使皇考聖母不崇以至親至尊之號而受陛下之朝享則為卑臨尊於禮為不順於心為不安此聖心之所以不得巳而必欲追崇者天理人心之正也天下萬世之公也今則陵寢巳安不宜輕動稱號巳定不宜再更明詔巳頒不宜數易聖孝已遂别無不得巳之情矣何乃中外臣工希寵妄言不已臣願陛下明禁斥絶此軰不許再言而惟君臣恊恭專以任賢圖治保民為事以求固宗社於萬年此誠今日急務也臣愚賦性忠朴特受明主之知今既衰病成痼不能再起供職使非遇事盡言則終身負恩有所不忍故敢冒死盡言至是也皇天皇考靈神昭鍳臣言非忠甘受顯戮萬死無悔陳言治道急務以效愚忠䟽臣荷國厚恩義圖死報在䘮三年每聞時事可憂輒増哀痛不食惟以禮制所拘不敢上言國事今既服闋即當趨赴闕庭面陳得失又以疾病不能中心自悼寢食靡寜臣又自傷病廢之乆志慮之昏修身治家尚多自愧更言國事人其謂何况臣所欲言者實違衆議中外一聞必皆切齒以為阿附求進是匪徒目前之有險禍而將來身後之受惡名百世而下非遇大聖大賢至公至明之見終有不能自白者矣臣是以欲言未敢輾轉多時然又思臣痼疾天廢人所共知可無求進之嫌而區區犬馬之誠實有寜受惡名險禍而不忍負恩緘黙者故敢昩死為陛下言之竊惟今日聖治急務以孝親為大以保民為本商書曰今王嗣厥德㒺不在初立愛惟親立敬惟長始于家邦終于四海孔子曰夫孝德之本也又曰孝莫大於嚴父其論明王之以孝治天下則曰生則親安之祭則鬼享之是以天下和平災害不生禍亂不作孟子曰孝子之至莫大乎尊親尊親之至莫大乎以天下養是皆言孝親為大也書曰后非衆㒺與守邦又曰民惟邦本本固邦寜又曰天佑下民作之君作之師惟其克相上帝寵綏四方我皇祖聖訓有曰凡古帝王以天下為憂者惟創業之君中興之主及守成賢君能之又曰憂常在心則民安國固蓋所憂者惟望風雨以時田禾豐稔使民得遂其生如風雨不時則民不聊生盗賊竊發豪傑或乘隙而起國勢危矣是皆言保民為本也臣聞陛下至孝之心根於天性即位以來累欲尊崇皇考聖母而惑於衆議未能早定臣想陛下孝思純篤每當入侍聖母之時痛思皇考在逺三年不得躬致廟享聖心哀慕廹切必有抑鬱于中而上通于天者是以天為感動時出災異以儆聖心而孝治之應漠然未彰者事由羣臣見禮不明而執議僣差聖心於是蓋亦過於謙讓而少貶明决矣是以即位之初大風肇變而至于今亢旱之極洪範咎徴曰僣恒晹若曰䝉恒風若是也臣謂此事在聖心獨斷之而已早定之而巳在禮有曰為人臣者殺其身有益於君則為之况于不殺其身以益其君乎就使追崇稍有不合乎禮陛下為親羣臣為君寧受失禮之名而使陛下得全聖孝之大以成孝治之美不亦可乎况此事出乎天理人心之正合乎天下後世之公萬無非禮可議者臣請得而明辯之夫謂追崇為非禮者不過謂陛下入繼大統為孝宗皇帝後不得復顧私親也臣聞近古帝王有生前無子而明立親弟之子為太子以承繼天下且預為其生父立後者漢成帝之於哀帝是也有生前無子而擇立從兄之子為子以儲繼天下者宋仁宗之於英宗是也有生前無子而選育孤逺之子為太子以親授之天下者宋高宗之於孝宗是也有歿後親子夭疾其後策立親兄之子為子以承繼天下者漢安帝之嗣和帝是也有歿後無子其后迎立從兄弟之子為子以承繼天下者漢靈帝之嗣桓帝是也是皆如民間無子立嗣者然不得顧所生父母固也陛下與之皆不同矣我孝宗皇帝有子武宗已授之天下十有六年今陛下之立乃因武宗晏駕無子又無親弟羣臣遵奉祖訓兄終弟及之義推考天叙以皇考興獻帝為憲宗皇帝之第二子孝宗皇帝之貴介弟不幸先日上賓陛下乃其嫡子也於是上請昭聖慈壽皇太后懿㫖稱武宗遺詔以迎立陛下是猶今武臣世襲長房無子則次房繼者然此自皇祖聖謨宏逺預立此制以息争端其意在武臣則重在立功之祖在朝廷則重在創業之祖非為嗣世子孫私立後計也故今士民之家無子皆得立嗣而獨武臣之家不得私立者以聖制有定也然則陛下以堂弟繼堂兄而有天下稽古中朝未有其事未有其事則追崇所生亦未有是禮而可以義起矣中庸曰非天子不議禮禮運曰禮雖先王未之有可以義起是也昔衛出公不父其父而禰其祖孔子欲正其名而曰名不正則言不順今必曰繼世即為父子陛下當稱孝宗為皇考而不得考其生父若使當時興獻帝在世則當立興獻帝矣其亦當考孝廟而不得考其所生乎此其事理必不通矣論者或又謂皇考初封藩國未嘗一日臨天下不得稱皇帝者則又有說焉傳言武王追王大王王季文王不以卑臨尊也今皇考聖母不尊以帝后之號而受陛下之朝則為卑臨尊矣其心安乎且太王王季文王舊皆諸侯亦未嘗一日臨天下也我皇考以憲宗皇帝之愛子孝宗皇帝之介弟𤣥德昭聞於天下乆矣屬者武宗頻遊九廟缺享天叙人心皆屬皇考皇考上賓乃屬陛下推厥天源陛下因為皇考之子而得承大統也顧不得比於太王王季文王追尊為皇帝者何歟况昔孝廟之於皇考友愛尤篤近者尊號之稱又出昭聖慈壽皇太后之懿㫖陛下尊奉慈訓既隆所生而益感所自由是日嚴孝廟之享益隆昭聖之奉臣知兩宫二廟均享陛下之孝而懽洽無間矣何不可之有或又拘於興國之稱者則又不然夫今天下一統也父子一家也大明一綂之内又有興國皇帝者何居此其事理又不通矣或又拘於興國立廟者則又不然孔子曰吾不與祭如不祭今皇考止有陛下一子而逺立廟於數千里之外其降享之際不見親子孫一人在列能無含淚而不食乎陛下高處九重萬年將至何日能一躬致孝享乎且昔親王無後者皆得祔享太廟也今皇考有陛下為天子顧不得别立廟於皇城之内者何歟此其事理又不通矣大抵先王因時制禮各各不同今只以追崇一事言之昔者舜受天下於堯禹受天下於舜一也禮言有虞氏宗堯是不追崇其父瞽瞍也夏后氏郊鯀是追崇其父伯鯀也天下後世固不以舜為是而禹為非亦不以禹為孝而舜為不孝也今之議禮者乃欲拘一定之說而不顧天下之大計何歟書曰蓄疑敗謀故臣謂此事惟在聖明一下明詔早定之而巳固不必復牽於羣議也亦不必追咎夫羣臣也夫羣臣為此者心非不忠而欲沮陛下之孝也蓋其始議之時方追慕孝宗之德而傷其無後故先有為後之說置於胸中而一時見偏議定乃遂真以追崇為非禮而惟恐或䧟陛下於過舉其心實忠於陛下忠於孝廟也及後再議復議舉朝人心蓋以追崇為是者過半矣然而衆相顧忌懲宋濮園之議槩以執前議者為忠直變初議者為逢迎乃遂翕然一口而莫之囘非其本心也一時保名固位之心重而不敢違衆也或以能辭官職謂非固位者非也蓋名與位相須從衆則得名今雖暫退而輿論可以復起違衆則失名今雖得用而衆怒難犯後有險禍隨之矣此忠臣體國者之所以為難也正德十六年冬臣在四川歸途遇給事中張翀嘉靖元年春臣奔䘮抵家遇郎中夏良勝主事張大綸皆與之極論追崇之當禮欲其達諸當道以將順陛下之美而君臣契合以共成天下之治不知其言達否也夫將順與逢迎不同君所行是而人臣順承其志以成就其美者將順也君所行非而人臣迎合其志以求媚其心者逢迎也二者情事不同忠邪所由以分也孔子曰君子之事上也進思盡忠退思補過將順其美匡救其惡故上下能相親也今臣所憂者陛下聖孝之美羣臣失於將順恐陛下緣此盡疑羣臣而不之信上下不能相親以共成正大光明之業此實羣臣之罪也然而所壊者陛下之國事也所害及者陛下之子民也於羣臣何計焉昔宋神宗勵精圗治一代英明之主也惟以議新法不合而舊臣相繼罷去乃致時相誤引匪人以壊國事先儒程顥謂新法之禍吾黨激成之則亦當時舊臣偏執不能委曲致君之罪也然而宋業遂衰致為神宗盛德之累臣念及此不覺痛心故深願陛下毅然早定尊崇之禮而釋然遂赦羣臣之失使各安其位而責以開誠布公講求救荒弭亂之策而急行之此誠今日急務也蓋自羣臣執議不通而陛下孝思哀切之際内臣將有順㫖而得用者矣外戚蓋有希恩而市寵者矣言官間有忤㫖而得罪者矣自古忠臣愛君必憂其漸臣不敢避禍而不言也昔者漢唐宋之季其致禍敗各有所由西漢以外戚之過寵東漢李唐以内臣之漸横而皆言路之不通宋以奸相用事而言官朋比為排異已以蔽主聰明而固其權三者不可不慎也其奸相言官則多文臣也故自古文臣亦有奸謾誤國者矣内臣亦有忠勤體國者矣非謂内臣盡不可用也但文職在外而有奸惡則易知知則易去内臣在中而有奸惡則難知知亦難去故文職如裼外華體之服有㸃汚則人所共見見而日數易之無難也内臣如貼裏近身之衣有垢弊則人所不見必湏服之者自覺雖覺而欲易之恐有切膚致害而顧忌多難難去之禍則有不可勝言者矣又其富侈成俗而一家人之用度過於文職大臣數倍有餘則其取於人也必多而民易困窮此其所當戒也臣願自今文臣内臣職任各遵祖宗舊額而各選老成忠正者為之各欲時察其忠邪而於内臣尤加慎檢一有奸佞竊權者混於其中則急去之而改用忠良則可無前代宦官之禍矣國朝外戚遵奉祖宗舊制自來不曽典兵預政前代外戚之禍無可慮也然而分封漸盛則天下財賦有限而不能給民力易於困竭書曰四海困窮天祿永終不可不慮也况聞先朝外戚絶無封公者萬世而下乃謂外戚封公自陛下始臣愚誠不願有此議論以為聖德之累也中庸言尊位重祿所以勸親親陛下所行亦九經之道也然而親愛之固欲其富貴富貴之必欲其乆長其若親愛之過富貴之極而為國耗蠧為人指斥則非乆長之道也故臣願如張鶴齡者聖明聽其讓而仍舊爵以成就其美親愛乆長之䇿上也公爵止令終身而不世襲次也著為令典以後不許攀援為例又其次也自古人君之德莫大於從諫其失莫大於拒諫尤莫大於罪諫臣罪諌臣而不幸偶至於死則其失又有不可言者矣我皇上天性聰明聖德宏厚本心樂於從諌是以即位之初凡科道有言無不嘉納然此時科道多係正德末年依阿受賜取容於江彬而緘黙固位致䧟他官忠諌得禍而莫之救正者也新政之初大臣失於奏黜此輩不知認罪而乃混諸忠直肆意多言言或涉私忠良被枉聖心明如日月蓋巳燭其言之不實而心之非忠者有矣近二年來言者發於忠赤多切事理間有風聞偶誤者蓋亦不多也陛下因前言者之多妄乃併後之言者而厭聽之是以嘉納不如初政之多更或因是而得罪者有矣近聞一二言者過當其罪不能無也朝廷暫下之禁獄以懲其㒺然恐言官因是奪氣而以後忠言日少則非朝廷之福也亦恐天下後世因而誤傳陛下有不納諫之名也故臣願陛下早開釋之以責其後效而巳其先降黜者收復之而巳臣又聞近者南京兵部侍郎席書以達禮受知陛下親擢禮部尚書不知事體者或相驚訝以為不由衆推廷臣或有執奏書或避嫌固辭審如是則益煩聖慮矣臣與書未嘗識靣然昔見其雲貴災異之疏漕船誌書之作固巳知其才猷出衆矣祖宗朝固嘗親命大臣今陛下因其才而授此職允恊公道何嫌之有廷臣執奏者或恐後有文臣武將才望非書之比而乃援書為例夤緣結托不由衆推以得倖進者耳臣謂後日萬一有此選部言官執之而已聖明納之而已今如書則無嫌可避正宜聞命不俟駕而行以急報明主之知不宜牽纏誤事也臣惟言官不可不擇而其言不可不聽臣願自今科道官特勑吏部博選内外郎官中必欲其忠直公正明識治體者奏改為之三年之内考其敢言忠諌有益舉刺得宜及廵按在外激揚興革有益地方者留以久任超擢卿佐等官如祖宗朝故事其雖敢言而言或不切於事體或過於激烈易至觸忤者則遷改内外相應職事以保全之後仍記其忠直覈其後效而量加超擢其或當言不言或挾私妄奏及廵按不職者明奏降黜務使言官皆得中正之人陛下於言之善者則擇賜嘉納而見諸施行其不善者亦曲示優容而置之不問要使朝廷多得忠諌之益而君父不受罪諌之名可也皇天聖祖既以中國疆土暨億萬生靈而付陛下矣然則保民也者實陛下今日之急務臣昔聞陛下龍飛在途惜民財力惜民田禾朝野播聞無不欣頌及登寳位以來愛民之心無日不存仁民之政無日不舉凡遇災傷稅糧不惜蠲免凡告民飢帑銀不吝賑濟陛下保民如此可謂至矣然今江淮以南赤地數千里民飢至於父子夫婦相食所在餓殍疾疫死者不可勝紀若莫為之救者何歟或謂數年以前内臣鎮守剥民膏血至盡以致如是固也然自陛下臨御以來鎮守剥削如前者少矣無乃臣等文職各以私巳營利為謀而無體國為民之心所致也臣觀近歲以來士風大壊而政體大變文臣不敢自言陛下不得而知也臣愚昩死敢遂言之今天下親民者郡縣守令也總督郡縣者藩臬二司也廵察二司守令者廵按御史也數者設官皆以為民也祖宗舊制惟廵按一年交代囘奏至今不改其餘藩臬守令則皆乆任而責其成功𢎞治以前皆然也今則遷徙不常矣是故春為知府或僉事於南秋陞副使或叅議於北來春則又陞叅政或副使於東西矣甚者初陞右布政使憚逺不行在家稍候三二月即改左而之近矣到任未及三二月即望轉而京堂矣由是一歲之間往來道路如織月日過半其能在任㡬何至於進士為知縣者亦惟持守三年有薦即取事在承上而不在恤下也故今藩臬守令皆過客也其視地方凋弊若見驛舍之損漏誰為之修也視生民之飢困若見驛馬之疲瘠誰為之恤也舊時責之以興水利勸農者不屑為也責之以積榖備荒者不屑為也至凡覈户口均賦役除盗賊抑豪強等事皆不屑為也乃惟廵按批問狀詞或委勘事情則禀其意而亟為之虗實輕重惟視彼所欲聞而報上耳誣枉固不恤也往時廵按秉權太重行事太過先朝考定憲綱一書以為矜式其與三司知府等官相見各有定禮也其職任事務各有定欵也今則藩臬守令皆不得專行其職而事皆禀命於廵按矣甚而廵撫固位者亦不敢專行一事而承望風㫖於廵按矣相見之際知府以下長跪不起布政以下列坐隨行甚者答應之際皆俯首至膝名曰拱手而實屈伏如拜跪矣至於審刑議事考覈官吏之際與奪輕重皆惟廵按出言而藩臬唯唯承命不得稍致商確矣一有剛正不阿可否其間或專行一事者豈惟廵按惡之衆皆疾之或隂註以數字之考語或明摘其一事之過失而劾之退矣由是布政以下皆以作揖為名日候於御史之門而無暇各行其政甚者公文往來皆必親逓而布政使方岳之重按察使外臺之長乃躬任舖司兵之役而不恥矣彼為布政者則曰我姑卑巽數月則有京堂之陞矣既為都御史廵撫則又曰我姑謙遜數年則有部堂之擢矣不然則劾隨之能得此乎由是内外大小官員皆以持循保位為賢而慷慨任事者為不謹忠正之人因是而黜者多矣孰肯體國憂民而為之興利備患耶此今日致民飢困所由也今使大臣有如富弼之賢者陛下委金萬鎰使之馳往地方賑救欲發倉廩則倉廩素空也欲買糧食則米榖絶無也欲勸大戶則大户自不給也欲知飢民實數則守令素不究知也欲委官則無實心行事者而或差占於廵按則不敢承命也一人耳目有限將如之何哉不過公文行下而造冊報上曰賑過若干而巳其生其死誠不能知也此今日之飢荒實不能救而後日之飢荒所當急備也聖祖所憂盗賊竊發豪傑或乘隙而起者此正可憂之時也臣惟曰囘士風變治體而皆復祖宗之舊此今日救民之急務也然此事大臣不敢獨任也惟聖明張主於上而已何者臣僚昔皆陞速今緩其陞則怨怨則謗御史先既權重今抑其權則怒怒則劾謗與劾大臣之所深畏也今日職位退亦可矣而歿後議及贈謚則又以有無彈劾為應否由是浮沉保名者恒得志體國任怨莫之敢矣臣故謂保民今日急務在聖明張主之而巳蓋能保民則天眷益隆宗社可永皇祖考享祀於萬世陛下萬世之孝也然其本則又在陛下修德講學以作憲天之聖也謹身節慾以固齊天之壽也此二者近臣必言聖心已知而臣不敢多議也惟持守之為難耳㑹子曰人之將死其言也善臣病勢日亟常恐一朝痰厥壽命不乆聖恩終身莫之能報是以力疾盡言至此也陛下憐臣愚忠憫臣疾苦而早賜得休以終餘年臣之幸也其以為狂妄而罪黜之亦幸也若必欲起臣上道則衰病不堪必死於道路矣臣惟一子貧弱不能逺收臣葬惟陛下哀憐弱病不能趨詔懇乞休致䟽臣久患痰火極弱行不能百步立不能片時兼以心神虚怯眼目昏花遇事慌張出言蹇澁常時氣鬰不通身欲顛仆或時欝散不止氣如暴亡是以不能供職效用自為副使及陞今職中間一謫再興十辭永允頃丁家難今服闋因疾不能赴京陳情乞恩休致荷蒙恩㫖容臣調理臣感激思奮調理不痊自分此生無緣上答中夜哀思遇時多事乃瀝餘忠乃陳三䟽自知身如病馬既蹶難興言比鳴鳥旁聞皆嫉直欲報恩於垂死而他顧不遑豈圖基用於將來而公議有犯乃今十二月初三日忽准吏部咨該本部備題奉聖㫖廖紀胡世寜姜清都行取來京用欽此咨臣欽遵施行臣聞命驚惶即欲趨赴奈緣病困日乆逺行驟難試一登舟而近出即連數疾而速還尚冀調理少痊不覺延捱多日恐稽召命以速官刑憂惶日積痊可無期竊惟自古忠賢難逄聖主况今遺老皆昔困於權奸之久幸今得遇聖明之知豈有不願仕進無故推托者蓋其他則或憂人忌而避禍不行如臣則實由天廢而痼疾難起懸望闕庭感戀徙切伏望聖恩垂日月之照而幽隱不遺擴天地之仁而疲癃是保特降綸音容臣休致明勑吏部示勿復用以便臣安養之私以免臣冒進之咎臣得以未死之年感陛下再生之德日同野老含餔鼓腹而歌咏太平時學緇流稽首焚香而祝延聖壽臣無任激切祈懇之至胡端敏奏議巻四
