body:
  text: 胡端敏奏議卷六明胡世寧撰乞恩辭免升俸疏官同前臣聞士夫立心以不欺為本人臣事君以無隱為忠臣頃因病乞休蒙恩未允即欲強起謝恩供職間奈緣舊疾未瘳不能出户只得暫行調理今忽聞報該禮部題奉聖旨胡世寧升俸一級欽此臣聞命驚惶不能寢食竊惟大禮再議臣時丁憂服闋寢疾在家逺聞江淮餓殍盈途採諸輿論皆謂天災流行由我皇上孝心未遂上下不孚以致聖治未彰而且臣工多玩無肯體國愛民所致臣時感恩圖報不忍緘默乃欲極言治道於後而敢僭言大禮於先竊效古人忠信善道納約自牖之義實非専言大禮也况查臣奏至京大禮已定臣實無一字之助于廷議也况臣同日他奏有曰皇伯之稱不忍遽改有曰稱號已定不宜再更臣見亦有偏言亦有謬宜當罪黜不敢欺隱也彼他人之偏謬者皆罪黜未復而臣獨荷寬容且蒙召用叨冒巳甚今又緣此升俸公議其謂臣何况臣衰病不職本等俸給猶愧素餐更復增益踰分豈堪故雖感恩刻骨誓圖死報而亦恐為朝廷濫賞之纍下情終日慚惶豈得安心供事也伏望聖恩收回成命容臣調理數日幸疾痊可即起供職勉效勤勞以消三品之俸如是過旬不愈則臣命薄終負天恩乞敕吏部查例放回容臣間住安養以終餘年使得免于尸素之慚叨冒之罪則尤感陛下曲成之德也臣以私情纍干天聽不勝戰栗奉聖旨俸巳升了不準辭該衙門知道欽此陳情再乞天恩懇辭升俸疏臣聞孔子曰事君敬其事而後其食又曰勿欺也而犯之臣愚固滯確守聖言臣近因大禮書成蒙恩升俸一級自慚非分具本力辭奏奉聖旨俸巳升了不準辭該衙門知道欽此臣聞命自天措躬無地欲謝恩恭領則事理不當恐貽君父濫賞之纍欲照前執辭則愚誠未察恐犯天威冒瀆之誅展轉慙惶莫能為處不得不自陳素履以瀝愚衷而祈以少動天聽也臣在正德年間初任廣西太平府知府繼任江西兵備副使𠞰夷平賊節效微勞臣皆不敢一字求紀以希升賞唯以敬事後食之心不敢有他也今大禮之成實由聖孝格天而尚書席書等首倡大義屢經廷辨不避艱險以贊陛下定此中制垂憲百王升賞宜也經歷黃綰等書因言禮識其才猷忠力可用而乃纂其言於中册疏其名以上請意欲陛下法祖宗破常格而收用之亦宜也如臣在逺因事言及而且奏上于禮成之後實無一字之助也何敢濫叨恩典况臣先蒙聖恩初任僉都御史巡撫未及半年即升吏部右侍郎守制未嘗一日到部又升今職官叨三品日侍清光使臣果有忠益允愜輿情循資推擢固未晚也今才到任二月卧病兼旬且因召用出自聖衷未協輿論兼以才識短淺事體生疏自慙職業一事未盡一言無補恐孤聖德因病乞休何敢更叨踰分之賞使臣冒領則先此有勞不言盡忠于先帝今則無功受祿負恩於明主是臣既老而衰貪得忘戒也竊惟自古帝王未有不以慎賞節財為保國長久之道今國家常賦有限而經費無窮正德末年冒功升賞食費無限天下幾至大壞幸我皇上即位痛革此輩天下始安今未五年冒濫漸開然皆武臣軍匠也臣佐兵部義當捨生執奏以助陛下恪守祖宗之法長保祖宗之天下而傳之無窮惟以誠信未孚輿情未協未敢輕言實負陛下也不意今日文職冒賞乃自臣始臣若祇受異日何以言人何以感格聖明而貪昧誤國之罪萬死不足以贖也故今冒死直言亦以誦法孔子勿欺而犯之訓也諺曰小事不通長算今聞太倉積銀不及富勢一家之産天下空廩皆缺貧軍數載乏糧往嵗大同甘肅軍士之變皆由糧餉不繼也凡受國恩者所宜人人體悉事事撙節而擔石積纍以裕國儲而贍軍餉惜民窮而備急用也如臣升俸一級計每月多支米一十三石可養窮軍戰士一十三人一年則多支一百五十六石所謂不通長算也伏願陛下裁省冗費自臣今始即賜收回成命容臣以舊俸供職使得執法行事而效忠一二以報聖德於涓埃則臣感恩過於升賞萬萬也奉聖旨俸不必辭該衙門知道欽此因劾認罪乞恩罷黜疏近該給事中余經劾臣心術姦回欲要速行罷黜等因臣廉恥素重初聞惶愧甚不能堪既而自省彼勸陛下辨君子與小人實今日之急務也其欲進賢退不肖亦言官之要職也其劾臣諸事人或自知無庸臣辨唯謂臣姦回纍疏祕計輒乞留中一節臣愚自負素抱忠赤受知明主頗信天下而經以為姦臣苦不自知惟思近奏保養聖躬并忠益事二疏內所言唯保身講學二事皆切陛下身心者臣愚獻此恐涉沽名竊倣古人貼黃之意請乞留中省覽經緣此疑臣勢難與辨唯乞聖明將臣原奏二本再賜親覽一遍則臣之心術忠邪莫逃聖鑒更或批出九卿科道各抄看詳臣言果涉姦回不忠甘受顯戮則臣心事亦得暴白于天下後世矣若謂臣為索元禮告密之事則臣昔奏宸濠已被附勢者誣陷幾滅身家今見凡為宸濠有功被難者皆橫遭劾退臣豈不懲而無故為此就如有之則所告何人何事其虛其實聖明豈不施行經亦何從預知蓋或誤聽人言也其謂臣升俸不當宜速罷黜則允協公論亦中臣私臣當認罪求退更何顔復玷清班以咈公論也伏望聖恩天地日月即從論劾將臣罷黜或俯察愚忠容臣休致使臣得保餘生以全晚節則臣雖退猶榮感德無既也臣勢孤情迫冒死不避煩瀆奉聖旨胡世寧不準休致著照舊安心供職吏部知道乞回成命以全聖德而保治安疏近該御用監太監張忠等題準將成造龍牀頂架寶橱金册金寶珠翠龍鳳冠頂各項畫軸并書篆春牌等件官匠趙奎等六十八員名內該升職五十四員冠帶一十四名事下本部節該兵科都給事中鄭自璧等盡言論諫本部尚書李偕臣等據法奏請俱奉聖旨已有旨了欽此竊惟自古國家建官分職下至百工技藝之人皆有月給俸糧使之各食其食而事其事非若民間雇用工藝人等身非所屬事必相酬也至于升官止惟武職論功蓋因用其死命其餘則皆遇缺掄材銓補非以酬勞也今趙奎等嵗食官廪成此工作乃其職分豈應更加升賞故如我太祖太宗創造兩京宫廟城闕及各項衣冠禮樂器物併各衙門廨宇比今趙奎等所作工程何啻倍蓰千萬若皆一一升職冠帶則流外官豈堪數紀而竭天下財力不足以供矣何以能至今日保民如此之盛傳天下如此之逺也豈惟我祖宗列聖未嘗有此雖考古歷代中葉之君亦未有因如是工作之成而一旦升職如是之多者陛下試思此事傳聞天下後世以為何如其于聖德有纍否也太監張忠素聞安靜老成今不意其有此蓋止知下植私恩不顧上虧國體知愛忠者猶為惜之况我皇上天縱聖明即位以來痛革權姦濫賞之弊再造我皇明萬世之業豈宜誤聽人言一旦有此陛下試敕户部通查天下額徵稅糧嵗入幾何嵗用幾何有無足彀更敕吏兵等部通查每嵗功升乞升各項官職幾何該添俸糧幾何常賦有限將何以給竊惟自古國家財盡必取于民民窮必至于變我皇上聰明睿智日新聖學其于古今治亂之原何事不知何思不到今思所以為祖宗保天下為天地養生民者必由慎賞節財其于前旨之誤鄭自璧等之言必有契於心矣而猶未即從者豈非以令出惟行不欲因臣下之言而遽改也昔書言成湯不邇聲色不殖貨利德懋懋官功懋懋賞用人唯已改過不吝以為一代聖王垂裕子孫六百年之天下至于今歷代帝王祀之與天地同久我皇上天性恭儉仁孝自來聲色貨利一無所好蓋實于湯有光者乃惟官賞或非功德吝於因言有改惟此一事豈忍聖德未全如湯也伏願陛下痛思祖宗創業之艱備訪軍民困苦之狀思欲愛人必先節用欲節用必先省官俯納言官之諫曲從本部之請將趙奎等升官前旨收回敕令照舊供役或止與署職冠帶俸糧照舊關支不許再後夤緣奏乞如此則紀綱正而人心服財用足而民生安陛下聖德亦傳于百世祖宗鴻業長保于萬年矣臣以病廢庸才誤蒙擢任兵部軍職之濫職所當言不敢負恩緘默謹昧死奉聖旨該部知道因疾讓賢乞恩改任以圖報疏臣讀周書周成王訓迪百官有曰推賢讓能庶官乃和不和政龎舉能其官唯爾之能稱匪其人唯爾不任故昔舜命伯禹宅百揆而禹拜稽首讓于稷契暨皋陶命伯夷作秩宗而伯拜稽首讓于夔龍此虞周大臣濟濟相讓一時盛治曠古莫及而有宋盛時亦令常參官各表讓一人以自代蓋有見乎此也臣之愚陋豈敢上希古人然幸逢陛下則虞周之主也臣久病極弱蒙恩叨授今職才力不堪先已備陳不敢再瀆唯以常日朝參行步甚艱每進一門常再歇足而後能至比至御前痰喘氣促不能存立常時眩暈輒欲顛仆或時到部不能坐堂至于近失朝儀尤玷班列况居兵部多事之司豈臣竊祿養疾之地臣之自揣豈宜冒居斯任而久妨賢路也若論國法分宜罷黜唯以先日纍辭不獲感恩圖報未敢乞休臣切見先任遼東巡撫今改南京都察院右副都御史李承勛素存經世之志卓有過人之才先任南昌知府而華林碼瑙二山劇賊萬餘皆其討平口不言功後任遼東巡撫而遼海三萬等衛邉牆積廢皆其修復人不告勞中間一任按察使於浙江而一時風采光前絶後一任右布政於陜西而三邉事體多訪預知此則臣嘗久與同事而知之頗真雖今賢俊滿朝固不少此而自臣視之則數倍不及者也又有原任吏部今改南京工部左侍郎何孟春臣雖不曾與處而素聞其通敏之才宏博之學清介之操剛正之氣皆不可及而且出身兵部素習籌邉巡撫雲南克平巨寇佐職銓衡雅志推賢此皆人所共知者也然聞其亦有過失不敢為匿蓋其一時誤認大宗小宗大夫士庶人之禮以為天子諸侯之事識者非之臣初逺聞深為錯愕繼又聞其深悔前論之失而感聖德之寬容且曰幸蒙皇上曲全此身安得馳驅邉徼以盡心經畫而圖報於萬一也臣又喜其不文過飾非而感恩知報以為不失為忠實之士矣此聖人不貴無過而貴改過舜帝所以宥過無大也臣又思昔唐虞之朝君聖臣賢宜其見無不同論無不合也然考其時君臣相語有曰都者美其言也俞者然其言也此其見同而論合者也又有曰吁者不然其言也咈者甚不然之辭也此其見不同而論不合者也然則孟春前論之失幸遇陛下堯舜之君宜其置之吁咈而不計矣如蒙聖明深念本兵重寄特敕吏部再加訪察將李承勛何孟春二臣中推舉一人代臣今職將臣量才改任南京部院卿寺對品相應職事使臣得在彼就間養疾以待及年休致幸保餘生則臣未死之年皆陛下再生之德而此二臣中有能盡忠補報于陛下者即臣區區圖報之心也臣不勝祈望天恩之至奉聖旨胡世寧著照舊供職欽此申明職掌以賜成命以盡臣節疏臣以病廢庸愚誤蒙聖恩擢用量力不堪纍辭不獲乃痛别祖宗墳墓而強疾輿櫬以來誓而思曰此行病死道路不恤也罪死刑獄不恤也被汚名而勢不能辨任難事而力不能堪以死皆不恤也其惟曰何以報我明主之德而不為誤國之臣乎夫自古天下之壞曰民窮財盡也曰賞罰不當也自堯戒舜舜戒禹皆曰四海困窮天祿永終戒財盡也我聖祖垂訓有曰凡賞功要當不當則人心不服久則禍必生焉戒賞濫也斯二者之壞多在臣職兵部也使臣今佐兵部不能盡忠執法致我皇上中興之朝而復為濫賞耗財之事祖宗天下漸日以壞則臣誤國之罪雖萬死不足以贖也况臣衰病才弱不堪軍旅盡出人人之下聖明豈有不知而用之兵部也其必以臣效忠先朝死罪不避今必不改初心而兵部又最當執法之地也故特授臣斯職臣豈敢負恩改節而不盡忠以報今使臣言得用則臣職得行可以圖報於萬一言之不用則陛下任臣為無益臣亦終當誤國徒死而無益也故今受職之始敢預言之切惟自古論兵先在足食我聖祖開創天下至今地不加闢也賦不加增也頻遭水旱嵗多蠲免比前所入蓋益減也然而內府供用不知比舊加幾倍矣宗室世祿不知比舊加幾倍矣是皆不可得而減也乃惟正德年間權姦黷貨富勢小人皆冒軍功得升世襲軍職始惟內官家人市井富商終則文官子弟亦竊為之金紫冒濫數無紀極至于各監局濫收食糧軍匠數亦無紀此二途者何益朝廷而嵗耗國儲數十百萬臣初平賊江西見彼殺賊之人無一報功報功之人無一見賊及後充軍遼東見彼冒功之人勢焰薰灼邉人凜凜總鎮官既奪邉軍血戰所得之首級以與之報功衛所官又尅邉軍忍死所待之糧銀以為之宴賞且又聽之乘其馬役其人鞭笞呵叱如待囚𨽻彼為國家出死力者俯首喪氣不敢言其中心哀怨何可言也又聞有等身不出京而寄名各邉地之相去各數千里而或同時皆報此人獲功其虛冒何可言也我太祖懸世祿之賞以武臣之死力蓋以人非為其子孫孰肯決其軀命也然其時皆起自濠滁身經百戰始得千百户一官指揮以上非有大功絶不輕授豈知近日冒濫至此也彼真出死力者見之誰不隳心也故昔宸濠之討調軍遼東人皆踴躍思欲南降使非天命有定北軍至彼天下大事去矣聖祖所戒賞功不當久則禍生者蓋幾踐之豈不甚可畏也國家糧賦出自逺方窮民終嵗勤勞焦體爛足力耕所得而或嵗歉收薄貧不能輸有司催併鞭笞哀號之苦坐食者不聞也逺運至京軍士常年暴露剝淺渡江驚風拍浪艱危之狀坐食者不見也通計船料車腳加耗養軍之費大率費米三石始運一石至京坐食者不計也乃以養此蠧國害事之人是猶割子弟之肉以飼虎狼豈不大可恤也識者謂當此時而更遲以一二年非我皇上入繼大統祖宗天下不可支矣天幸我皇上即位明詔盡革此輩人心始快天下始安然有識者猶恨不籍其家以足邉儲而濟窮軍之困戮其首以梟邉境而快憤軍之心也自前二者耗國之餘至於今太倉積銀不及富勢一家之産天下空廪皆缺貧軍數載之糧無計可補記言國無六年之蓄曰急無三年之蓄曰國非其國者豈得不寒心也今各邉一議出軍便憂缺食近者甘肅大同軍士之變皆由糧餉不給也使仍不給而各邉效尤將如之何豈得不寒心也陛下今日所宜特敕在廷文武大小臣僚會議所以不背祖宗成法而能足國裕民贍軍固邉之䇿各陳所見擇其善者而必行之以制治於未亂保邦於未危可也乃聞冒功革職之徒朝夕窺伺以圖收復而食糧軍匠已收及五千餘名言官論諫再三本部執奏堅一忠誠剴切聞者流涕而聖意未回中外洶洶臣切私憂而過計則曰弊端一開其何能止恐冗食者漸如往昔之多而國用遂竭將如之奈何既而忽自省曰陛下聖明焉得有是今惟宫廟興建器皿繕修孝思所急事欲速成工須廣集不得已也工完之後必有改爾或謂此出左右之意陛下誤聽其言者臣以陛下聖如文武所任左右必皆正人而咸懷忠良事或未之思也臣請以國家譬諸山嶽臣等內外臣僚則皆附山之室宇也天下軍民則山下之土石也財用則猶山之元氣周流於上下之間以滋蔭土石而壯山之趾者也使人各欲崇其室宇而日鑿山之土石以自培則山趾剝而元氣耗山日易頽室宇其能獨安乎故不若內外同心體國節用愛人以輔我皇上共固皇圖於萬載臣等子孫亦世受太平之福也伏願陛下以臣此言謀及大臣諭諸左右如其謂然乞降明旨凡昔冒功革職之人永不許議復再有冒者必誅無赦食糧軍匠亦不許再收已收者宫廟完日叧議裁革使臣得附左右大臣之忠以安心效職于一二臣之願也天下之幸也如其皆謂不然則臣竊祿無補靦顔憂悸死亡無日矣伏望聖慈憐憫丐臣餘生早賜骸骨還鄉不勝感戴天恩之至會議疏近該吏部奉旨會議少詹事霍韜所奏內外官員遷轉資格臣職當預議奈緣疾病不能進朝竊有鄙見不忍緘默臣讀虞書皋陶謨有曰在知人在安民又曰知人則哲能官人是知人君代天理物其職専在於安民然推安民之要又在于能知人而使官稱其才也臣謹用斟酌古今事宜遵照祖宗舊制擬為知人則例五條官人則例一十五條上塵聖覽以助睿思之萬一昔宋臣范仲淹上百官圖于宋仁宗曰如此為敘遷如此為不次如此則公如此則私且曰進退近臣不宜全委之宰相仲淹當時官非言路任匪銓曹豈不為越職當罪也然其區區愛國之誠不遑自顧傳至天下後世皆以為忠而惜其不能盡用也臣之愚誠竊亦效此伏惟聖明垂意省覽天下幸甚計開知人則例五條一論人之才術當以誠心體國愛民為主而才與守斟酌品第有是心而才與守兼優者為第一等有是心而或才優守欠或守正才欠者為第二等無是心而才守兼優者為第三等無是心而或有才無守或有守無才者為第四等一論人之心行當敕大臣科道翰林及在外方面正官當以姦詐冒嫉為重而貪墨為次其部寺屬官方面佐二及知府以下則惟罪其貪酷而偏詐之人尚未可去一凡尚書侍郎都御史府尹翰林科道布政使按察使兵備提學知府以上各項緊要官俱責到任一月後各舉一人自代吏部擇其舉多者擬奏升擢庶多得人一兩京大臣及在外撫按官俱以能薦賢稱職多者見其知人之明異日可備吏部之選吏部堂上官尤宜責其接人多訪不必避嫌一今內外臣僚皆以因循保守為賢其有盡忠為國擔當幹事不避流俗者朝士則衆怒羣猜不能存立在外司府等官亦多被衆忌流謗考劾因而誤黜以此盡沮忠義之氣萬一國家有事無人肯當是皆彼職名不聞于上故也今宜法古御屏記名故事密訪內外臣僚中有盡忠體國才堪委用者親記其名一二則彼不為姦謗所陷而真才得用矣官人則例一十五條一內閣三員或四五員舊當寅亮輔弼之任今又總裁六部而議其進黜職任至重論理有缺宜當斟酌先朝李賢等事例於六部尚書左右都御史中取其才望出衆練達事體公忠體國知人有容者推補一兩京六部尚書左右都御史約共十四五員為一等有缺宜於在外行事右都御史及兩京左右侍郎坐堂副都御史共二十四五員內推補仍須論其職務難易輕重或量其才力所宜由簡易而升重難或聽其心志所願辭重難而就簡易以均勞逸一兩京六部左右侍郎坐堂副都御史在外總制總督等項右都御史約共二十四五員為一等有缺宜于兩京大理寺卿坐堂僉都御史府尹詹事學士并在外各處巡撫巡視南京管糧副僉都御史十三布政司左布政使共四十餘人內推補其兩京侍郎坐堂副僉都御史亦當論其職務難易輕重或量其才力由簡易而升重難或順其心願辭重難而就簡易以均勞逸一遼東薊州宣府大同山西延綏寧夏甘肅陜西四川貴州雲南兩廣勛陽南贛保定河南山東湖廣江西淮鳳蘇松各邉腹巡撫并巡視河道都御史共二十三員為一等右此等官最要得人最宜久任如宣德正統景泰年間各邉巡撫有只用寺丞等官領敕行事不必官大又如周忱在蘇松自侍郎升尚書凡二十二年王翺在遼東自僉都歷升副都右都左都凡十有一年于謙在河南山西一十八年陳鎰在陜西亦十餘年是皆事久功成保濟得地方生民為朝廷分憂今此等官宜於兩京各寺卿少卿大理寺丞年深出衆給事中御史郎中在外右布政使按察使左右參政年深兵備副使上等知府內推升原職髙者升副都原職卑者升僉都十分資淺者止升署職令其領敕一般行事其有在邉不諳軍旅而善理民事者改任腹裏不為貶抑年深有勞者就彼僉都升副都副都升右都常管此方十分年深勞著者就升部院掌印如正統天順年間金溓年富皆自副都升戶部尚書不為躐等蓋先必如此廣推方能得人後必如此重擢方能久任久任方能修葺得邉疆完固撫治得百姓安樂以為國家久安長治之計一兩京府尹并在外十三布政司左布政使共十五員為一等俱要用心厯練民事不厭煩勞者循資遷轉此官稱職者留以久任選升六部侍郎并都察院坐堂副都御史不必更升在外巡撫以致遷轉不常不得盡心民事其雖公廉而才力不稱者遷改相應職事姦貪者即時罷黜如天順年間刑部尚書陸瑜禮部尚書蕭暄皆由布政徑升今若止升侍郎副都不為躐等一翰林春坊詹事府等官以備顧問侍講讀草制誥修史牒最是清要之職唐宋以來多重此官以備卿輔之選然多選外官才學過人者試任雖取中狀元亦令試歷民事方才取入翰林我國初多用徵聘隱逸之士永樂宣德正統以來如楊士竒張洪由王府審理教授黃淮劉鉉張益由中書舍人鄒濟陳仲完由教職儲懋王洪陳山由給事中劉球李時勉陳敬中由主事胡儼由知縣蔣驥由行人于敬由御史各升翰林春坊詹事等職又如張英由教職薦升給事中復進中允郭璡由參政李賢由主事薛瑄由御史皆歷升侍郎尚書兼詹事學士又如張顯忠由翰林歷升祭酒出為布政郭濟歷任春坊復升知府王珣由檢討升大理寺丞巡撫貴州歐陽謙由御史改編修復升郎中徐旭由御史升郎中祭酒復改修撰羅汝敬由侍講改御史是皆惟才所宜不拘內外出入所以得人近年拘定庶吉士及進士第一甲素稱閣下門生者方得選授天下不無遺才今宜遵復舊制不拘內外郎中職事但有文學才行出衆者許大臣言官論薦內閣吏部召試此官庶幾得人而可儲卿輔之望矣一給事中御史皆有言責上而君身朝政缺失下而臣僚是非邪正皆唯其所言是聽使非其人人主誤聽其言則聰明惑亂是非邪正不明誤事不小不聽其言又為拒諫取謗天下至于御史又有巡按在外激濁揚清除姦革弊之責所係一方利害尤重故自古慎重此官我祖宗朝如王翺由寺正甄庸由知府左遷陳祚由參議康慶由知州落職皆復升御史虞祥王鐸年富由教職冀凱由州判官皆升給事中又如丁璿由主事馬守中由同知俱升御史徐旭由御史升郎中復改翰林歐陽謙由御史入翰林復升郎中是皆唯才所宜不限資格所以得人而又拔其尤者超擢侍郎僉都御史等官所以肯盡其職且又不時考察使偏私浮偽者不得混于其中以惑上聰明所以天下常受納諫之福而君上不受拒諫之名今宜使大臣于內外郎官及聽選進士中各薦所知必其忠直公正明識治體者方授此官三年之內考其敢言而忠諫有益舉刺得宜及巡按在外激揚興革有益地方者留以久任超擢卿佐等官其雖敢言而言或不切于事體或過于激烈易至觸忤者則遷改內外相應職事以保全之後仍記其忠直核其後效量加超擢其或當言不言或挾私附勢妄奏及巡按不職者明奏降黜如此則言官皆得忠正之人而朝廷納其忠諫有益於天下矣一吏部文選考功兵部職方武選禮部儀制等司郎中亦須妙選若得其人亦宜久任量加超擢其中常不稱者即令外補一通政司鴻臚寺官専取聲音洪亮于本衙門遷轉已有舊規其有才堪部院者亦行推用一兩京坐堂僉都御史南京總督糧儲都御史及各寺卿佐并各部寺屬官照常循資遷轉然人才各有所長有不相宜者彼此更調不妨一在外布按二司官宜只於本地方衙門遷轉雖有資格遲速不同臨了總算有甚懸絶不得已者方推鄰近地方官升補仍照𢎞治以前事例僉事徑升副使副使徑升按察使按察使徑升左布政使參議徑升參政參政徑升右布政使不必如今逐級挨升南北逺調以致往來不常虛曠嵗月地方常致缺官誤事其四川雲南貴州廣西員缺宜于附近地方資淺人員內比常早升以酬其勞逺一各道分巡僉事微聞國初選定道分九年方改後因改道不常凡遇地方難事皆推避不理以致豪強貪猾任情作弊害民地方受患今宜皆如廣東等處事例三年滿日方許改道仍須考其三年任內姦弊盜賊豪強貪猾之有無以為殿最本司若有進表等項公差止於貼堂副使或分巡滿道僉事內差遣其分道三年之內不許改差一各處緊要兵備及提學官俱要於資淺人員內推其才力相應者先升僉事後加副使常管此方其職任內事務不許他官撡越如提學所管教官兵備所管有司巡捕并衛所官有犯撫按衙門俱就委其提問不許改委他官以致權柄不一事體難行兵備必須兼理本道分巡以便行事至於練兵捕盜應該勸賞等項財物許其措置或動支官錢如此久任専制方可責其成功十分年深勞著者提學推升少卿祭酒等官兵備推升各邉巡撫其餘照常遷轉才力不稱者就行改調别任不宜姑息一知府知州知縣三等親民之官使非其人則上司雖有好官行得好事不能實到百姓所以自古國家慎重此職漢制郎官出宰百里郡守入為三公唐制不歷刺史不得任侍郎列卿不歷縣令不得任臺郎給舍我國初取中進士俱選縣官徵至賢才多選守令正統以來知府俱責大臣保舉知州知縣另委吏部揀選所以得人且又立為定制知府知州見上司不行跪禮以重其職其久任卓異者不次超擢如何文淵由知府即升侍郎胡儼由知縣即升檢討所以人多樂為此官𢎞治初年又責其備荒積穀多少以為殿最所以民受實惠固得邦本如此久長正德以來此官不重輕選驟升下焉者惟圖取覔得錢以防速退上焉者惟事奉承取名以求早升皆不肯盡心民事以致民窮財盡一遇凶荒多致餓死今宜遵復先朝舊規知府令在京堂上官於京官七品以上在外在間五品以上官內保舉在外撫按及布按二司掌印官于參議僉事同知知州內保舉其知州知縣俱聽吏部預行揀選仍責撫巡布按二司於府通判推官州同知知縣內保舉堪任知州之人州判官縣丞主簿儒學教職司府衛首領官內保舉堪任知縣之人俱必其有愛民之誠有守巳之操有處事之才三者俱備而後可任此職後有不稱舉主連坐誤舉者先能自首則免到任之後察其奉公守廉而不盡心民事才力不稱者改任品級相應職事貪酷罷軟者即時罷黜其稱職者留以久任知府九年上者即升四品京堂并布按二司長官次者照常升參政副使等職知州九年上者即升參議知府郎中僉事次者照常升員外府同知運同等官知縣上者三年行取到京考其文學德行出衆者選入翰林忠直剛正識治體者選為科道才識明敏者分任部寺屬官其有深得民心願留久任者超擢府州正職次者九年六年照常遷轉如此選任方得民受實惠地方雖遇凶荒盜賊可保無虞矣一在外知府知州知縣并凡方面有司等官升選俱合注於原籍相近地方廣西雲貴有司尤宜查照𢎞治以前事例只於本省人員內升選庶免其不服水土且得到任易便不致地方曠官日久奉聖旨吏部看了來説欽此病弱不能朝參懇乞休致疏臣久病痰火虛弱常時一身之間隨火變動為病百端近自五月以來每入朝班侍立輒患腿膝酸軟不能存立節欲顛仆蓋因身弱之極心時存敬氣輒屏息以致火鬱下焦注腿膝如是也是雖明知病原不能醫療者由臣命薄不足以上承天寵也念臣昔遇權姦亂政不能仰俯隨時死生禍福旦夕難保然猶靦顔竊祿以致久遭兵陳刑獄之苦荐歷炎荒苦寒之地而萬死無悔者誠以上思先朝作養之恩下為今日興復之計而欲存身效用也幸遇皇上即位之初首擢臣以吏部之職臣感殊遇巳分捐軀既而不幸事變中沮妄言取忌然猶曲蒙聖眷寵召再三臣今強疾來京侍朝八月誠見陛下勤政好學至仁大孝而又恩禮臣下加志窮民誠不世出可與致太平者雖臣位卑言髙躁妄孤陋不足以上當天心下協人望然猶冀忠誠積久漸當感孚可得效涓埃之報於萬一也乃不意病久益弱無如之何故不得已在在纍乞休致三乞改調南京其願就南京者尤非得已實以病弱不便朝參又不忍負恩輒去故欲就彼安養數年庶幾病愈可復進用也不意蒙恩未允今病已深不敢再乞兹瀝情欵伏願聖恩憐憫特賜還鄉休致以終餘年不勝感戴之至重民牧以安民生以固國本疏時官南京吏部左侍郎準本部咨準吏部咨該監察御史朱豹奏前事節該吏部題稱合無行令兩京文職三品以上官各將平日信服不拘在京在外堪任知府者疏名上薦可薦者不嫌於多已薦者不厭其重不可以親讐而為嫌疑不可徇私昵而為欺罔等因欽奉聖旨是在京在外有材識敏達操存端謹志慕循良堪任知府的著兩京文職三品以上官各將平昔所知疏名上薦欽此欽遵備咨通行到臣臣愚所知數人不能去取躊躇纍月今思在京志行可保才堪知府之人有如南京刑部養病署郎中事薑綱見任主事余鋟等皆名譽素聞人或多薦年資將及吏部自有擢用臣不敢以塞眀詔外今訪得先任光祿寺少卿掌欽天監事後降直𨽻宿州知州樂頀先任廣東按察司副使後降廣西藤縣典史孫懋是皆操持清苦志慮忠純初任知縣各播循良之譽繼任給事中屢陳忠實之言暨後樂頀超遷卿寺而以御下過嚴致來所屬之怨一時被誣孫懋厯官方面而以身在逺方不知校尉之真一時失待幸皆得遇聖恩辨明薄示懲降今聞樂頀因疾還鄉而日頌聖德於田里孫懋依限到任而日勤民事於遐荒是皆夷險一心始終一節似此循良巳試練達巳久之人論其原資復之清要一職固宜因其巳降委之僻靜一府尤稱臣愚輒敢上聞以備採擇乞敕吏部再加訪察量行擢用如臣今舉欺罔徇私甘當重黜或彼後任犯贓非誣願與連坐應詔自陳不職以弭災異疏準南京禮部咨該禮部等衙門會奏奉聖旨是兩京文武衙門大小官員著痛加修省勉盡職業以回天意四品以上官著自陳欽此欽遵除痛加修省外切惟近日災變實出非常臣每見奏報一次驚惶纍日及今捧讀聖旨敕諭益加憂惕無地自容思我皇上聖德中興仁孝恭儉豈宜有是也無乃以今天下民窮財盡不能再支荒歉而我聖祖垂訓所憂民不聊生盜賊竊發豪傑或乘隙而起者臣等在位之人有能致之無能禦之將為國家無疆之恤是以天心仁愛預警陛下而迭出災異乃一告不巳而再告屢深欲陛下一朝省悟而大奮乾剛致果於用舍黜陟之間也書言邦之杌陧由一人邦之榮懷亦尚一人之慶是知人君未可以用一人之誤而不能種亂致災去一人之當而不能轉危弭變也臣愚自省兩京大僚之中未有如臣不職之甚者蓋一則身弱之極遇事不堪委用二則見偏之過出言不能合衆三則愚罔之甚自以妄言為忠言而乃過憂明主之孤立臣有此三失焉敢冒恩竊祿而不以告陛下哉臣自到南京以來舊疾痰火比前益甚加以心神虛怯語言蹇滯足難於行步手倦於執筆而又自前屢經言官論劾人心所同即天意所在也臣豈敢再厠班列况查南京各部皆止侍郎一員而惟吏部多臣一員似為冗濫亦當裁革伏願聖慈憐臣愚昧早賜罷黜以協公論以答天心臣不勝戰栗待罪之至謝恩疏時官南京工部尚書臣原任兵部左侍郎纍因多病不能朝參懇乞休致蒙恩特改南京吏部左侍郎以便調養臣到南京竊祿優間巳逾半載正慙尸素無補纍奏乞休未得今本年五月十七日忽準吏部咨欽蒙聖旨升臣今職臣量材難稱無任戰兢揣分不堪曷勝感激但惟天地之恩未報犬馬之性素存敢不益勵勉膺新命期為國家守法信度節用愛人上思卿輔之義因事納忠下同工技之流執藝以諫更效華封仰天祝聖而多夀多男之是保願祈明主得賢立政而庶獄庶慎之罔兼臣已於本月二十六日望闕謝恩到任理事外乞憐民困議都水清吏司案呈奉本部送據應天府呈據上元江寧二縣顔料鋪户陳鑑謝雨等連名狀告鑑等賣物當行編充前役遞年各衙門賠纍消乏後蒙南京工部坐派福建等布政司辦解折料價銀一萬四千兩有零到部派買銀二硃等料比蒙審得硃料起運今用綱司水腳浩大體照時價估計每銀硃一百斤價銀九十兩二硃一百斤價銀八十兩只勾完納錢糧尚且靠損續有別省料價解到不及千兩買少賣多已蒙本部減估銀硃百斤價銀八十五兩二硃百斤價銀六十六兩虧纍賠補近有福建布政司仍解料銀一萬八千兩到部又蒙拘買硃料買多賣少以致貨價騰貴若照減估價值買辦不無尅損小民錢糧况是外省解納鑑等京民難替賠補乞憐移文加價買辦等情據此看得鋪户陳鑑等告稱蒙南京工部拘買銀二硃料俱係外省錢糧况要起運北京交納合用綱司水腳浩大即今貨價騰貴若照減估價值買辦不無尅損小民抑且京民難以賠補乞要移文加價買辦一節為照前項硃料鋪户既稱虧價難以買辦相應處分呈乞裁處等因到部送司案查先於正德十三年為急缺供應家火物料等事奉本部送準工部咨開預備取討生漆七十萬斤桐油五十萬斤銀硃五十萬斤二硃三十萬斤肥皂二十萬斤鐵線三十萬斤竹掃帚三十萬把數目緣由前來已經案呈通行分派浙江福建等七布政司辦解節行催據湖廣福建廣東江西陸續解到共該生漆一十二萬四千六百餘斤桐油六萬九千六百餘斤銀硃三萬六百餘斤二硃二萬七百二十餘斤鐵線三萬六千餘斤肥皂一萬六千二百餘斤竹掃帚六千一百餘把俱巳轉送南京內官監起運備用外內有福建布政司解到前項料價一萬四千一百五十四兩三錢為照京價不彀買料行令加徵價銀四千七百四十七兩三錢遇蒙正德十六年四月二十二日詔書特加蠲免訖嘉靖四年又奉工部咨開取預備鐵線五萬七千斤肥皂一十萬斤竹掃帚一十萬把分派浙江等七布政司陸續解到鐵線三千八百餘斤肥皂九千三百餘斤竹掃帚五千一百餘把已送該監起運奉本部送據福建布政司批差行都司經厯吳斆福州中衛郭仁管解舊派福州等府羅源縣生漆等料巳徵價銀共一萬八千九百八十一兩四分四釐四毫二絲七忽六微到部送司隨將銀兩照數稱收貯庫行拘上元江寧二縣在册鋪戶查審買料間今據前因卷查正德四年本部奏為修省事內一件為急缺供用家火物料等事正德二年準工部咨開取預備生漆五十萬斤桐油三十萬斤銀硃二十萬斤二硃二十萬斤肥皂二十萬斤鐵線二十萬斤竹掃帚三萬把分派湖廣江西福建浙江四布政司共已解到價銀二十五萬八千二百四十餘兩本部內借銀六萬兩修理武英殿等處應用又將銀五萬一千餘兩給與鋪户買辦生漆五萬八千餘斤桐油四萬八千餘斤銀硃一萬二千餘斤二硃一萬二千餘斤肥皂二萬七千餘斤竹掃帚四千餘把鐵線三萬二千餘斤送南京內官監起運赴京交納量勾數年之用查此數十萬兩之銀俱係民膏民脂若盡數買此物料積久必至乾涸損壞誠為可惜本部合無差官將此銀兩解運赴京收貯如用油漆則買油漆如用肥皂則買肥皂如此則朝廷得以實用而百姓又免起運之勞即今敵人時或出沒若將此銀以為邉儲之用猶為有益等因節該工部議得前項未買料銀除前借用銀六萬兩尚算該銀一十四萬七千二百四十五兩有零合無依擬行令照數解部收貯若遇前項物料缺乏照例收買應用一則可免鋪户人等營求窺利一則可免運送腳錢及沿途夫役之費實為便益題奉武宗皇帝聖旨都準擬行欽此欽遵備咨到部送司欽遵外今照福建解到生漆桐油等料價銀一萬八千九百八十一兩四分四釐四毫二絲六忽六微內查得近奉本部送準兵部咨為年例冬衣缺少紵絲綾紬白綿等事內開針工局署局事司設監太監賈友等題稱南京內官長隨四百七十九員名合用紵絲綾紬一千三百二十二匹每匹折銀三兩共該折銀三千九百六十六兩移咨南京工部於該解本部料價銀內扣數支送南京針工局俵散等因備咨到部送司查得先年支剩在庫料價銀止有一百八十四兩七錢二分九釐六毫四絲二忽九纎五塵四埃不勾支送就於前項福建解到料價銀內動支三千七百八十一兩二錢七分三毫五絲七忽九微四塵六埃湊送該局以作冬衣折支紵絲綾紬銀兩外其餘料銀一萬五千一百九十九兩七錢七分四釐六絲九忽六微九纎五塵四埃正與先年本部奏準解銀事體相同又查得節該南京內官監揭帖開報內府皇城宫闕殿宇及諸禁門城樓磚城內庫等處損壞滲漏應合修理緣由又稱節該南京內外守備會同府部科道等官相看回奏六次已經三十五年即今坍損尤甚委係緊要去處相應逐旋修理等因到部為照前項工程浩大先於𢎞治十五等年起本部節次會官奏議彼因年嵗不豐財力艱窘各衙門一向未敢輕議奏請興工修理然計合用工料必須預先整備今照前項料價銀兩合無不必買料聽令本部明立文案收積在庫備役內府緊要修理惟復照前正德四年奏例差官解運工部收貯遇缺買料應用均於事體官民兩便具奏施行等因案呈到部臣等看得前項坐取生漆桐油等料原係正德末年權姦用事倍常加派多取之數有加銀硃一料派坐五十萬斤福建一布政司派銀八萬六千餘兩及後徵銀解部又因買價不敷派令加徵似此竭民膏血豈能盡供幸賴我皇上即位權姦誅黜前項多派未完料價盡行蠲免民始得生今此赦前已徵在官銀兩論理各處亦有而有司任其乾沒不行查解今惟福建布政司官員奉公體國起解前來今欲照依原估定價責令鋪户買料送納既物價騰貴合用起運綱司水腳浩大難以賠補欲照前加徵價銀則此赦前多派料銀各處拖欠未納者既得盡行蠲免而此福建官民已納解到者反欲加徵情理豈堪是此布政司官本因體國而反使殃民本欲奉公而反令致怨也况查前料派後徵運過生漆一十二萬四千六百餘斤桐油六萬九千六百餘斤銀硃三萬六百餘斤二硃二萬七百二十餘斤鐵線三萬六千餘斤肥皂一萬六千二百餘斤竹掃帚六千一百餘把又有嘉靖續派徵解過鐵線三千八百餘斤肥皂九千三百餘斤竹掃帚五千一百餘把通前二次量彀數年之用今此價銀一萬八千九百八十一兩有零內除依奉工部咨到針工局題準事理動支三千七百八十一兩二錢七分有零湊送南京針工局以作冬衣折支紵絲綾紬銀兩外其餘一萬五千一百九十九兩七錢七分四釐六絲九忽六微九纎五塵若令買料起運照依每年常裝該造木桶板箱雨罩扛索鎖鑰事件動以數千百計該用各項物料匠作工食約計銀二千三百八十餘兩又約計南京兵部計撥裝運馬快船共三十餘隻又沿途人夫供送需索不知又費幾何且物料積久無用深可痛惜今思內府皇城前項宫闕殿宇及諸禁門城樓磚城等處多有損壞雖云工程浩大地方荒歉一向未敢議修倘後內有十分損壞處所亦難終不修理一時盡派民皆緩急難倚而且竭天下之力不足以供是猶七年之病而求三年之艾非及今漸蓄終不可得臣等若不預思奏處是負我皇上愛恤民隱之仁遇災修省之敕也如蒙軫念南京根本重地各處人民災困乞敕工部查議合無容臣等將前銀不必買料立案收貯庫及查各布政司有如前項赦前原派巳徵未解各項料銀或料物原徵折價未曾買納者一體解部趲積以為修理內府宫殿門闕等處急缺備用免後盡派小民緩急難倚惟復止照正德四年事例將銀解京工部收候遇缺買料應用胡端敏奏議卷六
