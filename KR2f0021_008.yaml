body:
  text: 胡端敏奏議卷八明胡世寧撰懇乞天恩休致疏時官刑部尚書臣不幸久患痰火竒疾為變百端然向惟旬日間發猶可支持今年逾六十血氣益衰病發不時難料每當侍朝奏對之際常恐昏瞀顛仆玷汚朝列慚惶無地自容其苦有如是者君父之前豈敢欺隱念臣荒野疏陋之人間關罪謫之後得遇聖明登極遂擢臣以吏部侍郎之職既而七載之間纍辭纍召纍劾升官六卿誥封三代行而給驛以馳病則遣官問遺恩寵逾分感激無涯臣豈木石之頑遂忘天地之報况今升轉司冦之官自古尤重蓋以五教弼於五刑民命繫於國命在昔臯陶之種德虞廷蘇公之策名太史皆以是也而臣又以起身法司幸便熟路且又上遇聖明勵精圖治言聽計從下遇輔臣忘巳推賢志同道合臣方喜所學於是得行而乃無故求去也此以公義言如此至言私計則臣家勢至微遇險特甚長子繼年未弱冠隨臣廣西江西討夷平賊歷同艱險而預發宸濠之事實其謄奏頗有贊畫時被都御史俞諫附逆忌功搆臣深禍臣恐父子併陷逼其還鄉不得侍臣哀痛成疾而死及臣赴京投獄又被都御史石玠狥時附勢奏捕家屬次子純年方十餘驚竄流離遂荒舉業絶意科目今臣先任三品雖三轉官而未滿三載今任二品亦三轉官而甫及數月臣當此衰病待盡之年止此一子豈無老牛䑛犢之念而求任滿三年使得亦如諸臣之子入監讀書以不絶衣冠之嗣也故臣前歲奏疾尚求南京去秋䝉召即來北上蓋亦欲以犬馬餘生强力就列上報君父之恩下為身家之計也不意疾病纒綿勢難支久今臣交歲以來畫夜痰嗽不絶常時坐卧不安至於郊天陪祀慶成侍宴朝廷重典臣子至榮亦不能預負罪慚惶心如叢棘故今昧死俯瀝血誠上祈恩照特賜骸骨早還鄉里使得安便以終餘年臣不勝感戴天恩之至奉聖㫖卿召用未久有疾善加調理痊可即出供職不允所辭胡純准送監讀書吏部知道欽此老病乞恩休致疏臣以衰病凡庸誤䝉陛下天髙地厚之德起之罪廢之餘置之卿輔之列贈祖同官廕男入監復召至京將及一載之間視如手足許布腹心言雖妄而多行採納罪當認而每賜寬容病則遣官加賜辭輒溫㫖慰留特憐衰朽不時病發許當嚴會隨處退班真天地之曲成萬物父母之愛惜孤子不是過也臣雖粉骨碎身何以能報但臣不幸元禀素薄久患痰火竒疾為變百端近因勉强日久精神日耗加以耳聾健忘脾泄食減或早起裝嚴而更衣不止或晝出判署而臨事不知只今半月之間早朝入至午門而不能進者二望端門而復回者一在部疾發驟危而急借輿扶回家者二僚屬每見失驚朝市聚觀不雅未有病困如是而猶可以竊祿居官徒曠天工者也思負聖恩慚惶無地臣是以不得巳再瀝血誠伏乞聖慈憐憫容臣氣息尚存趂今河道可行之日早賜骸骨還鄉以遂首丘之願則臣未死之年皆陛下再生之德也子孫世世其何能報臣以私情纍干天聽不勝戰栗祈望之至奉聖㫖卿職掌邦刑明慎公恕况朝審在邇宜用心調理痊可即出供職慎勿再辭吏部知道欽此病弱乞恩容令退避疏臣以病弱乞休荷䝉溫㫖勉留且容臣子送監讀書臣伏遇聖明仁同覆載謂臣召用未久雖病發巳極而不忍棄捐念臣受患孔多雖年例未及而即令䕃子老牛曲遂其私情病馬尚策於故道荷殊恩之出於望外實私感之切於由中義圖死報敢望生還但臣不幸少多憂患致成痰火竒疾不時常發其發也或為眼目昏花或為心神恍惚或時膝軟不能行立或時氣塞不能言語蓋其發無時難於預料故或前日無事不注門籍而今早疾發不能入朝惶懼無措或今晚疾發巳注門籍而明早疾愈不敢入朝於心不安蓋臣因病多憂而憂即病發故每當大朝會大禮節輒憂病發失儀而前疾因憂即發常恐昏瞀顛仆有汚闕庭故臣常自慚惶纍乞休致今奉恩㫖調理病痊之日即出供職不敢煩瀆外但臣病發無時憂莫能處伏讀禮儀定式內一欵如朝參近侍御前有患病咳嗽者即許退班如䝉聖恩容臣侍朝或侍經筵各項大禮之際如遇病發即許退班或當入朝之時猝遇病發亦許隨處退避則臣憂患心少而病發或亦可減得以致死效勞矣臣以私情纍干天聽不勝戰栗奉聖㫖卿端亮忠鯁實心幹事朕所簡注宜照前㫖即出供職既有痰疾不時舉發准照禮儀定式事理退避該衙門知道慎封爵以重親親疏臣聞明主慎動不使一事有差忠臣事君惟恐一言有謬蓋謬則君事或因以誤矣臣與尚書桂蕚李承勛方獻夫等受國厚恩誓皆赤心事主豈敢一毫有欺然而自揣天下之人不能盡知也天下之事不能盡識也是以每承付托相與憂惶反復論議不定唯恐有差因誤國事近如昌化伯邵氏保襲之事是也臣昔因與邵輔親識奏乞避嫌欽奉聖㫖這事巳有㫖著再會同法司將各奏至親拘審卿既與邵輔鄰親伊家宗圖來歷宜必素知况卿職掌風紀是非曲直正當分辨以杜爭端豈可引嫌回避便照前㫖上緊會問明白歸一來說該衙門知道欽此欽遵臣受命以來多方詢訪以備會審間未幾嵗終䝉恩轉官刑部又不意春來疾病纒綿巳該原會官會問歸一奏請然臣之心終有未盡也其事終有未安也我皇上智周萬物而於明倫尤重今於邵氏之事正明倫理篤恩義之事也使臣瞞昧不言致誤此事則萬世而下纍我皇上聖德臣雖萬死何足以贖哉竊惟皇上之必欲邵氏封襲伯爵者是即古聖王逹孝之心蓋推皇考恭穆獻皇帝之所自出於孝惠皇太后又推太后之所自出於其父母邵林楊氏而欲榮富其子孫以世享之也今不幸林之子曰宗曰瑄曰喜其孫曰華曰英曰蕙皆巳故絶今爭襲者曰萱曰輔曰葵則皆旁枝非林子孫其不當襲也明矣乃惟千户邵茂真為林孫則所當襲然茂雖自稱其父邵安為林之第二子而引恭穆獻皇帝為其乞恩復官與邵喜同稱母弟為證臣下奉此不敢輕辨然而審諸其親族訪之於傳聞則皆曰義子臣愚不能無疑也書曰疑謀勿成臣恐邵安真或義子而其子孫襲伯則太后父母之神不歆非類而太后皇考在天之靈皆不安矣若彼爭襲者曰安出淮安王氏則其言出附會不可輕信而且世逺人亡莫之能究也今江南客船運船每嵗經過山東直𨽻一帶地方鬻回幼男女甚多至或忘其父母姓名生年籍貫者豈能究憶也是以安為義子孫雖有數事指證可疑而莫敢為言也竊惟舊侍太后宫人內使或有得聞一二者內廷或可親問至於昌化伯夫人何氏嬪於邵門五十餘年矣其平日與邵安妻妯娌相處何如其夫邵喜存日與邵安兄弟相處何如其男邵蕙存日與邵茂長幼相處何如豈有不明而陛下差一堪信內臣就其家開誠問之豈有不實對者其各家年老家人平日耳目所習聞見亦真使東厰一召問之孰敢不盡言者非如臣等會審悉多拘忌不得盡情也再不然行彼原籍拘審年老親鄰勘實回報亦不過遲之半年耳臣愚昧死伏願聖明如是詳審而巳若以臣等有疑之言一時遂定臣恐賜彼一代之爵而或亂彼百代之宗誤我皇上明倫之智逹孝之仁外議有言內廷得聞此時追罪臣等雖死無益於事故願自今謹之而巳臣愚亦知祖宗朝皆有外戚封爵何獨皇考外家而忍見其無况臣鄉里亦豈不願崇爵之輝而顧其時勢有不得巳焉者不敢不言也臣觀大江以南蘇松九府州暨浙江等九布政司地方之人近來並無侯伯世襲者蓋地氣之薄所不能勝故邵喜封伯未逾年而遂卒傳其子蕙僅再世而遂絶邵輔升指揮回家其弟弼即夭邵玘三子其長次二人皆以疾廢其不幸門祚之薄如此蓋亦地氣使然也故臣愚見以為與之襲伯則必拘倫序而或濫及旁枝誤及異姓且弟曰弟姪曰姪太后親兄弟不得以之為子親父母不得以之為孫他人富貴而本親告絶幽明之間各生嫌隙生者不得安其養死者不得歆其祀况其門祚薄而福䕃隆如前所慮恐非邵氏久長之利也不與之伯則使何氏得如民間擇愛立嗣而使之承其家業養其孤寡奉其宗祀太后親父母有孫親兄弟有子而後量與恩澤䕃卑流逺邵氏久長之福也臣愚叨任大臣與國同體昧死敢言不勝戰栗待罪之至應制陳言以弭災變疏河南清吏司案呈奉本部送禮科抄出禮科右給事中蔡經等題前事奉聖㫖事關朕躬的自有處置其餘該衙門看了來說欽此欽遵抄出送司除將抄內省雜料處布絹拔淹滯正風俗四事備咨各部徑自查覆外其慎差遣一事係該本部議覆案呈到部臣等竊惟聖明御天四海臣僕孰召不來孰罪敢匿而內外法司委之提問罪犯孰敢延縱至差官校齎駕帖出外所過地方無不驚擾雖有以身許國之人素持不顧利害者無故猝然途遇亦皆震駭失色至於所提罪犯之家老幼驚惶被嚇財物怯懦者或因喪膽以成疾病弱者或因稱貸以破家被提罪犯或被窘辱難禁而自殘身命所至官府急無打發多借官銀奸貪官吏乘機尅落以一報十上司坐視莫敢誰何小民代陪不勝哀怨聲聞於天降灾致警不無所自我皇上至仁覆物勵精圖治平日事天如父愛民如子凡所以體天心而究民隱者無所不用其極惟此一事無人敢言未經聖慮今給事中蔡經等因言弭災建議及此實效忠諫之職言所難言伏願聖明俯從今後官民有犯在內責之法司在外責之撫按按察司等官作急提問完報不許淹滯遇有事體重大合提在外緊關人犯到京問理者行令各該巡按御史嚴限責差的當人貟提解來京以憑問理非有事干機密十分緊急重情近在畿甸地方不須再差官校乞斷自宸𠂻永為定例如此則陛下攬權於上百官承式於下體統正而朝廷尊人心歡悅而和氣致祥矣伏乞聖裁奉聖㫖卿等所言朕知道了自有酌處顧大體以平刑政疏近該陜西隴西縣問革監生栁瓚訐奏同鄉御史王朝用各項違法事情欽奉聖㫖這所奏王朝用貪淫不法事多又枉道回家錦衣衛差千户一貟會同巡撫都御史將事內人犯行提勘審明白將有罪及緊關干證人犯并王朝用都解來京不許狥情回護今後御史公差俱不許枉道回家違者聽所在官司舉奏容隱的一體查究不饒欽此欽遵臣等查得節次奏行事例凡奏告不干巳事立案不行又一欵官吏軍民人等竝不許將曖昧無所稽之事醜穢不可聞之語牽連開寫䙝瀆宸聽敢有故違併將奏訴他事不問虛實立案不行從重治罪前項二例一向遵行蓋所以存大體而抑刁風也今查栁瓚所奏王朝用事情內多曖昧無稽之事醜穢不可聞之語又其間干巳事少不干巳事多陛下不照常下所司抄議題覆而即差錦衣衛官到彼會勘將有罪及緊關干證人犯并王朝用都解來京者臣等仰窺聖意蓋欲急正百官以正萬民而正百官又先自風憲官始也臣愚伏讀本月初九日敕諭有云言責之官其位甚重風紀之吏其責尤嚴勿外飾虛名而內罔其實大哉皇言真見風紀之重而欲實盡其職矣昔年大臣選任御史多用附巳之人致其倚勢妄為臣嘗備奏其事其尤甚者如藍田之劾席書中間詞意上欲激怒尊親下欲屏絶忠良其劾陳洸盡破纍朝法例奏行讐謗書內曖昧不干巳事以致誣陷洸罪太重纍死鄉人數多事皆由田臣今會問前事方欲列其罪狀奏請提問豈敢偏護况今大臣選任御史如前私意者保其必無矣其所任御史必非皆前人也王朝用原籍陜西其鄉行臧否逺不能知但今在浙巡鹽則聞其守法奉公確持風紀而奏處鹽事頗合事宜今一旦聞此勢當驚惕孤危不能存立而按屬官吏下視為囚巡按在彼傍觀亦無光彩而有司玩視體面漸為難處風紀不易振揚矣况當修省之日中外臣僚聞此亦皆憂患失色思今居鄉履任不敢違俗再行一事有傷一人以來刁訟之及而為身家之禍名節之玷矣其有損於士氣不淺也夫士之處鄉實難同流合汚則得鄉人皆好其若稍有執持則善者雖好而惡者必惡或有請託不行則怨謗立致矣今如栁瓚自稱其父柳景和原任知州致仕在家為其二子皆納粟入監所費不資又稱指揮苖永等缺其本銀二百兩取討緊急親到其家央父寬容又稱被王朝用說其父子兄弟放債生事毁敗鄉宦則其家之富橫鄉里可知類非貧弱齊民鄉宦可以欺壓者此正尚書桂蕚近奏所謂貪汚去官者以富厚取重所以亷恥道消而奢靡成俗欲行巡按勘追類解以備賑濟助里甲者也昔臣多以犬馬自比故謂御史為國鷹犬犬昔媚盜而憎主人吠佳客叱而去之宜也後之代者不皆前犬矣主人欲其吠盜守門則宜養其氣力精鋭可也若或過抑之則犬皆不吠而盜入不知矣故昔御史妄為當治其罪今任御史非昔則宜稍加愛惜崇重以作養其氣也臣愚伏乞聖明再敕輔臣計議或止行巡撫都御史或仍差千户前去會同將栁瓚今奏王朝用并王氏原告柳瓚各干巳事情通審明白干礙王朝用有罪參奏提問其各奏告非實依法重治王朝用待其到京之日仍問其枉道回家之罪則法有常守士無他顧而臣僚得以一心效職刁惡不致多端誣善國家正大之體立平和之政行蓋亦可以安人心而悅天意為弭災之一端也臣愚衰病至極自知報陛下之日少矣昨遇隂霾異常驚懼疾甚今國家弭災大事嫌于侵越不敢僭言惟茲一事頗動人心係臣職掌不敢避罪緘默臣昧死干瀆不勝戰栗惟乞聖明矜察奉聖旨卿所言的是著差去錦衣衛官會同巡撫都御史將栁瓚奏內事情提人勘審明白有罪及緊關人犯依律議擬監候奏請發落果礙王朝用參奏拏問不許狥情回護該衙門知道欽此災異陳言自求罷黜疏臣伏於本月初九日跪聽修省勑諭一時驚惶無措觸發痰火舊疾十二日在朝房齊宿忽遇大風隂霾天色異常臣年六十素所未見益加驚惕思省真若身為誤國之事而天誅將及不能自解即時病甚以致胸膈疼痛連日不能飲食伏枕推究今日有此不知何故今一旦省悟思我皇上敬天如父愛民如子修德講學勵精圖治天豈不知故降之祥瑞如甘露河清者所以表我皇上之德嘉我皇上之心也降之災異如風霾星變地震天旱者所以警我皇上之用人行政猶有未當而膏澤不下於民到今生民窮困而盜賊易起邊境空虛而烽烟多警將有大可憂之事也乃是知天之於我皇上真愛之如慈父教之如嚴師也然則今日欲回天意以弭災異豈有外於用人行政之大者而用其力乎天下之政盡在六卿而輔陛下以擇任六卿者則在內閣與吏部六卿所職皆天工也有一不勝其任即能誤國殃民致災必然今刑部如臣雖有犬馬之心然衰病之極月常數日不能朝參及到部理事近又加以耳漸重聽目常昏眊不能見字心神不時恍惚忘前失後實是不堪前職矣今災異如此內閣吏部不以時告陛下而將臣罷黜是徒惜臣一人而不惜誤天下之事也然使臣力不能强而未久喪生或得罪以去是亦不能惜臣也如䝉聖恩特勑內閣吏部計議將臣放歸田里以應災變天下幸甚愚臣幸甚如若聖恩未忍乞改南京使臣得就閒養疾因事納忠以報陛下實為公私兩便臣看得新授南京刑部尚書髙友璣南京工部尚書胡瓚皆刑名練逹精力過臣逺甚堪任刑部若令與臣更任尤無不可然臣實以十分病弱不堪恐誤國事不得巳求罷求閒而感恩圖報之心雖死不能瞑目病中謹具弭災大要數條除事干本部者巳開報吏部會奏外今有上干陛下聖學一事下救生民困苦事干吏部任官九事輒敢上陳蓋仰荷聖明納善不棄芻蕘而吏部尚書桂蕚心同憂國必不罪臣也其餘尚有議處邊境空虛等項數條事干他部者臣嫌侵越非奉明㫖許臣言不敢進也臣在病中不能搆思綴文每事直言輕瀆聖聽無任殞越計開一欲用人行政之皆當在乎周知天下之情弊深識天下之人才而明究治亂之源監古以知今也書曰人求多聞時惟建事學于古訓乃有獲夫今之五經四書備載古聖賢為治之道即古訓也然其大要不過曰敬曰誠曰精曰一曰中曰極言雖殊而理則一我皇上日勤聖學蓋巳深得其要而體諸身心大本立矣是即學于古訓之獲也然而天下人情物理變態多端古今治亂興衰所由不一將欲監古知今多聞建事則歷代之史不可廢觀然以萬幾之繁勢不能盡觀也宋儒真德秀所編大學衍義一書乃貫古今經史而一之為治為學之要充然畢具其間所言辨人材察民情之二者尤為警切我太祖仁宗皆重此書臣昔兩言於孝宗皇帝之世一言於陛下紹極之初皆以人微言輕未能徹覽近得輔臣唘沃聖心日命儒臣講讀此書天下臣民不勝至幸然聞日講不過數條一時未得周遍古稱經曰窮經要使字字而窮究其義也書史曰涉獵不過涉獵一過識其大義而巳臣愚欲乞聖明萬幾之暇於日講之外自將此書任意觀覽論講儒臣仍備顧問聖性聰明諒可旬月一周閲其大義而反復再玩一二遍則於前代政治得失今日民情事理與凡奸庸害政之人奸弊害民之事可以無不周知而於用人行政之間自然皆適事理之會而當天人之心矣然臣又聞德秀所編讀書記有甲乙等集而此書乃其乙集上卷其下二十二卷則通記歷代輔臣事業聖明倘讀衍義之外更得併其乙下數卷而涉獵一過則亦可為用人行政之一助也臣愚寡昧芹曝之私不勝至願一生民窮困由於善政不行善政不行由於官不得人或雖得人而銓注路逺卒難到任地方當時缺官或雖到任而未久遷改人無固志皆無肯實心為民所致也官之切於民者莫如巡撫守令今宜敕內閣會吏部計議定畫一之法今後巡撫應於何項官內推用守令合於何項人內選用各該責何項官保舉其間稱職有實政在民者應該任內何項升奬其因循油滑交結逢迎不肯實心為民者應改降何官不許姑息九年任滿該升者應授何項職事一一奏聞裁處立為定制不宜甲可乙否朝令夕更壞此久任之法至於為此官者尤宜重其責任寬其文法使得展布為民不宜苛察太甚使之掣肘難於行事一布政使統理郡邑亦宜久任今後布政任久該升者宜比照天順年間徑升尚書事例上者徑升各部侍郎并大理寺卿都察院坐堂副都御史次者升太常太僕光祿寺卿不必再推巡撫致難久任一各處分巡僉事宜令三年専管一道凡任內刑獄盜賊水利屯糧及奸貪豪惡害民等事皆責之管理其無兵備官處操練巡捕清軍等事亦責之提督三年滿日考此數事實能行否以為殿最三年未滿竝不許其營幹别差聽令改道以致避難誤事一各處有司官貟該升者皆宜僉注本省及鄰省相近地方其在京新選升者亦宜求其原籍相近以免到任遲誤地方缺官日久廢政殃民一布按二司官如參議升參政參政升布政使又如僉事升副使副使升按察使及因才性所宜二司更互改升者皆只於本處衙門遷轉不宜南北交遷使其終嵗往來道途地方缺官誤事內惟參議僉事有缺才將京職并在外應升官貟內銓補然亦必須求其地方近便以免其到任遲誤地方缺官日久一今後才力真不及官貟量宜降級或對品調除才力相應職事不宜調任逺方以致廢政殃民釀成邊患貽纍朝廷如近日雲貴之事其若地方不宜或有嫌隙當避非真才力不及者則止稱才性不宜明白改調一今後邊方布按二司佐二官須要越資㨂用才堪巡撫之人一二貟在內使之諳練邊事以備本省及鄰鎮巡撫之缺取其便於到任地方不致缺官誤事一廣西四川雲貴地方司府州縣官尤宜越資選用原籍相近風土相宜年力精壯之人其後升擢比腹裏官量加優厚以酬其勞逺慎不可如前槩用衰老貪懦之人以致廢政殃民釀成邊患故如近日四川芒部雲南武定尋甸之亂使地方該管原有好官不致有此就使有此亦能自為區處不須動煩朝廷征討勞費至於廣西雲貴有司官尤宜查照成化以前知府郭本等事例只於本省人貟內升選一朝覲考黜官不許奏復雖有重禁然前嘉靖二年五年二次考察吏部上遵內閣分付下畏科道彈劾多將剛正有為不肯逢迎交結之人黜退致今人才甚是缺乏合無不為常例此等官并內外一應養病休致等官責令大臣科道保舉堪用者一體起用後有不稱連坐舉主即今皇上勵精圖治留意人材而所任內閣吏部科道官皆非昔比矣今歲以後考黜官貟仍照舊例嚴禁不許奏復奉聖旨卿才識老成召用未久宜盡心供職不允所辭所陳勤學事朕知道了朝覲考黜官貟巳有纍朝舊例豈可更變以唘紛擾其餘著吏部議處停當務在可行欽此久病廢事乞休疏臣昨為災異陳言自求罷黜事奏奉聖旨卿才識老成召用未久宜盡心供職不允所辭所陳勤學事朕知道了朝覲考黜官貟巳有纍朝舊例豈可更變以唘紛擾其餘著吏部議處停當務在可行欽此臣聞命感激幾欲流涕思臣廢病庸才實是不堪重任前歲䝉恩特改南京使得就閒養病因得量才供事不致尸曠臣荷天地生成之德感泣無涯去秋皇上誤聽輔臣之薦趣召臣來臣不敢稽命力疾來此黽勉供職今春因疾自陳荷聖恩憐臣病苦特准病發不時退避不拘常參而又每有妄奏雖拂時議者亦荷優容不加罪譴而稍合事理者多賜採納臣荷陛下之知自謂千載難遇臣非木石豈不知感而思所以盡心供職委心圖報也苐臣不幸衰弱之極强支日久益加困憊近自本月十二日起忽病胸膈疼痛不能飲食自十三日强病入朝之後至今逾旬不能朝參及到部理事近雖服藥痛減而元氣益虛痰火愈甚耳漸重聽目常昏眊不能見字心神不時恍惚忘前失後實是不堪供職矣念今天戒如此主憂如此而臣常日卧病在家其何能安是以曉聞朝鐘之聲而曰主上夙興視朝為天下也臣何食祿自安於家晝閲獄情之案而曰主上為今天熱恐重囚情可矜疑者淹禁而死令寫來看也臣何因病不能出審而尚未開奏今臣身倚牀褥心如芒刺其何能安而病可得愈况今人才求欲康濟時艱以輔成陛下正大光明之業者固不多得若惟練逹刑名守亷執法精力過臣可任刑部者則其人固不少也臣實病久廢事靦顔竊祿有孤任使伏望聖恩念天工人代之重憫臣病身弱之極特放還鄉休致以終餘年使臣得免素餐之愧誤國之憂臣不勝感戴天恩之至奏奉聖旨卿引疾乞休巳纍有㫖慰留今災異修省正賴卿明刑慎獄以恤民固本豈可懇求休退宜即出管事以副眷懷所辭不允吏部知道欽此遵祖法以處外夷疏臣聞人臣之義知無不言况臣特受明主之知其遇國有大事豈敢隨衆避罪不言也臣先任兵部事閒日閲邊奏舊案今任刑部近准兵部咨欽奉聖旨該會臣等三法司詳擬分别先令有功有罪官貟等第欽此欽遵備將抄到錦衣衛千户等官鄭金等勘報甘肅事情案罪反復參詳更又憶所舊聞參以新訪頗知其事然以處置之道未定則羣臣之功罪難别是以彼此牽持未敢定擬臣愚昧死敢盡言之昔我太宗文皇帝雄武冠絶古今徼外四夷無不臣服是以北封元之後裔阿嚕台為和寧王瑪哈穆特為順寧王西封托克托為忠順王東北置尼嚕罕等都司衛所二百餘處皆以撫綏荒逺藩屏中國至於南討黎季犛復古中國之地建立交址布政司尤為偉績宣宗以來黎賊復據交址殺官劫印不可勝記阿嚕台亦為瑪哈穆特所併其東北各衛所亦皆兼併不常存亡莫考先朝皆置之不問蓋不勞中國以事邉境所以保我子孫黎民永固基業尤得古聖王推亡固存之道也乃惟哈密逺在萬里其王托克托之後巳絶自其主國王母以來三被吐魯番殺虜占奪城池廷臣莫敢直言請以古羈縻弗絶之法處之者乃强求其親黨曰哈尚曰善巴而立之旋被占奪今其民回回一種久附吐魯畨為傾本國哈喇輝輝和爾生敵二種已逃附肅州依我存活不敢復歸其王巴雅濟自願投附吐魯畨反欲導彼入冦矣正德年間兵部奏差彭澤總督經略仍請敕一道齎諭番酋蘇勒坦莽蘇爾并和卓塔濟迪音欲其獻還哈密城印將巴雅濟送回本城居守夫巴雅濟自願歸彼雖令復守本城亦其臣屬也於我何益又敕一道令恩克保喇回還哈密與舍音和珊同守城池夫舍音和珊為彼占據哈密而恩克保喇避難來歸今使之還是驅入虎口也一時廷臣失處如此彭澤素懷忠勇身任其事乃亦依阿不行執奏而茍且行事不終而還責以大臣體國之義不為無罪也使今吐魯畨獻還哈密城池忠義王真有嫡𣲖應立之人朝廷與之金印助之兵糧數萬到彼為王誰與之守蓋不過一二年復為所奪益彼冨强辱我皇命且使再得金印城池以為後日掯勒求索之計耳於我中國何益也夫吐魯畨變詐多端善為反間其欲間我附城屬敵使之激變則稱哈喇輝輝和爾稍書交他來其欲間我謀臣使之受罪則稱壞事的都是陳都堂實迪納克䇿稜前說著來這裏把巴爾岱起發了饋你飯米賞賜又言射死和卓塔濟迪音惱了人馬往甘州城殺了一日其欲使彼番使得通內間再無阻害則稱王子因見漢人殺了和卓賽音扎蘭并舍音和珊父子故來報讐夫自嘉靖二年十月進獅子夷人已遞番文開稱番使明埒克搶了馬又遇鄰敵殺了人蘇勒坦莽蘇爾要動人馬一定來肅州甘州三年五月初三日舍音和珊子穆爾瑪哈穆特等在甘州臨刑口稱八月裏王子人馬如麻的來聞彼四月已收人馬八月果至則其造意通謀已久豈謂殺彼三人報讐亦豈為陳都堂反哈喇輝輝和爾使之來也其恐我復結衛喇特為之後患則言七八月裏領著衛喇特敵人還要往漢人地方上去而竟不來其變詐何可信也其自正德六年得送回伊弟章特穆爾因在甘州住久深知風土好過即起逆心要來侵犯正德九年即要插旗甘州城門上十年六月陳九疇方到肅州十一年彼自以原許緞子不曽與足及拘留番使為名興兵入冦豈因陳九疇也其先三取哈密城池皆以哈密姦回為之內應其漸置姦回舍音和珊等親黨買屋久住肅州城內而又節差番使多羅和卓巴爾斯等來探消息為通書問一旦擁兵徑至城下各回潛置兵甲圖為內應使非陳九疇奮身不顧後患即將各回監故打死而又近遣屬夷劫其營帳逺交衛喇特搶其城池使彼聞變內顧而還則肅州城池難保無虞臣以為文臣之有勇知兵而忘身為國無如九疇固彼番酋之所深忌而欲殺也惜其後信僚屬之公移輕聽姦回之揑報而妄奏蘇勒坦莽蘇爾雅克摩哩之殺則其罪有不免爾王邦彥奏其執殺夷使激唘邊釁又言二次甘肅之亂由殺舍音和珊等之誤蓋彼武夫輕信惑於流言為彼內間耳至於通貢一節則其後事難料前事可徴𢎞治四年因其虜去忠順王善巴六年欲犯肅州不服撫處奏准絶貢將其貢使一百八十一名盡發兩廣安置十一年因見器用缺乏諸夷歸怨方才悔過送回善巴嗣後通貢不絶地方騷擾亦不絶而反間內應絡繹於凉甘肅之間馴至十一年暨嘉靖三年二次大舉入冦今奏准絶貢又三年矣秖聞來求不聞侵犯者豈其力有餘而心不欲也蓋亦懲前二次和卓塔濟迪音之被殺衛喇特諸夷為之後患而長慮却顧也今廷臣議者以有備為長策以通貢為權宜其言誠是也臣愚欲乞聖明特與輔臣熟議今後哈密城池照依先朝和寧交址捨置不問而唯責彼番酋恭守臣節再無侵犯一二年後方許入貢或止通互市仍約其貢其市皆不許多帶人衆淹留歲月則我之邊城驛途供費可省而得専事邊儲我之謀臣勇將反間不虞而得盡心邊事矣臣愚昧死妄言未敢以為必可用唯乞聖明採擇幸甚奉聖旨覽卿所奏知道了兵部便照前㫖會同三法司議處具奏定奪欽此用賢疏近該詹事府詹事兼翰林院學士霍韜節䝉升禮部侍郎尚書節辭不受者蓋其心不欲以議論編摹為功而虛受髙位無所事事也臣觀韜之為人薦賢如不及論事常有餘其心直欲致君堯舜輔臣唐虞其孤忠徑節誠為近世罕有舉朝推讓雖其所薦之人間有實不堪用所言之事或有時未可行衆論不合者亦未嘗固執為是人亦不敢妄議其私也其心之無我行之服人如此陛下有是臣焉既知而信矣誠為宗廟之器社稷之福不宜久置優閒而使専事編摹也竊惟祖宗原設都察院都御史以糾劾百僚以後都御史與六卿皆為同僚人情稔熟彈劾遂爾不行而専委御史至於輔諫之官亦廢不設老成正直之言自是不揚於庭殊為盛世缺典今賴陛下英明法祖霍韜才力堪任臣愚謬謂宜特以都御史之官而仍帶詹事或學士之銜不使在院聨署刑名考察等項煩雜事務而専以論思糾劾為職凡事干君德朝政有所未盡善及臣等大僚之中有衰病不職姦慢不忠者責其指實上聞聖明省察而行之則朝廷有直臣上下無過舉如古汲黯立朝淮南寢謀而有益於天下不少矣後若有如其人則置無其人則巳大抵全才自古難得故雖古人擇用輔臣亦有數等漢設御史大夫為丞相之副唐太宗時房𤣥齡善謀杜如晦善斷彼此相資為賢相下此又有王圭魏徴善諫而房杜讓其直李靖李績善兵而房杜濟以文是皆或以他官參議朝政之類太宗唯是善用賢才故能致天下斗米三錢外户不閉治蹟之美庶幾三代使其能修身齊家德如陛下則真比堯舜矣故今正直善諫如韜者固宜别置崇用終身不改也雖彼善兵之人亦宜購聚於朝以備不虞任使可也臣愚一時􅍝見如此未敢以為必然伏唯聖明特與輔臣吏部採擇施行天下幸甚奉聖旨霍韜近纍辭升職欲效編摹朕因其志特允所辭今卿有奏足見舉賢才之意吏部知道妄言誤國乞恩認罪疏臣上年九月䝉取到京道經沛縣見彼運道久被河流沙壅屢開屢塞而開者避怨因循莫敢致力彼時敕命總督都御史盛應期候勑未到臣因慮此國家饋運咽喉之路日唯撈沙水中終恐無益一時謬見具本建議欲令水退昭陽湖暫可通船之日截其上流乾其下土而併工挑築旬月可開又慮此既被沙淤來嵗或憂再塞若不趂冬水涸冰凍船阻不行之時照依南旺湖式樣於昭陽湖中兩面築堤開河一帶來歲通漕與舊道二處隨便行舟而又妄慮河水入湖亦能帶沙被塞莫若於昭陽湖東岸滕沛魚臺等縣地方之中擇其土堅無石處所另開河一道南接留城北接沙河口就取其土厚築西岸以防河流之漫入山水之漫出而隔出昭陽湖在外以為河流漫散之區其河新開止通二舟之交行來冬冰結船止之時更加濬濶以為運道就彼撥夫接遞以暫寬豐沛之民而稍息咽喉之氣至於補給民田措置財力招募夫役等項亦皆輒為妄議而以地之髙下土之堅疏勢之難易不曾親驗欲乞敕下總督都御史親驗可行趂今興役開掘此河或此河難開則止開沛縣舊河及湖中近河二道兼行以防一道之塞彼臣奏下工部行勘公文雖未到彼而盛應期先因僉事江良材有奏偶與臣合一時官屬又皆聞臣過彼有言到京有奏一皆倚重臣言遂爾奏報新河宜開得㫖料集工力於今嵗三月遂開此河原議工程六箇月本不為急而盛應期勇於集事功止四月遂成八九官吏嚴督怨讟並興朝議以安人心為重亟止其事財力空費方當罪責而應期猶奏乞再加一月保其成功紛然衆笑其愚而臣獨昏昧執迷乃猶疑其人之見謗惜其事之中止意欲奏差忠實不欺一人假以旬月之功到彼勘實而後為行止賞罰懲昔躁妄不敢也今聞應期與管河郎中柯維熊皆因此罷職臣心驚惕無地自容節查柯維熊與臣揭帖則報新河巳開一百二十里止有二十餘里未及原擬尺寸見奉明文停止而言沛河三淤三通以見其不足為倚而新河不當止之意又言近論當道者曰督責過嚴怨聲載道此皆奉行者致然而忌者不少其與他處揭帖則甚言應期開河害人之致怨此其反覆變詐隂陷大臣私誤國事其罪當不止此至論應期平日執性過嚴所至物情不體非遇寬大之朝固亦不止罷黜之罪今得此非為不幸也但論自古國家凡遇大事之誤必追責首議之人今以應期之亷勤果毅受任數月之間沛縣運河既通黃河上流趙皮寨亦開比常固當加勞而乃因臣妄言請開新河之誤得罪以去蓋臣不惟誤彼徒費工力而使後任事之人皆以應期為戒而莫肯盡力則臣之一人所誤不小也竊聞人臣之義有罪不敢逃刑今臣之罪不當在應期後雖荷聖德寬容未行查究而臣心日慚惶不敢欺隱伏願聖明日月容臣從寬認罪亦同應期罷黜而或更加重擬或薄示降調使天下後世皆知我皇上馭臣賞罰之公愚臣雖死不敢有欺之義不勝感戴天恩之至臣冒死待罪無任戰栗奉聖旨覽卿所奏巳悉至情但應期受命治河委任非人督責過嚴以致怨聲載道不能無罪巳著冠帶間住了卿宜安心辦事不必引咎自責該部知道敷揚聖製疏臣昨病間得聞聖製十有六字針出示輔臣竊伏枕私誦不覺有感起而揚言曰大哉我皇上真有聖人之資真為聖人之學而所見如是之真切乎伏讀聖製有曰學聖君子朂哉勿僞者蓋以交勉臣鄰與之同志也臣雖疏陋不敢竊比於文學心膂之臣然而天地覆載一物不遺日月照臨萬里無間古者庶民固皆于極之敷言是訓是行以近天子之光而有言矣臣豈不可比於是耶但恨臣之少也奔走於多艱長又困厄於多疾故雖竊聞儒先之指論得窺聖學之緒餘而乃率志不篤用功不専不能身入聖道之門兼又質性狂朴意見偏迂惟欲以經濟實事輔世太平不敢専工文字以獵時名臣於是孤陋寡儔甘為俗吏而又衰病之極蹇於言詞艱於步立不能久侍清光雖有微忱無能上答矣今感聖製輒欲敷揚是猶蛙蚓微音遇春雷之震而亦發蛛蚌微光對秋月之華而自吐謂物性之不可遏則然而欲求補於萬一則多見其不知量矣伏惟大智好察邇言特賜省覽不勝榮幸臣愚冒死開坐謹具本題知計開一卓爾之見臣竊觀聖意蓋謂顔子之學聖人相去不逺故能所見如是真切也然顔子至是猶謂欲從無由者守而未化也若假之以年則不日而化矣此所謂未逹一間者也然觀顔子初嘆仰鑽瞻忽之難則亦未得其門而入所見未能至此暨後從事夫子博文約禮之教而欲罷不能既竭其才始能見得真切如此然則後之欲學聖人者舍博文約禮其何以哉先儒謂博文即致知格物也約禮即克己復禮也約禮工夫維一夫視聽言動之皆勿非禮此孔子之親教顔子而先儒程子各為之針我皇上又親為之解則固巳心得其要矣愚臣往歲冒陳喜怒哀樂之欲皆中節則亦堯舜以來相傳至於孔顔曾子以及子思而後筆之於書若顔子之不遷怒而孔子稱其好學乃其明驗臣非敢妄引也陛下天縱聖人固皆躬行實踐而無有非禮無弗中節者矣惟若博文工夫在先而長之與幼天子之與臣庶為力不同貴得其要臣敢竊為之說夫文本指詩書六藝之文而言然天下萬事萬物之有理則皆文也顔子時六經未述四書未作所教博文不専讀書惟在格物窮理若今五經四書咸備則古聖先賢所論義理及作聖工夫多在經書矣故先儒論格物亦非一端如或讀書講明義理或論古今人物而别其是非或應接事物而處其當否皆窮理也竊惟窮理工夫當不出此三者今之講官進讀陛下聖明巳至文學通貫出言成章非如臣庶童稚之時章句文義未通欲其聨章進讀逐句解說也况乎經書所言惟是一理一處通而處處皆通雖今儒生舉子亦不能兼通别經况於至尊日有萬幾所貴講官進讀經書惟擇其切於身心治道者著為講章臨時講讀又指出其中要語而申致懇切方可以啓沃聖心開拓聰明不宜聨章逐句講讀以多費光隂而徒勞心力也况今陛下勵志中興日日用人日日斷事則所謂論人物而别其是非應事物而處其當否者尤為學聖興王之要道不可無也然古今人物甚多天下事物甚廣而欲别其是非處其當否則古人論此著於經史者至備宋儒真德秀輯其要略以為大學衍義一書最切於人君為治為學之要其所言辨人才察民情之二者尤為警策陛下又因輔臣之唘迪法聖祖之重此書而日命儒臣以之進講矣臣昔妄憂日講不過數條一時未得周遍上請聖明萬幾之暇自將此書任意觀覽諒可旬月一周閲其大義而反復再玩一二遍於前二者所載用人之是處事之當者可以為法用人之非處事之不當者可以為戒至凡前代政治得失今日民情事理可以無不周知而物理皆窮聖智益大矣然又慮講讀所陳猶不如顧問所得為詳臣願陛下日輪輔臣講官與凡外臣之素明聖學熟知治體者或再兼言官一二人以備顧問暇則與論前代治亂之所以然其治也因用某人及行某事之當其亂也因信某人及行某事之失而陛下因以自省今日某人似某人所當用某人似某人所當不用某事如某事所當常行某事如某事所當速改至有大事之當議處大臣之當推補者亦召輔臣該部與前該備顧問一二人與之面議可否陛下裁决既定而後行之則凡用人行政可無一失不惟陛下因是可以周知天下之情弊深識天下之人才而所以與議者其人學之深淺心之邪正識之短長亦因以知切惟博文之功蓋或止是而於為學為治所得多矣夫聖人之道體用兼該則凡修諸身心者體也逹諸家國天下者用也全體大用備吾聖皇一身臣不勝惓惓至願一一貫之唯臣竊觀聖意蓋謂曽子親得夫子妙道之傳即應之速而無疑也先儒謂夫子之心渾然一理而泛應曲當用各不同所謂一以貫之也曽子於其用處蓋巳隨事精察而力行之但未知其體之一耳夫子知其真積力久將有所得是以呼而告之夫隨事精察者即窮理之功也力行之即克巳之功也於是積久將有所得此曽子所以得聞一貫之傳也我皇上原禀上聖之資尤非曽顔所及故能合下便知一貫之理而躬為敬一之針蓋惟以敬常存此心渾然一理之體而以之泛應萬幾必皆融會貫通無不曲當者矣聖心自省若猶有未能如是者則亦多致隨事省察之功即前博文窮理之說非有二也若曽子告門人以夫子之道即忠恕者蓋就其所及而語之蓋忠者盡巳之謂恕者推己及物之謂先儒謂忠只是一片實心做出百千箇恕來蓋即一以貫之之方勉然而未至自然也曽子平日蓋常用力於此而亦以之教人於臣等中人以下之資學之最便蓋惟始終實盡此心一毫不敢有欺於是上以之事君下以之治民中以之交接日相左右前後之人雖不敢自謂有得而亦免於巧揑安排心勞日拙之患矣此臣等下學之事非上逹之妙也若吾皇上則唯窮理以通天下之志而知千萬人之心即一人之心存誠以勝一巳之私而能以一人之心為千萬人之心久久成熟自然優入聖域而與天合德矣臣不勝惓惓至願一學聖君子朂哉勿僞臣竊觀聖意蓋謂學聖之功須當著實為之不可虛負此名而不為實學也切惟古今天下事無大無小皆被僞的欺了亦被僞的壞了然凡事僞為者不惟能欺人而亦能自欺不惟能壞人而亦能自壞蓋僞與實相反與欺相為用僞則非實而涉於欺矣此大學誠意為自修之首而曰毋自欺也人君為治教之主則無僞二字固當以此自勉亦當以此勉人固當以此自省亦當以此觀人有如真知聖人之可學而學之矣志必篤功必専理必窮巳必克而孜孜勉勉必求至於聖人者勿僞也若或更為他岐所惑為邪說所誤或徒事講習而理不能窮或稍牽情欲而巳不能克又或分志詞章而力不能専則優遊嵗月不能入聖心雖非僞而事之弗成則涉於僞矣乃若臣之事上有僞即欺自古奸臣欺上為術百端故如君行本道乃故矯拂以為直而揚巳之名君行非道乃唯迎合以為忠而固巳之寵君好學也乃引之多作無益之文詞使不得専心於正學君勤政也乃勸之通覽不急之章奏使不得専斷於大事其他䝉蔽媢疾之巧不能悉狀蓋惟大學衍義所著憸邪罔上之情則盡之矣然有心實非欺而事陷於欺者蓋其質之偏暗不能窮理知人故或强其所不知以為知薦其所不當用以為用而國事因之以誤則亦欺矣故如子路之忠信其心豈欲欺君者而夫子戒之以勿欺也又如宋李沆非欺君者而論靈州為可棄則陷於欺矣胡安國非欺君者而薦秦檜為可相則陷於欺矣此亦子路之所不免人君之所當識别也伏惟皇上至誠之德本乎天性故為聖製終是勿僞之朂循此二字而始終不渝人巳無間將見不日聖德大成而太平立致矣臣不勝惓惓至願奉聖㫖卿留心理學發明甚至况欲朕慎其終始覽奏具見忠愛至意禮部知道欽此存節義以回士風疏切惟自古節義之在平時若無所用而一朝事變平日所稱才智之士各為身家而隂相附賊人主孤立無聞勢亦殆矣中有人焉確然中立誓死無二乃獨不顧身家存滅以言其事或遂攻心腹以破其謀或先擊黨與以孤其勢雖或彼勢既盛孑立難成而此等之人或身陷重罪或日虞險禍一時附勢自全者爭笑其愚而天下忠義之士秉彛好德之心則皆為之喚省而順逆遂分從違有定賊勢遂孤而舉逆無成矣此之謂節義之人不為無益於世而豈宜全棄也哉臣竊見江西宸濠初肆强橫之時中外官貟奉差在彼及江西三司等官俞諫王泰等首先趨附遂起非謀一時群吏被脅或猶中立或遂傾心而稱其護衛則曰侍衛稱其令㫖則曰有㫖按察司印必唘而後委官以掌布政司門必唘而后賜鑰以開在京事務五日一報彼而朝令有不順於彼者自料阻報不使傳聞蓋懷二心者多矣臣愚不揣有言巳致身家被陷維時給事中徐文溥孫懋監察御史徐文華程唘充皆以次直言衆皆服其忠義今徐文溥巳殁孫懋徐文華程唘充各以他事得罪是或昔曽救臣臣涉私嫌不敢與論乃聞時有御史李潤者初㸃巡按江西未曾出京即劾宸濠之元謀王泰而敢直言其附勢剝民縱子納賄之惡亦庶幾乎張綱埋輪首劾梁冀之風者維時吏部尚書陸完迫於公論不得巳奏令回籍聽候考察王泰因倚濠勢不聽朝命仍至江西投濠自固而李潤到彼被其讐脅旦夕左右日虞其害一歲之間雖不能大有所為而自守憲度臣職略無一失至凡朝會之際宸濠有事分付則不肯承順而佯若不聞或其輪該遞酒則不肯執壺而佯若不知時以為愚蓋其愚不可及也後得回京升任臨清副使又以執法繩一屬官貪橫不意其人乃大臣之子素交中外為之騰謗而吏部惜其平素不忍遽棄調任雲南偃蹇沉滯今在彼又連被撫按之劾矣夫巡撫傳習不足計也巡按沈教乃亦劾之則或其人真有可劾矣然夷考其詞則惟病其風紀之缺短其防間之疏而巳意者其人寬大之性而夷方不忍於盡法乎更或其人真率之情而寮采有至於失禮者乎若為國家存大體為士風崇節義則此等之人雖有小失當别為處矣然今王泰之子王應芳近在內閣辨事必能襲其父之奸佞而讐謗至黜也又聞御史范輅者先在江西清軍執法不撓亦為宸濠所陷逮赴禁獄降黜夷方臣昔巡撫四川見其在彼不卑小官勤於民事後升江西兵備副使又能不避嫌謗竭力築城弭盜有功地方惟以繩一屬官過當被其反奏而告回原籍聽勘今二年矣惟此二人與臣無嫌而論其平昔忠義於國可惜伏望聖明特敕吏部再加訪察如臣所言非妄非私將此二臣論其材器所宜稍加録用則忠義之風或有所勸而依阿尖巧之人不専於得志矣奉聖旨這所舉范輅等二人著吏部再加訪察如果可用斟酌推用他其餘罷胡端敏奏議卷八
